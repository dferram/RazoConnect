version: '3.8'

services:
  # PostgreSQL Database Service
  db:
    image: postgres:17-alpine
    container_name: razoconnect-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-razoconnect_dev}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - razoconnect-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-razoconnect_dev}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  # RazoConnect Application Service
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: razoconnect-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      # Node Environment
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 8080

      # Database Configuration
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-razoconnect_dev}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_SSL: ${DB_SSL:-false}

      # Redis Configuration (Smart Fallback activado en development)
      REDIS_HOST: ${REDIS_HOST:-disabled}
      REDIS_PORT: ${REDIS_PORT:-6380}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_URL: ${REDIS_URL:-}

      # JWT Secrets (REQUIRED - Load from .env)
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1h}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-30d}
      
      # Session Secret (REQUIRED - Load from .env)
      SESSION_SECRET: ${SESSION_SECRET}
      
      # Mercado Pago
      MP_ACCESS_TOKEN: ${MP_ACCESS_TOKEN:-}

      # Cloudinary
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}

      # Email Configuration (SMTP)
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}

      # Google OAuth
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}

      # Frontend URL
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-http://localhost:8080}

      # Super Admin Key (REQUIRED - Load from .env)
      SUPER_ADMIN_KEY: ${SUPER_ADMIN_KEY}

      # Tenant Configuration
      DEFAULT_TENANT: ${DEFAULT_TENANT:-razo}
      FORCE_TENANT_ID: ${FORCE_TENANT_ID:-}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - razoconnect-network
    volumes:
      # Mount uploads directory for local file persistence (if not using Cloudinary)
      - ./uploads:/app/uploads
      # Mount logs directory
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M

# Named Volumes
volumes:
  postgres_data:
    driver: local
    name: razoconnect_postgres_data

# Networks
networks:
  razoconnect-network:
    driver: bridge
    name: razoconnect_network
    # SECURITY: Internal network isolation
    # Database is NOT exposed to external networks
    # Only app container can communicate with db container
    internal: false  # Set to 'true' for complete isolation (no internet access from containers)
