version: '3.8'

services:
  # PostgreSQL Database Service
  db:
    image: postgres:17-alpine
    container_name: razoconnect-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: your_secure_password_here
      POSTGRES_DB: razoconnect_dev
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Comentado: backup.sql requiere extensión pg_cron no disponible en Alpine
      # Para importar manualmente: docker-compose exec db psql -U postgres -d razoconnect_dev -f /backup.sql
      # - ./database/backup.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    networks:
      - razoconnect-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d razoconnect_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # RazoConnect Application Service
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: razoconnect-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # Node Environment
      NODE_ENV: development
      PORT: 8080

      # Database Configuration
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: razoconnect_dev
      DB_USER: postgres
      DB_PASSWORD: your_secure_password_here

      # Redis Configuration (Smart Fallback activado en development)
      REDIS_HOST: ${REDIS_HOST:-disabled}
      REDIS_PORT: ${REDIS_PORT:-6380}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}

      # JWT Secrets (CAMBIAR EN PRODUCCIÓN)
      JWT_SECRET: dev_jwt_secret_change_in_production
      JWT_REFRESH_SECRET: dev_refresh_secret_change_in_production
      JWT_EXPIRES_IN: 1h
      JWT_REFRESH_EXPIRES_IN: 30d
      
      # Session Secret (CAMBIAR EN PRODUCCIÓN)
      SESSION_SECRET: dev_session_secret_change_in_production
      
      # Mercado Pago (Opcional para desarrollo local)
      MP_ACCESS_TOKEN: ${MP_ACCESS_TOKEN:-TEST-dev_token_placeholder}

      # Cloudinary (Opcional para desarrollo local)
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}

      # Email Configuration (Opcional para desarrollo local)
      EMAIL_HOST: ${EMAIL_HOST:-smtp.gmail.com}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_USER: ${EMAIL_USER:-}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD:-}

      # Frontend URL
      FRONTEND_BASE_URL: http://localhost:8080

      # Super Admin Key (CAMBIAR EN PRODUCCIÓN)
      SUPER_ADMIN_KEY: dev_super_admin_key_change_in_production

      # Tenant Configuration
      DEFAULT_TENANT: razo
    depends_on:
      db:
        condition: service_healthy
    networks:
      - razoconnect-network
    volumes:
      # Mount uploads directory for local file persistence (if not using Cloudinary)
      - ./uploads:/app/uploads
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

# Named Volumes
volumes:
  postgres_data:
    driver: local
    name: razoconnect_postgres_data

# Networks
networks:
  razoconnect-network:
    driver: bridge
    name: razoconnect_network
