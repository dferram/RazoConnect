<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Restablecer contraseña - Fashion Box</title>
  <link rel="icon" type="image/png" href="/icon/Logo_Razo.png" />
  <link rel="stylesheet" href="css/styles.css">`n    <link rel="stylesheet" href="css/fashion-theme.css" />
    <link rel="stylesheet" href="css/mobile-responsive.css" />
  </head>
<body>
  <div class="auth-wrapper">
    <div class="form-container">
      <h1 class="form-title">Restablecer contraseña</h1>
      <p class="form-subtitle">Ingresa tu nueva contraseña.</p>

      <div id="feedback" class="alert" style="display: none;"></div>

      <form id="resetForm">
        <div class="form-group">
          <label class="form-label" for="password">Nueva contraseña</label>
          <input type="password" id="password" class="form-input" placeholder="Nueva contraseña" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="confirmPassword">Confirmar contraseña</label>
          <input type="password" id="confirmPassword" class="form-input" placeholder="Confirma tu contraseña" required>
        </div>
        <button type="submit" class="btn btn-primary btn-block" id="submitBtn">
          <span id="btnText">Restablecer</span>
          <div class="spinner" id="btnSpinner" style="display: none; width: 20px; height: 20px; border-width: 2px;"></div>
        </button>
      </form>

      <div id="successMessage" style="display: none;">
        <p class="text-center">¡Contraseña actualizada! Ya puedes iniciar sesión.</p>
      </div>

      <p class="text-center mt-3"><a href="/login.html" class="link-underline">Volver al inicio de sesión</a></p>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');

    if (!token) {
      const feedback = document.getElementById('feedback');
      feedback.className = 'alert alert-error';
      feedback.textContent = 'Token no válido. Solicita un nuevo enlace de recuperación.';
      feedback.style.display = 'block';
      document.getElementById('resetForm').style.display = 'none';
    }

    const form = document.getElementById('resetForm');
    const passwordInput = document.getElementById('password');
    const confirmPasswordInput = document.getElementById('confirmPassword');
    const submitBtn = document.getElementById('submitBtn');
    const btnText = document.getElementById('btnText');
    const btnSpinner = document.getElementById('btnSpinner');
    const feedback = document.getElementById('feedback');
    const successMessage = document.getElementById('successMessage');

    form?.addEventListener('submit', async (event) => {
      event.preventDefault();

      feedback.style.display = 'none';
      feedback.textContent = '';

      const password = passwordInput.value.trim();
      const confirmPassword = confirmPasswordInput.value.trim();

      if (password.length < 8) {
        feedback.className = 'alert alert-error';
        feedback.textContent = 'La nueva contraseña debe tener al menos 8 caracteres.';
        feedback.style.display = 'block';
        return;
      }

      if (password !== confirmPassword) {
        feedback.className = 'alert alert-error';
        feedback.textContent = 'Las contraseñas no coinciden.';
        feedback.style.display = 'block';
        return;
      }

      submitBtn.disabled = true;
      btnText.style.display = 'none';
      btnSpinner.style.display = 'block';

      try {
        const response = await fetch(`${API_BASE_URL}/auth/reset-password`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, nuevaPassword: password })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.message || 'No se pudo restablecer la contraseña');
        }

        form.style.display = 'none';
        successMessage.style.display = 'block';

        setTimeout(() => {
          window.location.href = '/login.html';
        }, 2500);

      } catch (error) {
        feedback.className = 'alert alert-error';
        feedback.textContent = error.message || 'Ocurrió un error. Intenta nuevamente.';
        feedback.style.display = 'block';
      } finally {
        submitBtn.disabled = false;
        btnText.style.display = 'inline';
        btnSpinner.style.display = 'none';
      }
    });
  </script>
</body>
</html>
