<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Estado de Cuenta - Admin Fashion Box</title>
    <link rel="icon" type="image/png" href="/icon/Logo_Razo.png" />

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script src="js/auth-guard-admin.js"></script>
    <script src="js/token-refresh.js"></script>

    <link rel="stylesheet" href="css/styles.css" />`n    <link rel="stylesheet" href="css/fashion-theme.css" />
    <link rel="stylesheet" href="css/admin.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
    />
      <link rel="stylesheet" href="css/mobile-responsive.css" />
  </head>
  <body data-sidebar="admin" data-page-title="Estado de cuenta">
    <div class="admin-layout">
      <div id="sidebar-container"></div>

      <main class="admin-main">
        <div id="admin-header-container"></div>

        <div class="admin-content" style="display: grid; gap: 1.25rem">
          <section class="admin-card" style="padding: 1.25rem">
            <div
              style="
                display: flex;
                justify-content: space-between;
                align-items: center;
                gap: 1rem;
                flex-wrap: wrap;
              "
            >
              <div>
                <h2 style="margin: 0; font-size: 1.1rem">Estado de cuenta (Proveedores)</h2>
                <div style="margin-top: 0.25rem; color: #6b7280; font-size: 0.9rem">
                  Consulta tipo banca: saldos, cargos y abonos.
                </div>
              </div>

              <div style="display: flex; gap: 0.75rem; align-items: center; flex-wrap: wrap">
                <button id="btnRefresh" type="button" class="btn btn-secondary" style="padding: 0.55rem 1rem">
                  <i class="bi bi-arrow-repeat"></i> Actualizar
                </button>
              </div>
            </div>
          </section>

          <section class="admin-card" style="padding: 1.25rem">
            <div id="loadingState" class="loading" style="display: none; min-height: 140px">
              <div class="spinner"></div>
            </div>

            <div
              id="emptyState"
              style="
                display: none;
                padding: 1rem;
                border: 1px dashed rgba(107, 114, 128, 0.35);
                border-radius: 0.75rem;
                color: #6b7280;
              "
            >
              No hay proveedores con movimientos.
            </div>

            <div id="proveedoresGrid" class="edocuenta-grid" style="display: none"></div>
          </section>
        </div>
      </main>
    </div>

    <script src="js/layout.js" defer></script>`n    <script src="js/sidebar-toggle.js" defer></script>
    <script src="js/api.js"></script>
    <script src="js/admin-header-dropdown.js"></script>
    <script src="js/components/admin-header-loader.js"></script>
    <script src="js/components/user-profile.js"></script>
    <script src="js/admin-edocuenta.js" defer></script>

    <style>
      .edocuenta-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 1rem;
      }

      @media (max-width: 1100px) {
        .edocuenta-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 720px) {
        .edocuenta-grid {
          grid-template-columns: 1fr;
        }
      }

      .bank-card {
        border: 1px solid rgba(0, 0, 0, 0.06);
        border-radius: 1rem;
        background: #fff;
        padding: 1rem;
        box-shadow: 0 10px 26px rgba(0, 0, 0, 0.06);
        display: grid;
        gap: 0.9rem;
      }

      .bank-card-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.75rem;
      }

      .bank-provider {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        min-width: 0;
      }

      .bank-provider-logo {
        width: 44px;
        height: 44px;
        border-radius: 0.95rem;
        background: rgba(249, 115, 22, 0.12);
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 900;
        color: #9a3412;
        flex: 0 0 auto;
      }

      .bank-provider-name {
        font-weight: 900;
        color: #111827;
        line-height: 1.1;
        max-width: 100%;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .bank-provider-sub {
        margin-top: 0.15rem;
        font-size: 0.85rem;
        color: #6b7280;
      }

      .bank-balance {
        font-size: 1.65rem;
        font-weight: 1000;
        color: #111827;
        letter-spacing: -0.02em;
      }

      .bank-balance-sub {
        font-size: 0.85rem;
        color: #6b7280;
      }

      .bank-meta {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 0.75rem;
        flex-wrap: wrap;
        color: #6b7280;
        font-size: 0.85rem;
      }

      .bank-actions {
        display: flex;
        justify-content: flex-end;
        gap: 0.75rem;
      }

      .bank-actions .btn {
        padding: 0.55rem 1rem;
      }
    </style>
  </body>
</html>
