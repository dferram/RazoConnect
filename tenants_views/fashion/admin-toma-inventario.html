<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Auditoría de Inventario (Doble Ciego) - Admin Fashion Box</title>
    <link rel="icon" type="image/png" href="/icon/Logo_Fashion.png" />

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <!-- PROTECCIÓN DE AUTENTICACIÓN ADMIN -->
    <script src="js/auth-guard-admin.js"></script>

    <!-- SISTEMA DE RENOVACIÓN DE TOKENS -->
    <script src="js/token-refresh.js"></script>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles-fashion.css" />
    <link rel="stylesheet" href="css/fashion-theme-fashion.css" />
    <link rel="stylesheet" href="css/admin-fashion.css" />
      <link rel="stylesheet" href="css/mobile-responsive-fashion.css" />
  </head>
  <body data-page-title="Auditoría Inventario">
    <div class="admin-layout">
      <!-- Sidebar -->
      <div id="sidebar-container"></div>

      <!-- Main Content -->
      <main class="admin-main">
        <div id="admin-header-container"></div>

        <div class="admin-content" style="display: grid; gap: 1.25rem">
          <section class="admin-card" style="padding: 1.25rem">
            <div
              style="
                display: flex;
                flex-wrap: wrap;
                gap: 1rem;
                align-items: end;
                justify-content: space-between;
              "
            >
              <div style="min-width: 280px; flex: 1" id="crearSesionBlock">
                <label for="sesionNombre" class="form-label">Nueva sesión</label>
                <div style="display: flex; gap: 0.75rem; flex-wrap: wrap">
                  <input
                    id="sesionNombre"
                    class="form-input"
                    placeholder="Ej: Auditoría Sucursal Centro"
                    style="min-width: 260px; flex: 1"
                  />
                  <button
                    type="button"
                    id="btnCrearSesion"
                    class="btn btn-primary"
                    style="background: var(--razo-orange, #f97316); border: none"
                  >
                    Crear
                  </button>
                </div>
              </div>

              <div style="min-width: 280px">
                <label for="sesionSelect" class="form-label">Sesión activa</label>
                <select id="sesionSelect" class="form-input">
                  <option value="">Selecciona una sesión…</option>
                </select>
              </div>

              <div style="display: grid; gap: 0.25rem; min-width: 280px">
                <div style="font-size: 0.85rem; color: #6b7280">Estatus</div>
                <div id="sesionEstatus" style="font-weight: 700">—</div>
                <div id="sesionStats" style="font-size: 0.85rem; color: #6b7280">
                  —
                </div>
              </div>
            </div>
          </section>

          <section class="admin-card" style="padding: 1.25rem">
            <ul class="nav nav-tabs" id="auditTabs" role="tablist">
              <li class="nav-item" role="presentation">
                <button
                  class="nav-link active"
                  id="operador-tab"
                  data-bs-toggle="tab"
                  data-bs-target="#operador"
                  type="button"
                  role="tab"
                >
                  Modo Operador
                </button>
              </li>
              <li class="nav-item" role="presentation" id="auditorTabLi">
                <button
                  class="nav-link"
                  id="auditor-tab"
                  data-bs-toggle="tab"
                  data-bs-target="#auditor"
                  type="button"
                  role="tab"
                >
                  Modo Auditor (Tablero)
                </button>
              </li>
            </ul>

            <div class="tab-content" style="padding-top: 1rem">
              <!-- Operador -->
              <div class="tab-pane fade show active" id="operador" role="tabpanel">
                <div
                  style="
                    display: grid;
                    gap: 1rem;
                    grid-template-columns: 1fr;
                  "
                >
                  <div
                    style="
                      display: grid;
                      gap: 0.75rem;
                      grid-template-columns: 1fr 180px 160px;
                      align-items: end;
                    "
                  >
                    <div>
                      <label class="form-label" for="skuInput">SKU</label>
                      <div style="position: relative">
                        <input
                          id="skuInput"
                          type="text"
                          class="form-input"
                          placeholder="Busca por SKU o nombre…"
                          autocomplete="off"
                          style="font-size: 1.1rem; padding: 0.85rem"
                        />
                        <input type="hidden" id="varianteIdSeleccionada" />
                        <div
                          id="resultadosBusqueda"
                          style="
                            position: absolute;
                            top: calc(100% + 6px);
                            left: 0;
                            right: 0;
                            z-index: 50;
                            background: #ffffff;
                            border: 1px solid rgba(0, 0, 0, 0.08);
                            border-radius: 0.75rem;
                            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.10);
                            max-height: 320px;
                            overflow-x: hidden;
                            overflow-y: auto;
                            display: none;
                          "
                        ></div>
                      </div>
                    </div>
                    <div>
                      <label class="form-label" for="cantidadInput">Cantidad</label>
                      <input
                        id="cantidadInput"
                        type="number"
                        min="0"
                        step="1"
                        class="form-input"
                        value="0"
                        style="font-size: 1.1rem; padding: 0.85rem"
                      />
                    </div>
                    <div>
                      <button
                        type="button"
                        id="btnRegistrar"
                        class="btn btn-primary"
                        style="
                          width: 100%;
                          background: var(--razo-orange, #f97316);
                          border: none;
                          padding: 0.85rem;
                        "
                        disabled
                      >
                        Registrar
                      </button>
                    </div>
                  </div>

                  <div
                    style="
                      padding: 0.75rem 1rem;
                      background: #f0f9ff;
                      border-radius: 0.75rem;
                      border-left: 4px solid #0ea5e9;
                      color: #0369a1;
                    "
                  >
                    Al enviar, el formulario se limpia y vuelve el foco a SKU.
                    No se muestra el conteo del otro equipo.
                  </div>

                  <div
                    id="ultimoRegistro"
                    style="
                      padding: 0.75rem 1rem;
                      border: 1px solid rgba(0, 0, 0, 0.06);
                      border-radius: 0.75rem;
                      color: #6b7280;
                    "
                  >
                    Último registro: —
                  </div>
                </div>
              </div>

              <!-- Auditor -->
              <div class="tab-pane fade" id="auditor" role="tabpanel">
                <div
                  style="
                    display: flex;
                    justify-content: space-between;
                    align-items: center;
                    gap: 0.75rem;
                    flex-wrap: wrap;
                    margin-bottom: 0.75rem;
                  "
                >
                  <div style="display: flex; gap: 0.75rem; flex-wrap: wrap">
                    <button
                      type="button"
                      id="btnRefrescar"
                      class="btn btn-outline-secondary"
                    >
                      Refrescar
                    </button>
                    <button
                      type="button"
                      id="btnAplicar"
                      class="btn btn-primary"
                      style="background: var(--razo-orange, #f97316); border: none"
                      disabled
                    >
                      Aplicar Inventario
                    </button>
                  </div>

                  <div
                    id="aplicarHint"
                    style="font-size: 0.9rem; color: #6b7280"
                  >
                    —
                  </div>
                </div>

                <div id="dashboardLoading" class="loading" style="display: none">
                  <div class="spinner"></div>
                </div>

                <div style="overflow-x: auto">
                  <table class="admin-table" id="dashboardTable" style="display: none">
                    <thead>
                      <tr>
                        <th>SKU</th>
                        <th>Producto</th>
                        <th>Estatus</th>
                        <th style="width: 220px">Detalle</th>
                      </tr>
                    </thead>
                    <tbody id="dashboardTbody"></tbody>
                  </table>
                </div>
              </div>
            </div>
          </section>
        </div>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/layout.js" defer></script>
    <script src="js/sidebar-toggle.js" defer></script>
    <script src="js/api.js"></script>
    <script src="js/components/admin-header-loader.js"></script>
    <script src="js/components/user-profile.js"></script>
    <script src="js/admin-header-dropdown.js"></script>

    <script>
      const crearSesionBlock = document.getElementById("crearSesionBlock");
      const auditorTabLi = document.getElementById("auditorTabLi");

      const sesionNombre = document.getElementById("sesionNombre");
      const btnCrearSesion = document.getElementById("btnCrearSesion");
      const sesionSelect = document.getElementById("sesionSelect");
      const sesionEstatus = document.getElementById("sesionEstatus");
      const sesionStats = document.getElementById("sesionStats");

      const skuInput = document.getElementById("skuInput");
      const varianteIdSeleccionada = document.getElementById(
        "varianteIdSeleccionada"
      );
      const resultadosBusqueda = document.getElementById("resultadosBusqueda");
      const cantidadInput = document.getElementById("cantidadInput");
      const btnRegistrar = document.getElementById("btnRegistrar");
      const ultimoRegistro = document.getElementById("ultimoRegistro");

      const btnRefrescar = document.getElementById("btnRefrescar");
      const btnAplicar = document.getElementById("btnAplicar");
      const aplicarHint = document.getElementById("aplicarHint");
      const dashboardLoading = document.getElementById("dashboardLoading");
      const dashboardTable = document.getElementById("dashboardTable");
      const dashboardTbody = document.getElementById("dashboardTbody");

      const state = {
        sesionId: null,
        sesionEstatus: null,
        filas: [],
        isAgente: false,
      };

      const getAdminDataForAudit = () => {
        if (typeof window.getAdminData === "function") {
          return window.getAdminData();
        }
        const raw = localStorage.getItem("Fashion Box_admin");
        if (!raw) return null;
        try {
          return JSON.parse(raw);
        } catch (e) {
          return null;
        }
      };

      const detectIsAgente = () => {
        const adminData = getAdminDataForAudit();
        if (!adminData) return false;

        const rol = adminData.rol ? String(adminData.rol).toLowerCase() : "";
        if (rol === "agente") return true;

        if (Array.isArray(adminData.roles)) {
          return adminData.roles.some(
            (r) => r && String(r).toLowerCase() === "agente"
          );
        }

        const origen = adminData.origen || adminData.adminSource;
        if (origen && String(origen).toLowerCase() === "agent") return true;

        return false;
      };

      const applyRoleRestrictions = () => {
        state.isAgente = detectIsAgente();

        if (state.isAgente) {
          if (crearSesionBlock) crearSesionBlock.style.display = "none";
          if (btnAplicar) btnAplicar.style.display = "none";
          if (btnRefrescar) btnRefrescar.style.display = "none";
          if (auditorTabLi) auditorTabLi.style.display = "none";

          // Forzar pestaña Operador
          try {
            const opTabBtn = document.getElementById("operador-tab");
            if (opTabBtn) {
              const tab = bootstrap.Tab.getOrCreateInstance(opTabBtn);
              tab.show();
            }
          } catch (e) {
            // ignore
          }
        }
      };

      const toast = (icon, title) =>
        Swal.fire({
          toast: true,
          position: "top-end",
          icon,
          title,
          showConfirmButton: false,
          timer: 1600,
          timerProgressBar: true,
        });

      const setDashboardLoading = (loading) => {
        dashboardLoading.style.display = loading ? "block" : "none";
      };

      const safeText = (v) => (v == null ? "" : String(v));

      const clearResultadosBusqueda = () => {
        if (!resultadosBusqueda) return;
        resultadosBusqueda.innerHTML = "";
        resultadosBusqueda.style.display = "none";
      };

      const renderResultadosBusqueda = (resultados) => {
        if (!resultadosBusqueda) return;
        resultadosBusqueda.innerHTML = "";

        if (!Array.isArray(resultados) || resultados.length === 0) {
          resultadosBusqueda.style.display = "none";
          return;
        }

        for (const item of resultados) {
          const row = document.createElement("div");
          row.style.display = "flex";
          row.style.alignItems = "center";
          row.style.gap = "0.75rem";
          row.style.padding = "0.6rem 0.75rem";
          row.style.cursor = "pointer";
          row.style.borderBottom = "1px solid rgba(0,0,0,0.06)";

          row.addEventListener("mouseenter", () => {
            row.style.background = "rgba(249, 115, 22, 0.08)";
          });
          row.addEventListener("mouseleave", () => {
            row.style.background = "transparent";
          });

          const img = document.createElement("img");
          img.src = item.imagen || "/icon/Logo_Fashion.png";
          img.alt = safeText(item.nombreProducto);
          img.style.width = "40px";
          img.style.height = "40px";
          img.style.objectFit = "cover";
          img.style.borderRadius = "0.75rem";
          img.style.border = "1px solid rgba(0,0,0,0.06)";

          const text = document.createElement("div");
          text.style.display = "grid";
          text.style.lineHeight = "1.1";

          const sku = document.createElement("div");
          sku.style.fontWeight = "700";
          sku.textContent = safeText(item.sku);

          const name = document.createElement("div");
          name.style.fontSize = "0.9rem";
          name.style.color = "#6b7280";
          const varianteLabel = safeText(item.nombreVariante).trim();
          name.textContent = varianteLabel
            ? `${safeText(item.nombreProducto)} (${varianteLabel})`
            : safeText(item.nombreProducto);

          text.appendChild(sku);
          text.appendChild(name);

          row.appendChild(img);
          row.appendChild(text);

          row.addEventListener("click", () => {
            skuInput.value = safeText(item.sku);
            varianteIdSeleccionada.value = String(item.varianteId || "");
            clearResultadosBusqueda();
            cantidadInput.focus();
          });

          resultadosBusqueda.appendChild(row);
        }

        // Quitar borde final
        const last = resultadosBusqueda.lastElementChild;
        if (last) last.style.borderBottom = "none";

        resultadosBusqueda.style.display = "block";
      };

      let searchTimer = null;
      const buscarConDebounce = () => {
        if (!skuInput || !resultadosBusqueda) return;
        const q = safeText(skuInput.value).trim();

        // Al cambiar texto, invalidar selección previa
        varianteIdSeleccionada.value = "";

        if (searchTimer) {
          clearTimeout(searchTimer);
        }

        if (q.length < 2) {
          clearResultadosBusqueda();
          return;
        }

        searchTimer = setTimeout(async () => {
          try {
            const resp = await apiCall(
              `/admin/auditoria-inventario/buscar-productos?q=${encodeURIComponent(
                q
              )}`,
              { method: "GET" }
            );

            if (!resp.ok) {
              clearResultadosBusqueda();
              return;
            }

            const resultados = Array.isArray(resp.data?.data?.resultados)
              ? resp.data.data.resultados
              : [];
            renderResultadosBusqueda(resultados);
          } catch (e) {
            clearResultadosBusqueda();
          }
        }, 300);
      };

      const updateControls = () => {
        const hasSesion = Boolean(state.sesionId);
        btnRegistrar.disabled = !hasSesion;

        const validados = state.filas.filter((f) => f.estatusFila === "VALIDADO").length;
        const conflictos = state.filas.filter((f) => f.estatusFila === "CONFLICTO").length;
        const canApply =
          hasSesion &&
          state.sesionEstatus === "ABIERTA" &&
          validados > 0 &&
          !state.isAgente;
        btnAplicar.disabled = !canApply;

        if (!hasSesion) {
          aplicarHint.textContent = "Selecciona una sesión.";
          return;
        }

        if (state.sesionEstatus !== "ABIERTA") {
          aplicarHint.textContent = 
o se puede aplicar: sesión ${safeText(state.sesionEstatus)}.`;
          return;
        }

        if (validados === 0) {
          aplicarHint.textContent = "No hay productos validados para aplicar.";
          return;
        }

        if (conflictos > 0) {
          aplicarHint.textContent = `Listo para aplicar ${validados} validado(s). ${conflictos} conflicto(s) serán ignorados.`;
          return;
        }

        aplicarHint.textContent = `Listo para aplicar ${validados} producto(s) validado(s).`;
      };

      const renderDashboard = (data) => {
        dashboardTbody.innerHTML = "";
        const filas = Array.isArray(data?.filas) ? data.filas : [];
        state.filas = filas;
        state.sesionEstatus = data?.sesion?.estatus || null;

        sesionEstatus.textContent = safeText(state.sesionEstatus || "—");

        const stats = data?.stats || {};
        sesionStats.textContent = `Total: ${safeText(stats.total || 0)} · Validados: ${safeText(
          stats.validados || 0
        )} · Conflictos: ${safeText(stats.conflictos || 0)} · Pendientes: ${safeText(
          stats.pendientes || 0
        )}`;

        if (!filas.length) {
          dashboardTable.style.display = "none";
          updateControls();
          return;
        }

        dashboardTable.style.display = "table";

        for (const f of filas) {
          const tr = document.createElement("tr");

          // Colores: Validado (verde), Conflicto (rojo), Pendiente (amarillo)
          if (f.estatusFila === "VALIDADO") {
            tr.style.background = "rgba(34, 197, 94, 0.10)";
          } else if (f.estatusFila === "CONFLICTO") {
            tr.style.background = "rgba(239, 68, 68, 0.10)";
          } else {
            tr.style.background = "rgba(245, 158, 11, 0.10)";
          }

          const tdSku = document.createElement("td");
          tdSku.textContent = safeText(f.sku);

          const tdProd = document.createElement("td");
          tdProd.textContent = safeText(f.nombreProducto);

          const tdEstatus = document.createElement("td");
          tdEstatus.textContent = safeText(f.estatusFila);

          const tdDetalle = document.createElement("td");
          if (f.estatusFila === "CONFLICTO") {
            const aTxt = f.conteoA == null ? "🔒" : safeText(f.conteoA);
            const bTxt = f.conteoB == null ? "🔒" : safeText(f.conteoB);
            tdDetalle.textContent = `A: ${aTxt} · B: ${bTxt}`;
          } else if (f.estatusFila === "VALIDADO") {
            tdDetalle.textContent = `Final: ${safeText(f.cantidadFinal)}`;
          } else {
            tdDetalle.textContent = "Pendiente";
          }

          tr.appendChild(tdSku);
          tr.appendChild(tdProd);
          tr.appendChild(tdEstatus);
          tr.appendChild(tdDetalle);
          dashboardTbody.appendChild(tr);
        }

        updateControls();
      };

      const fillSesionesSelect = (sesiones, preferId) => {
        const current = sesionSelect.value;
        sesionSelect.innerHTML = "";

        const placeholder = document.createElement("option");
        placeholder.value = "";
        placeholder.textContent = "Selecciona una sesión…";
        sesionSelect.appendChild(placeholder);

        for (const s of sesiones) {
          const option = document.createElement("option");
          option.value = String(s.sesionId);
          option.textContent = `#${s.sesionId} — ${safeText(s.nombre)} (${safeText(
            s.estatus
          )})`;
          sesionSelect.appendChild(option);
        }

        const targetId = preferId || (current ? Number.parseInt(current, 10) : null);
        if (Number.isInteger(targetId) && targetId > 0) {
          const exists = Array.from(sesionSelect.options).some(
            (o) => o.value === String(targetId)
          );
          if (exists) {
            sesionSelect.value = String(targetId);
            state.sesionId = targetId;
          }
        }
      };

      const loadSesiones = async (preferId) => {
        try {
          const resp = await apiCall(
            "/admin/auditoria-inventario/sesiones?estatus=ABIERTA",
            { method: "GET" }
          );

          if (!resp.ok) {
            throw new Error(resp.data?.message || "No se pudieron cargar sesiones");
          }

          const sesiones = Array.isArray(resp.data?.data?.sesiones)
            ? resp.data.data.sesiones
            : [];

          fillSesionesSelect(sesiones, preferId);
          updateControls();
        } catch (error) {
          console.error(error);
          // Mantener placeholder si falla
        }
      };

      const loadDashboard = async () => {
        if (!state.sesionId) return;
        if (state.isAgente) return;
        setDashboardLoading(true);

        try {
          const resp = await apiCall(
            `/admin/auditoria-inventario/dashboard/${encodeURIComponent(state.sesionId)}`,
            { method: "GET" }
          );

          if (!resp.ok) {
            throw new Error(resp.data?.message || "Error al cargar dashboard");
          }

          renderDashboard(resp.data?.data);
        } catch (error) {
          console.error(error);
          toast("error", error.message || "Error al cargar");
        } finally {
          setDashboardLoading(false);
        }
      };

      const crearSesion = async () => {
        if (state.isAgente) {
          toast("error", "No tienes permisos para crear sesiones");
          return;
        }
        const nombre = safeText(sesionNombre.value).trim();
        if (!nombre) {
          toast("warning", "Escribe un nombre de sesión");
          return;
        }

        try {
          btnCrearSesion.disabled = true;
          const resp = await apiCall("/admin/auditoria-inventario/crear-sesion", {
            method: "POST",
            body: JSON.stringify({ nombre }),
          });

          if (!resp.ok) {
            throw new Error(resp.data?.message || "No se pudo crear sesión");
          }

          const sesion = resp.data?.data?.sesion;
          if (!sesion?.sesionId) {
            throw new Error("Respuesta inválida del servidor");
          }

          const option = document.createElement("option");
          option.value = String(sesion.sesionId);
          option.textContent = `#${sesion.sesionId} — ${safeText(sesion.nombre)}`;
          sesionSelect.appendChild(option);

          sesionSelect.value = String(sesion.sesionId);
          state.sesionId = sesion.sesionId;
          state.sesionEstatus = sesion.estatus;

          toast("success", "Sesión creada");
          sesionNombre.value = "";

          skuInput.focus();
          await loadDashboard();
        } catch (error) {
          console.error(error);
          toast("error", error.message || "Error al crear sesión");
        } finally {
          btnCrearSesion.disabled = false;
          updateControls();
        }
      };

      const registrarConteo = async () => {
        if (!state.sesionId) {
          toast("warning", "Selecciona una sesión");
          return;
        }

        const sku = safeText(skuInput.value).trim();
        const varianteId = Number.parseInt(varianteIdSeleccionada.value, 10);
        const cantidad = Number.parseInt(cantidadInput.value || "0", 10) || 0;

        if (!sku) {
          toast("warning", "Busca y selecciona un producto");
          skuInput.focus();
          return;
        }

        if (!Number.isInteger(varianteId) || varianteId <= 0) {
          toast("warning", "Selecciona un resultado del buscador");
          skuInput.focus();
          return;
        }

        if (cantidad < 0) {
          toast("warning", "Cantidad inválida");
          cantidadInput.focus();
          return;
        }

        try {
          btnRegistrar.disabled = true;

          const resp = await apiCall("/admin/auditoria-inventario/registrar-conteo", {
            method: "POST",
            body: JSON.stringify({
              sesionId: state.sesionId,
              varianteId,
              cantidad,
              usuarioId: null,
            }),
          });

          if (!resp.ok) {
            throw new Error(resp.data?.message || "No se pudo registrar");
          }

          toast("success", `Registrado: ${sku} (${cantidad})`);
          ultimoRegistro.textContent = `Último registro: ${safeText(
            sku
          )} · Cantidad: ${cantidad} · Estatus: ${safeText(
            resp.data?.data?.conteo?.estatusFila
          )}`;

          skuInput.value = "";
          varianteIdSeleccionada.value = "";
          clearResultadosBusqueda();
          cantidadInput.value = "0";
          skuInput.focus();

          // refrescar tablero de fondo
          loadDashboard();
        } catch (error) {
          console.error(error);
          toast("error", error.message || "Error al registrar");
          skuInput.focus();
        } finally {
          btnRegistrar.disabled = false;
        }
      };

      const aplicarInventario = async () => {
        if (!state.sesionId) return;
        if (state.isAgente) {
          toast("error", "No tienes permisos para aplicar inventario");
          return;
        }

        const validados = state.filas.filter((f) => f.estatusFila === "VALIDADO").length;
        const conflictos = state.filas.filter((f) => f.estatusFila === "CONFLICTO").length;
        const pendientes = state.filas.filter((f) => f.estatusFila === "PENDIENTE_A" || f.estatusFila === "PENDIENTE_B").length;

        if (validados === 0) {
          toast("warning", "No hay productos validados para aplicar");
          return;
        }

        let confirmText = `Se aplicará el inventario de ${validados} producto(s) VALIDADO(S).`;
        if (conflictos > 0) {
          confirmText += `\n\nLos ${conflictos} producto(s) en CONFLICTO serán ignorados y quedarán registrados en esta sesión cerrada.`;
        }
        if (pendientes > 0) {
          confirmText += `\n\nLos ${pendientes} producto(s) PENDIENTES también serán ignorados.`;
        }
        confirmText += "\n\n¿Desea continuar?";

        const confirm = await Swal.fire({
          icon: "warning",
          title: "Aplicar inventario parcial",
          html: confirmText.replace(/\n/g, "<br>"),
          showCancelButton: true,
          confirmButtonText: "Aplicar",
          cancelButtonText: "Cancelar",
          confirmButtonColor: "#F97316",
        });

        if (!confirm.isConfirmed) return;

        try {
          btnAplicar.disabled = true;
          const resp = await apiCall(
            `/admin/auditoria-inventario/aplicar/${encodeURIComponent(state.sesionId)}`,
            { method: "POST" }
          );

          if (!resp.ok) {
            if (resp.status === 409) {
              throw new Error(resp.data?.message || "No se puede aplicar");
            }
            throw new Error(resp.data?.message || "Error al aplicar");
          }

          const result = resp.data?.data || {};
          let successMsg = `Inventario aplicado: ${result.filasProcesadas || validados} producto(s) actualizado(s).`;
          if (conflictos > 0 || pendientes > 0) {
            successMsg += ` ${conflictos + pendientes} ítem(s) no aplicado(s) quedaron registrados.`;
          }

          await Swal.fire({
            icon: "success",
            title: "Aplicado",
            html: successMsg.replace(/\. /g, ".<br>"),
            confirmButtonColor: "#F97316",
          });

          await loadDashboard();
        } catch (error) {
          console.error(error);
          await Swal.fire({
            icon: "error",
            title: "Error",
            text: error.message || "No se pudo aplicar",
            confirmButtonColor: "#F97316",
          });
        } finally {
          updateControls();
        }
      };

      btnCrearSesion.addEventListener("click", crearSesion);
      sesionNombre.addEventListener("keydown", (e) => {
        if (e.key === "Enter") crearSesion();
      });

      sesionSelect.addEventListener("change", async () => {
        const id = Number.parseInt(sesionSelect.value, 10);
        if (!id) {
          state.sesionId = null;
          state.sesionEstatus = null;
          state.filas = [];
          sesionEstatus.textContent = "—";
          sesionStats.textContent = "—";
          dashboardTable.style.display = "none";
          updateControls();
          return;
        }

        state.sesionId = id;
        await loadDashboard();
        skuInput.focus();
      });

      btnRegistrar.addEventListener("click", registrarConteo);
      skuInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
          if (resultadosBusqueda && resultadosBusqueda.style.display === "block") {
            return;
          }
          registrarConteo();
        }
      });
      skuInput.addEventListener("input", buscarConDebounce);
      document.addEventListener("click", (e) => {
        const target = e.target;
        if (!target) return;
        if (resultadosBusqueda && resultadosBusqueda.contains(target)) return;
        if (skuInput && (target === skuInput || skuInput.contains(target))) return;
        clearResultadosBusqueda();
      });
      cantidadInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter") registrarConteo();
      });

      btnRefrescar.addEventListener("click", loadDashboard);
      btnAplicar.addEventListener("click", aplicarInventario);

      updateControls();
      applyRoleRestrictions();

      // Auto-seleccionar sesión desde querystring (?sesionId=123)
      try {
        const params = new URLSearchParams(window.location.search);
        const sesionIdParam = Number.parseInt(params.get("sesionId"), 10);
        if (Number.isInteger(sesionIdParam) && sesionIdParam > 0) {
          loadSesiones(sesionIdParam).then(() => {
            if (state.sesionId && !state.isAgente) {
              loadDashboard();
            }
          });
        } else {
          loadSesiones(null);
        }
      } catch (e) {
        // ignore
        loadSesiones(null);
      }
      skuInput.focus();
    </script>
  </body>
</html>
