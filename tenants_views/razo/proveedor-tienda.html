<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tienda por Marca - RazoConnect</title>
    <link rel="icon" type="image/png" href="/icon/Logo_Razo.png" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/catalogo-profesional.css" />
    <link rel="stylesheet" href="css/components/sidebar-filtros.css" />
    <link rel="stylesheet" href="css/auth-modal.css" />
    <link rel="stylesheet" href="css/mobile-responsive.css" />
    <link rel="stylesheet" href="css/search-autocomplete.css" />
  </head>
  <body>
    <div id="header-container"></div>

    <div class="container main-content-spacer" style="padding-bottom: 3rem">
      <!-- Header -->
      <div
        style="
          display: flex;
          justify-content: space-between;
          align-items: center;
          margin-bottom: 2rem;
        "
      >
        <div>
          <h1 id="brandName" class="catalog-main-title">
            Cargando...
          </h1>
          <p class="catalog-subtitle">
            Catálogo Oficial • <span id="productCount">0</span> productos disponibles
          </p>
        </div>
        <div
          style="
            display: flex;
            flex-direction: column;
            gap: 1rem;
            align-items: flex-end;
          "
        >
          <a href="/carrito.html" class="cart-modern" title="Ver carrito">
            🛒
            <span class="sr-only">Ver carrito</span>
          </a>

          <form
            id="searchForm"
            class="search-container-modern"
            onsubmit="return false;"
          >
            <label for="search-bar" style="display: none">Buscar producto</label>
            <input
              type="search"
              id="search-bar"
              class="search-input-modern"
              placeholder="Buscar por nombre/SKU"
            />
            <svg
                class="search-icon-modern"
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                xmlns="http://www.w3.org/2000/svg"
              >
                <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2" />
                <path d="M16.5 16.5L21 21" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
              </svg>
          </form>
        </div>
      </div>

      <!-- Botón Toggle Filtros (Solo Móvil) -->
      <button 
        id="btn-toggle-filtros" 
        class="btn-toggle-filtros"
        type="button"
        aria-expanded="false"
        aria-controls="sidebar-filters-container"
      >
        <i class="bi bi-funnel"></i>
        <span>Filtrar y Ordenar</span>
        <i class="bi bi-chevron-down btn-toggle-filtros-chevron"></i>
      </button>

      <!-- Layout con Sidebar y Contenido -->
      <div style="display: grid; grid-template-columns: 200px 1fr; gap: 3rem">
        <div id="sidebar-filters-container" class="sidebar-filters-wrapper"></div>

        <!-- Contenido Principal -->
        <main>
          <!-- Toolbar de Ordenamiento -->
          <div class="catalog-toolbar" id="catalogToolbar" style="display: none">
            <span class="product-count-text" id="productCountToolbar">
              Mostrando <span id="productCountNumber">0</span> productos
            </span>
            <select class="sort-select" id="sortSelect">
              <option value="recommended">Ordenar por: Recomendados</option>
              <option value="price-asc">Precio: Menor a Mayor</option>
              <option value="price-desc">Precio: Mayor a Menor</option>
              <option value="newest">Más Recientes</option>
              <option value="name-asc">Nombre: A-Z</option>
              <option value="name-desc">Nombre: Z-A</option>
            </select>
          </div>

          <!-- Loading State -->
          <div id="loadingState" class="loading">
            <div class="spinner"></div>
          </div>

          <!-- Product Grid -->
          <div
            id="productGrid"
            class="product-grid"
            style="display: none"
          ></div>

          <!-- Empty State -->
          <div id="emptyState" class="empty-state" style="display: none">
            <div class="empty-state-icon">📦</div>
            <h2 class="empty-state-title">No hay productos disponibles</h2>
            <p class="empty-state-text">
              Esta marca aún no tiene productos en stock.
            </p>
          </div>
        </main>
      </div>
    </div>

    <script src="js/layout.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://sdk.mercadopago.com/js/v2"></script>
    <script src="js/api.js"></script>
    <script src="js/search-autocomplete.js"></script>
    <script src="js/variant-summary-utils.js"></script>

    <script>
      // ========================================
      // OBTENER ID DE PROVEEDOR DE LA URL
      // ========================================
      const urlParams = new URLSearchParams(window.location.search);
      const proveedorId = urlParams.get("id");

      console.log('🔍 [Proveedor-Tienda] proveedorId obtenido de URL:', proveedorId);

      if (!proveedorId) {
        console.error('❌ [Proveedor-Tienda] No se encontró proveedorId en URL, redirigiendo...');
        window.location.href = "/catalogo.html";
      }

      // ========================================
      // CARGAR INFORMACIÓN DEL PROVEEDOR
      // ========================================
      async function loadProveedorInfo() {
        try {
          const response = await fetch("/api/public/proveedores");
          const data = await response.json();

          if (data.success && data.data && data.data.proveedores) {
            const proveedor = data.data.proveedores.find(
              (p) => p.proveedorId === parseInt(proveedorId)
            );

            if (proveedor) {
              document.getElementById("brandName").textContent = `Colección ${proveedor.nombre}`;
              document.title = `${proveedor.nombre} - RazoConnect`;
            } else {
              document.getElementById("brandName").textContent = "Marca no encontrada";
            }
          }
        } catch (error) {
          console.error("Error loading proveedor:", error);
        }
      }

      // Initialize search autocomplete
      document.addEventListener('DOMContentLoaded', () => {
        const searchInput = document.getElementById('search-bar');
        if (searchInput && proveedorId) {
          new SearchAutocomplete(searchInput, {
            minChars: 2,
            debounceMs: 300,
            additionalParams: { proveedorID: proveedorId },
            onSelect: (productoId) => {
              window.location.href = `/producto-detalle.html?id=${productoId}`;
            }
          });
        }
      });

      function handleCardButtonClick(event) {
        const button = event.currentTarget;
        const productoId = Number.parseInt(button.dataset.productoId, 10);
        const varianteId = Number.parseInt(button.dataset.varianteId, 10);
        const esBotonCarrito = button.dataset.onclick === "carrito";

        if (!esBotonCarrito) return;

        event.preventDefault();

        if (!varianteId) {
          if (productoId) {
            window.location.href = `/producto-detalle.html?id=${productoId}`;
          }
          return;
        }

        if (button.disabled) {
          showToast("Sin stock disponible para esta medida.", "warning");
          return;
        }

        CarritoService.agregarItem({
          productoId,
          varianteId,
          cantidad: 1,
        });
      }

      document.addEventListener("click", (event) => {
        const button = event.target.closest("[data-onclick='carrito']");
        if (!button) return;
        handleCardButtonClick(event);
      });

      const loadingState = document.getElementById("loadingState");
      const productGrid = document.getElementById("productGrid");
      const emptyState = document.getElementById("emptyState");
      const searchForm = document.getElementById("searchForm");
      const searchBar = document.getElementById("search-bar");
      const precioMinInput = document.getElementById("sidebarPrecioMin");
      const precioMaxInput = document.getElementById("sidebarPrecioMax");
      const dimensionesSelect = document.getElementById("filtro-dimensiones");
      const stockCheckbox = document.getElementById("filtro-stock");
      const productCount = document.getElementById("productCount");

      let todosLosProductos = [];
      let categoriaSeleccionada = null;
      let filtrosQueryActual = "";

      function obtenerFiltrosSeleccionados() {
        return {
          search: searchBar ? searchBar.value.trim() : "",
          precioMin: precioMinInput ? precioMinInput.value : "",
          precioMax: precioMaxInput ? precioMaxInput.value : "",
          dimension: dimensionesSelect ? dimensionesSelect.value : "",
          stock: stockCheckbox ? stockCheckbox.checked : false,
        };
      }

      function construirQueryString() {
        const params = new URLSearchParams();
        const filtros = obtenerFiltrosSeleccionados();

        // CRÍTICO: Siempre incluir el proveedor ID
        if (proveedorId) {
          params.append("proveedorID", proveedorId);
          console.log('✅ [Proveedor-Tienda] Agregando proveedorID al query:', proveedorId);
        } else {
          console.error('❌ [Proveedor-Tienda] proveedorId es null/undefined en construirQueryString');
        }

        if (categoriaSeleccionada !== null && categoriaSeleccionada > 0) {
          params.append("categoria", categoriaSeleccionada);
        }

        if (filtros.search) {
          params.append("search", filtros.search);
        }

        if (filtros.precioMin) {
          params.append("precioMin", filtros.precioMin);
        }

        if (filtros.precioMax) {
          params.append("precioMax", filtros.precioMax);
        }

        if (filtros.dimension) {
          params.append("dimension", filtros.dimension);
        }

        if (stockCheckbox && stockCheckbox.checked) {
          params.append("stock", "true");
        }

        const queryString = params.toString();
        return queryString ? `?${queryString}` : "";
      }

      // Format currency
      function formatCurrency(amount) {
        return new Intl.NumberFormat("es-MX", {
          style: "currency",
          currency: "MXN",
        }).format(amount);
      }

      // Render product card (copiado de catalogo.html)
      function renderProductCard(producto, filtroMedidaActivo = "") {
        const normalizarTexto = (valor) => {
          if (typeof valor === "number") {
            return String(valor).trim().toLowerCase();
          }
          return typeof valor === "string" ? valor.trim().toLowerCase() : "";
        };
        const parseNumero = (valor) => {
          const numero = parseFloat(valor);
          return Number.isFinite(numero) ? numero : null;
        };
        const parseEnteroSeguro = (valor) => {
          if (valor === null || valor === undefined) return null;
          const directo = Number(valor);
          if (Number.isFinite(directo)) return parseInt(directo, 10);
          const fallback = parseInt(valor, 10);
          return Number.isFinite(fallback) ? fallback : null;
        };

        const categoriaEmojis = {
          "ropa dama": "👗",
          "ropa caballero": "👔",
          accesorios: "👜",
          calzado: "👟",
          infantil: "👶",
        };

        const categoriaNombre = producto.categoria?.nombre
          ? producto.categoria.nombre.toLowerCase()
          : "";
        const emoji = categoriaEmojis[categoriaNombre] || "📦";
        
        const imagenVariante = producto.imagenUrl || null;
        const imagenesMaestro = Array.isArray(producto.imagenes) ? producto.imagenes : [];
        const imagenMaestra = imagenesMaestro.length > 0 
          ? (imagenesMaestro[0]?.url || imagenesMaestro[0]?.urlCompleta || null)
          : null;
        const imagenUrl = imagenVariante || imagenMaestra;
        const imagenAlt = producto.imagenAlt || producto.nombreProducto;

        const isCatalogPage = false; // Siempre mostrar precios en tienda de proveedor

        const mediaContent = imagenUrl
          ? `<img src="${imagenUrl}" alt="${imagenAlt}" class="product-media" />`
          : `<div class="product-media product-media--fallback">${emoji}</div>`;

        const variantes = Array.isArray(producto.variantes)
          ? producto.variantes
          : [];

        const totalVariantes = producto.totalVariantes || producto.variantesConStock || variantes.length || 0;
        const coloresUnicos = producto.coloresUnicos || 0;
        const medidasUnicas = producto.medidasUnicas || 0;
        const resumenVariantes = window.VariantSummaryUtils 
          ? window.VariantSummaryUtils.generarResumenVariantes(variantes, totalVariantes, coloresUnicos, medidasUnicas)
          : `${variantes.length} variantes`;

        const filtroMedidaNormalizado = normalizarTexto(filtroMedidaActivo);

        const varianteFiltrada =
          filtroMedidaNormalizado && variantes.length
            ? variantes.find((variante) => {
                const candidatos = [
                  variante?.dimensiones,
                  variante?.Dimensiones,
                  variante?.dimension,
                  variante?.Dimension,
                  variante?.medida,
                  variante?.Medida,
                  variante?.tamano,
                  variante?.Tamano,
                  variante?.tamanoEtiqueta,
                  variante?.presentacion,
                  variante?.Presentacion,
                ];
                return candidatos.some(
                  (valor) => normalizarTexto(valor) === filtroMedidaNormalizado
                );
              })
            : null;
        const usandoVarianteEspecifica = Boolean(varianteFiltrada);

        const precioPaqueteMin = Number.isFinite(producto.precioPaqueteMin)
          ? producto.precioPaqueteMin
          : null;
        const precioPaqueteMax = Number.isFinite(producto.precioPaqueteMax)
          ? producto.precioPaqueteMax
          : null;

        const mostrarRango =
          precioPaqueteMin !== null && precioPaqueteMax !== null;

        const precioBaseGeneral = parseNumero(producto.precioDesde) || 0;
        const precioOfertaGeneral = parseNumero(producto.precioOferta);

        const minSellingPriceAgg = parseNumero(producto.minSellingPrice);
        const maxSellingPriceAgg = parseNumero(producto.maxSellingPrice);
        const hasActiveOfferAgg = Boolean(producto.hasActiveOffer);

        const extraerPrecioVariante = (variante, llaves) => {
          for (const llave of llaves) {
            const valor = variante?.[llave];
            const numero = parseNumero(valor);
            if (numero !== null) {
              return numero;
            }
          }
          return null;
        };

        const precioVariante = usandoVarianteEspecifica
          ? extraerPrecioVariante(varianteFiltrada, [
              "precioUnitario",
              "PrecioUnitario",
              "precio",
              "Precio",
            ])
          : null;
        const precioOfertaVariante = usandoVarianteEspecifica
          ? extraerPrecioVariante(varianteFiltrada, [
              "precioOfertaUnitario",
              "PrecioOfertaUnitario",
              "precioOferta",
              "PrecioOferta",
            ])
          : null;

        const tieneOfertaVariante =
          precioVariante !== null &&
          precioOfertaVariante !== null &&
          precioOfertaVariante < precioVariante;
        const tieneOfertaGeneral =
          precioOfertaGeneral !== null &&
          precioOfertaGeneral > 0 &&
          precioOfertaGeneral < precioBaseGeneral;

        const precioHTML = (() => {
          if (usandoVarianteEspecifica && precioVariante !== null) {
            if (tieneOfertaVariante) {
              return `
                <div class="precio-contenedor">
                  <span class="precio-original">${formatCurrency(
                    precioVariante
                  )}</span>
                  <span class="precio-oferta">${formatCurrency(
                    precioOfertaVariante
                  )}</span>
                </div>
              `;
            }
            return `<span class="precio-normal">${formatCurrency(
              precioVariante
            )}</span>`;
          }

          if (minSellingPriceAgg !== null) {
            return `<span class="precio-normal">Desde ${formatCurrency(
              minSellingPriceAgg
            )}</span>`;
          }

          if (tieneOfertaGeneral) {
            return `
              <div class="precio-contenedor">
                <span class="precio-original">${formatCurrency(
                  precioBaseGeneral
                )}</span>
                <span class="precio-oferta">${formatCurrency(
                  precioOfertaGeneral
                )}</span>
              </div>
            `;
          }

          return precioBaseGeneral > 0
            ? `<span class="precio-normal">${formatCurrency(
                precioBaseGeneral
              )}</span>`
            : '<span class="precio-normal">Precio no disponible</span>';
        })();

        const badge = (() => {
          if (usandoVarianteEspecifica && tieneOfertaVariante) {
            return '<span class="product-badge product-badge--oferta">Oferta</span>';
          }
          if (!usandoVarianteEspecifica && hasActiveOfferAgg) {
            return '<span class="product-badge product-badge--oferta">Oferta</span>';
          }
          return '<span class="product-badge product-badge--nuevo">Nuevo</span>';
        })();

        const stockVariante = usandoVarianteEspecifica
          ? Math.max(parseEnteroSeguro(varianteFiltrada.stock) || 0, 0)
          : null;
        const sinStockVariante =
          usandoVarianteEspecifica && (!stockVariante || stockVariante < 1);
        const stockInfoHTML = usandoVarianteEspecifica
          ? `<small class="product-stock ${
              sinStockVariante ? "product-stock--agotado" : ""
            }">
              ${
                sinStockVariante
                  ? "Sin disponibilidad"
                  : `Disponibles: ${stockVariante}`
              }
            </small>`
          : "";

        const botonAgregarDisabled = usandoVarianteEspecifica
          ? sinStockVariante
          : false;
        const botonAgregarTexto = usandoVarianteEspecifica
          ? sinStockVariante
            ? "Agotado"
            : "Agregar al carrito"
          : "Ver detalles";

        const medidaBadgeHTML = usandoVarianteEspecifica
          ? `<span class="product-badge product-badge--medida">Medida: ${filtroMedidaActivo}</span>`
          : "";

        const productoId = producto.productoId;
        const varianteSeleccionadaId = usandoVarianteEspecifica
          ? varianteFiltrada?.varianteId || varianteFiltrada?.VarianteID
          : null;

        const zonaPrecioOAccion = `
          <div class="product-price">
            ${precioHTML}
          </div>
          ${stockInfoHTML}
        `;

        return `
        <a href="/producto-detalle.html?id=${productoId}" class="product-card">
          <div class="imagen-wrapper">
            ${badge}
            ${mediaContent}
            <button class="cart-floating-btn ${
              botonAgregarDisabled ? "cart-floating-btn--disabled" : ""
            }"
              type="button"
              ${botonAgregarDisabled ? "disabled aria-disabled=\"true\"" : ""}
              data-producto-id="${productoId}"
              data-variante-id="${varianteSeleccionadaId || ""}"
              data-onclick="carrito"
              title="${botonAgregarTexto}">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M9 2L9 22M2 9L22 9"/>
              </svg>
              <span class="sr-only">${botonAgregarTexto}</span>
            </button>
          </div>
          <div class="product-info">
            <span class="product-category">${producto.categoria?.nombre || "Sin categoría"}</span>
            <h3 class="product-title">${producto.nombreProducto}</h3>
            ${medidaBadgeHTML}
            ${zonaPrecioOAccion}
          </div>
        </a>
      `;
      }

      function renderProductos(productos = [], filtroMedidaActivo = "") {
        if (!Array.isArray(productos)) return "";
        return productos
          .map((producto) => renderProductCard(producto, filtroMedidaActivo))
          .join("");
      }

      function goToProduct(id) {
        window.location.href = `/producto-detalle.html?id=${id}`;
      }

      let sidebarInicializado = false;

      document.addEventListener("filtroCambiado", (event) => {
        const detail = event?.detail || {};
        if (searchBar && typeof detail.search === "string") {
          searchBar.value = detail.search;
        }
        if (precioMinInput && detail.precioMin !== undefined) {
          precioMinInput.value = detail.precioMin || "";
        }
        if (precioMaxInput && detail.precioMax !== undefined) {
          precioMaxInput.value = detail.precioMax || "";
        }

        categoriaSeleccionada =
          detail.categoriaId !== undefined && detail.categoriaId !== null
            ? parseInt(detail.categoriaId, 10)
            : null;

        if (detail.origen === "init") {
          sidebarInicializado = true;
          // Cargar productos con filtro de proveedor en la carga inicial
          aplicarFiltrosDesdeUI();
        } else {
          aplicarFiltrosDesdeUI();
        }
      });

      function mostrarProductos() {
        let productosFiltrados = todosLosProductos;

        if (productCount) {
          productCount.textContent = productosFiltrados.length;
        }

        const catalogToolbar = document.getElementById("catalogToolbar");
        const productCountNumber = document.getElementById("productCountNumber");
        
        if (productosFiltrados.length === 0) {
          if (catalogToolbar) catalogToolbar.style.display = "none";
          productGrid.style.display = "none";
          emptyState.style.display = "block";
        } else {
          if (catalogToolbar) {
            catalogToolbar.style.display = "flex";
            if (productCountNumber) {
              productCountNumber.textContent = productosFiltrados.length;
            }
          }
          const filtroMedidaActivo =
          dimensionesSelect && dimensionesSelect.value
            ? dimensionesSelect.value
            : "";
        productGrid.innerHTML = renderProductos(
          productosFiltrados,
          filtroMedidaActivo
        );
          productGrid.style.display = "grid";
          emptyState.style.display = "none";
        }
      }

      async function aplicarFiltrosDesdeUI() {
        filtrosQueryActual = construirQueryString();
        await loadProductos(filtrosQueryActual);
      }

      if (dimensionesSelect) {
        dimensionesSelect.addEventListener("change", () => {
          mostrarProductos();
        });
      }

      if (searchForm) {
        searchForm.addEventListener("submit", (event) => {
          event.preventDefault();
          aplicarFiltrosDesdeUI();
        });
      }

      const sortSelect = document.getElementById("sortSelect");
      if (sortSelect) {
        sortSelect.addEventListener("change", (event) => {
          sortProductos(event.target.value);
        });
      }

      function sortProductos(sortType) {
        if (!todosLosProductos || todosLosProductos.length === 0) return;

        let sortedProducts = [...todosLosProductos];

        switch (sortType) {
          case "price-asc":
            sortedProducts.sort((a, b) => {
              const priceA = a.precioOferta || a.precioDesde || 0;
              const priceB = b.precioOferta || b.precioDesde || 0;
              return priceA - priceB;
            });
            break;
          case "price-desc":
            sortedProducts.sort((a, b) => {
              const priceA = a.precioOferta || a.precioDesde || 0;
              const priceB = b.precioOferta || b.precioDesde || 0;
              return priceB - priceA;
            });
            break;
          case "newest":
            sortedProducts.sort((a, b) => b.productoId - a.productoId);
            break;
          case "name-asc":
            sortedProducts.sort((a, b) =>
              a.nombreProducto.localeCompare(b.nombreProducto)
            );
            break;
          case "name-desc":
            sortedProducts.sort((a, b) =>
              b.nombreProducto.localeCompare(a.nombreProducto)
            );
            break;
          default:
            break;
        }

        todosLosProductos = sortedProducts;
        mostrarProductos();
      }

      async function loadProductos(queryString = "") {
        try {
          console.log('📡 [Proveedor-Tienda] Cargando productos con query:', queryString);
          loadingState.style.display = "flex";
          productGrid.style.display = "none";
          emptyState.style.display = "none";

          const response = await API.getProductos(queryString);
          console.log('📦 [Proveedor-Tienda] Productos recibidos:', response.data?.data?.productos?.length || 0);

          if (response.ok && response.data.success) {
            todosLosProductos = response.data.data.productos;
            loadingState.style.display = "none";
            mostrarProductos();
          } else {
            throw new Error(
              response.data.message || "Error al cargar productos"
            );
          }
        } catch (error) {
          console.error("Error loading products:", error);
          loadingState.style.display = "none";
          showToast(
            "Error al cargar los productos. Intenta recargar la página.",
            "error"
          );
        }
      }

      // Cargar información del proveedor
      loadProveedorInfo();

      // ========================================
      // TOGGLE DE FILTROS PARA MÓVILES
      // ========================================
      const btnToggleFiltros = document.getElementById('btn-toggle-filtros');
      const sidebarFiltersWrapper = document.getElementById('sidebar-filters-container');

      if (btnToggleFiltros && sidebarFiltersWrapper) {
        btnToggleFiltros.addEventListener('click', () => {
          const isExpanded = btnToggleFiltros.getAttribute('aria-expanded') === 'true';
          
          btnToggleFiltros.setAttribute('aria-expanded', !isExpanded);
          sidebarFiltersWrapper.classList.toggle('filtros-abiertos');
          
          const chevron = btnToggleFiltros.querySelector('.btn-toggle-filtros-chevron');
          if (chevron) {
            if (isExpanded) {
              chevron.classList.remove('bi-chevron-up');
              chevron.classList.add('bi-chevron-down');
            } else {
              chevron.classList.remove('bi-chevron-down');
              chevron.classList.add('bi-chevron-up');
            }
          }
        });

        const mobileQuery = window.matchMedia('(max-width: 768px)');
        
        document.addEventListener('click', (event) => {
          if (mobileQuery.matches) {
            const isClickInsideButton = btnToggleFiltros.contains(event.target);
            const isClickInsideSidebar = sidebarFiltersWrapper.contains(event.target);
            
            if (!isClickInsideButton && !isClickInsideSidebar) {
              if (sidebarFiltersWrapper.classList.contains('filtros-abiertos')) {
                btnToggleFiltros.setAttribute('aria-expanded', 'false');
                sidebarFiltersWrapper.classList.remove('filtros-abiertos');
                
                const chevron = btnToggleFiltros.querySelector('.btn-toggle-filtros-chevron');
                if (chevron) {
                  chevron.classList.remove('bi-chevron-up');
                  chevron.classList.add('bi-chevron-down');
                }
              }
            }
          }
        });
      }
    </script>

    <style>

         ======================================== */

        .btn-toggle-filtros-chevron {

        }

        .btn-toggle-filtros[aria-expanded="true"] {

        .sidebar-filters-wrapper {

    </style>
