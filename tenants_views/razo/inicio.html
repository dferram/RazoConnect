<!DOCTYPE html>

  <head>

  <body>

    <!-- Mensaje de Bienvenida Dinámico -->

    <!-- Widget de Cuenta Regresiva Estacional -->
    <section

      <div class="container">
        <div class="countdown-container">
          <div class="countdown-info">
            <div class="countdown-event-icon" id="eventIcon"></div>
            <div>
              <h3 class="countdown-event-title" id="eventTitle"></h3>
              <p class="countdown-event-subtitle" id="eventSubtitle"></p>

            <div class="countdown-box">

            <div class="countdown-separator">:</div>
            <div class="countdown-box">
              <span class="countdown-number" id="hoursCount">0</span>

            </div>
            <div class="countdown-separator">:</div>
            <div class="countdown-box">
              <span class="countdown-number" id="minutesCount">0</span>
              <span class="countdown-text">Min</span>
            </div>
          </div>

          <a href="/catalogo.html" class="countdown-cta" id="countdownCTA"></a>
        </div>
      </div>
    </section>

          <p class="hero-description" id="slide1-description"></p>

          <!-- Contenedor para Botones Extra Dinámicos -->

        </div>
      </div>

      <!-- ✅ SLIDE 2 - Contenido Dinámico desde CMS -->
      <div class="hero-slide" id="hero-slide-2">
        <div class="hero-content">
          <p class="hero-eyebrow" id="slide2-eyebrow"></p>
          <h1 class="hero-title" id="slide2-title"></h1>
          <p class="hero-description" id="slide2-description"></p>
          
          <!-- Botón Principal -->
          <a href="#" class="hero-cta btn btn-primary" id="slide2-btn-primary"></a>
          
          <!-- Contenedor para Botones Extra Dinámicos -->
          <div class="hero-extra-buttons" id="slide2-extra-buttons"></div>
        </div>
      </div>

      <!-- ✅ SLIDE 3 - Contenido Dinámico desde CMS -->
      <div class="hero-slide" id="hero-slide-3">
        <div class="hero-content">
          <p class="hero-eyebrow" id="slide3-eyebrow"></p>
          <h1 class="hero-title" id="slide3-title"></h1>
          <p class="hero-description" id="slide3-description"></p>
          
          <!-- Botón Principal -->
          <a href="#" class="hero-cta btn btn-primary" id="slide3-btn-primary"></a>
          
          <!-- Contenedor para Botones Extra Dinámicos -->
          <div class="hero-extra-buttons" id="slide3-extra-buttons"></div>
        </div>
      </div>

      <!-- Controles del Slider -->
      <div class="slider-controls">
        <button
          class="slider-dot active"
          data-slide="0"
          aria-label="Ir a slide 1"
        ></button>
        <button
          class="slider-dot"
          data-slide="1"
          aria-label="Ir a slide 2"
        ></button>
        <button
          class="slider-dot"
          data-slide="2"
          aria-label="Ir a slide 3"
        ></button>
      </div>
    </section>

    <!-- Categorías Visuales -->
    <section class="categories-section">
      <div class="container">
        <div class="section-header">
          <h2 class="section-title">Explora por categoría</h2>
          <p class="section-subtitle">Encuentra lo que necesitas rápidamente</p>
        </div>

        <div class="categories-grid" id="categoriesGrid">
          <!-- Loading -->
          <div class="loading-skeleton" style="height: 180px"></div>
          <div class="loading-skeleton" style="height: 180px"></div>
          <div class="loading-skeleton" style="height: 180px"></div>
          <div class="loading-skeleton" style="height: 180px"></div>
        </div>
      </div>
    </section>

    <!-- Ofertas Relámpago -->
    <section class="flash-sales-section seasonal-tint" id="flashSalesSection">
      <div class="container">
        <div class="flash-header">
          <h2 class="flash-title">⚡ Ofertas relámpago</h2>
          <p class="flash-subtitle">
            Descuentos increíbles seleccionados para tu negocio
          </p>
        </div>

        <div class="carousel-container">
          <button
            class="carousel-btn prev"
            type="button"
            onclick="scrollOfertas(-1)"
            aria-label="Ver ofertas anteriores"
          >
            ❮
          </button>

          <div class="flash-grid" id="ofertasTrack">
            <!-- Loading -->
            <div class="loading-skeleton" style="height: 450px"></div>
            <div class="loading-skeleton" style="height: 450px"></div>
            <div class="loading-skeleton" style="height: 450px"></div>
            <div class="loading-skeleton" style="height: 450px"></div>
          </div>

          <button
            class="carousel-btn next"
            type="button"
            onclick="scrollOfertas(1)"
            aria-label="Ver más ofertas"
          >
            ❯
          </button>
        </div>
      </div>
    </section>

    <!-- Nuevos Arribos (Scroll Horizontal) -->
    <section class="new-arrivals-section">
      <div class="container">
        <div class="section-header">
          <h2 class="section-title">Nuevos productos</h2>
          <p class="section-subtitle">
            ¡Lo más reciente de nuestro catálogo!
          </p>
        </div>

        <div class="arrivals-scroll-container">
          <div class="arrivals-grid" id="arrivalsGrid">
            <!-- Loading -->
            <div
              class="loading-skeleton"
              style="width: 300px; height: 480px"
            ></div>
            <div
              class="loading-skeleton"
              style="width: 300px; height: 480px"
            ></div>
            <div
              class="loading-skeleton"
              style="width: 300px; height: 480px"
            ></div>
            <div
              class="loading-skeleton"
              style="width: 300px; height: 480px"
            ></div>
            <div
              class="loading-skeleton"
              style="width: 300px; height: 480px"
            ></div>
            <div
              class="loading-skeleton"
              style="width: 300px; height: 480px"
            ></div>
            <div
              class="loading-skeleton"
              style="width: 300px; height: 480px"
            ></div>
            <div
              class="loading-skeleton"
              style="width: 300px; height: 480px"
            ></div>
          </div>
        </div>
      </div>
    </section>

    <!-- Footer Dinámico -->
    <div id="footer-container"></div>

    <!-- Modal: Autenticación (Login/Registro) -->
    <div id="modalAuth" class="modal" style="z-index: 2000; display: none; position: fixed; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.6); backdrop-filter: blur(4px); justify-content: center; align-items: center; padding: 1rem;">
      <div class="modal-content" style="max-width: 500px; width: 95%; padding: 2rem; border-radius: 1rem; background: white;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
          <h2 style="font-size: 1.5rem; font-weight: 700; margin: 0; color: #111827;">Inicia sesión</h2>
          <button id="btnCerrarAuthInicio" style="border: none; background: transparent; font-size: 1.5rem; cursor: pointer; color: #6b7280;" aria-label="Cerrar">×</button>
        </div>
        <div style="display: flex; gap: 0.5rem; margin-bottom: 1.5rem; border-bottom: 2px solid #e5e7eb;">
          <button id="tabLoginInicio" class="auth-tab active" style="flex: 1; padding: 0.75rem; border: none; background: transparent; cursor: pointer; font-weight: 600; border-bottom: 3px solid var(--razo-orange); color: var(--razo-orange);">Iniciar Sesión</button>
          <button id="tabRegistroInicio" class="auth-tab" style="flex: 1; padding: 0.75rem; border: none; background: transparent; cursor: pointer; font-weight: 600; border-bottom: 3px solid transparent; color: #6b7280;">Registrarse</button>
        </div>
        <form id="formLoginInicio" style="display: block;">
          <div style="margin-bottom: 1rem;">
            <label for="loginEmailInicio" style="display: block; margin-bottom: 0.5rem; font-weight: 600; color: #374151;">Email</label>
            <input type="email" id="loginEmailInicio" required style="width: 100%; padding: 0.75rem; border: 1px solid #d1d5db; border-radius: 0.5rem; font-size: 1rem;" placeholder="tu@email.com">
          </div>
          <div style="margin-bottom: 1.5rem;">
            <label for="loginPasswordInicio" style="display: block; margin-bottom: 0.5rem; font-weight: 600; color: #374151;">Contraseña</label>
            <input type="password" id="loginPasswordInicio" required style="width: 100%; padding: 0.75rem; border: 1px solid #d1d5db; border-radius: 0.5rem; font-size: 1rem;" placeholder="••••••••">
          </div>
          <button type="submit" class="btn btn-primary" style="width: 100%; padding: 0.875rem; font-size: 1rem; font-weight: 600; background: var(--razo-orange); border: none;">Iniciar Sesión</button>
        </form>
        <form id="formRegistroInicio" style="display: none;">
          <div style="margin-bottom: 1rem;">
            <label for="regNombreInicio" style="display: block; margin-bottom: 0.5rem; font-weight: 600; color: #374151;">Nombre Completo</label>
            <input type="text" id="regNombreInicio" required style="width: 100%; padding: 0.75rem; border: 1px solid #d1d5db; border-radius: 0.5rem; font-size: 1rem;" placeholder="Juan Pérez">
          </div>
          <div style="margin-bottom: 1rem;">
            <label for="regEmailInicio" style="display: block; margin-bottom: 0.5rem; font-weight: 600; color: #374151;">Email</label>
            <input type="email" id="regEmailInicio" required style="width: 100%; padding: 0.75rem; border: 1px solid #d1d5db; border-radius: 0.5rem; font-size: 1rem;" placeholder="tu@email.com">
          </div>
          <div style="margin-bottom: 1rem;">
            <label for="regTelefonoInicio" style="display: block; margin-bottom: 0.5rem; font-weight: 600; color: #374151;">Teléfono</label>
            <input type="tel" id="regTelefonoInicio" required style="width: 100%; padding: 0.75rem; border: 1px solid #d1d5db; border-radius: 0.5rem; font-size: 1rem;" placeholder="5512345678">
          </div>
          <div style="margin-bottom: 1.5rem;">
            <label for="regPasswordInicio" style="display: block; margin-bottom: 0.5rem; font-weight: 600; color: #374151;">Contraseña</label>
            <input type="password" id="regPasswordInicio" required style="width: 100%; padding: 0.75rem; border: 1px solid #d1d5db; border-radius: 0.5rem; font-size: 1rem;" placeholder="••••••••">
          </div>
          <button type="submit" class="btn btn-primary" style="width: 100%; padding: 0.875rem; font-size: 1rem; font-weight: 600; background: var(--razo-orange); border: none;">Crear Cuenta</button>
        </form>
      </div>
    </div>

    <script src="/js/theme-manager.js"></script>

    <!-- Lógica de Contenido Dinámico -->
    <script src="/js/inicio-seasonal.js"></script>

    <!-- Modal Auth Logic -->
    <script>
      (function() {
        const modalAuth = document.getElementById('modalAuth');
        const btnCerrar = document.getElementById('btnCerrarAuthInicio');
        const tabLogin = document.getElementById('tabLoginInicio');
        const tabRegistro = document.getElementById('tabRegistroInicio');
        const formLogin = document.getElementById('formLoginInicio');
        const formRegistro = document.getElementById('formRegistroInicio');

        function switchToLogin() {
          tabLogin.style.borderBottomColor = 'var(--razo-orange)';
          tabLogin.style.color = 'var(--razo-orange)';
          tabRegistro.style.borderBottomColor = 'transparent';
          tabRegistro.style.color = '#6b7280';
          formLogin.style.display = 'block';
          formRegistro.style.display = 'none';
        }

        function switchToRegistro() {
          tabRegistro.style.borderBottomColor = 'var(--razo-orange)';
          tabRegistro.style.color = 'var(--razo-orange)';
          tabLogin.style.borderBottomColor = 'transparent';
          tabLogin.style.color = '#6b7280';
          formRegistro.style.display = 'block';
          formLogin.style.display = 'none';
        }

        tabLogin.addEventListener('click', switchToLogin);
        tabRegistro.addEventListener('click', switchToRegistro);
        btnCerrar.addEventListener('click', () => {
          modalAuth.style.display = 'none';
          formLogin.reset();
          formRegistro.reset();
        });

        formLogin.addEventListener('submit', async (e) => {
          e.preventDefault();
          const email = document.getElementById('loginEmailInicio').value.trim();
          const password = document.getElementById('loginPasswordInicio').value;
          try {
            const response = await API.login(email, password);
            if (response.ok && response.data.success) {
              localStorage.setItem('razoconnect_token', response.data.token);
              localStorage.setItem('razoconnect_user', JSON.stringify(response.data.cliente));
              modalAuth.style.display = 'none';
              window.dispatchEvent(new Event('razoconnect:auth-changed'));
              window.location.href = '/dashboard.html';
            } else {
              alert(response.data.message || 'Credenciales incorrectas');
            }
          } catch (error) {
            console.error('Login error:', error);
            alert('Error al iniciar sesión');
          }
        });

        formRegistro.addEventListener('submit', async (e) => {
          e.preventDefault();
          const nombre = document.getElementById('regNombreInicio').value.trim();
          const email = document.getElementById('regEmailInicio').value.trim();
          const telefono = document.getElementById('regTelefonoInicio').value.trim();
          const password = document.getElementById('regPasswordInicio').value;
          try {
            const response = await API.registroCliente({ Nombre: nombre, Email: email, Telefono: telefono, Password: password });
            if (response.ok && response.data.success) {
              const loginResponse = await API.login(email, password);
              if (loginResponse.ok && loginResponse.data.success) {
                localStorage.setItem('razoconnect_token', loginResponse.data.token);
                localStorage.setItem('razoconnect_user', JSON.stringify(loginResponse.data.cliente));
                modalAuth.style.display = 'none';
                window.dispatchEvent(new Event('razoconnect:auth-changed'));
                window.location.href = '/dashboard.html';
              }
            } else {
              alert(response.data.message || 'Error al crear cuenta');
            }
          } catch (error) {
            console.error('Registration error:', error);
            alert('Error al registrar usuario');
          }
        });

        window.addEventListener('click', (e) => {
          if (e.target === modalAuth) modalAuth.style.display = 'none';
        });
      })();
    </script>
  
    <!-- Cargador de Contenido Dinámico desde API -->
    <script src="/js/inicio-dynamic-content.js"></script>

    <!-- ✅ xCore Live Preview Receiver (only in preview mode) -->
    <script>
      // Load preview receiver only when in preview mode
      const urlParams = new URLSearchParams(window.location.search);
      if (urlParams.get('preview') === 'true') {
        const script = document.createElement('script');
        script.src = '/js/xcore-preview-receiver.js';
        document.body.appendChild(script);
        console.log('🎯 xCore Preview Mode: Receiver script loaded');
      }
    </script>
  </body>
