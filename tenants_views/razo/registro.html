<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registro - RazoConnect | Regalando Sonrisas</title>
    <link rel="icon" type="image/png" href="/icon/Logo_Razo.png" />
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/registro.css" />
    <link rel="stylesheet" href="css/mobile-responsive.css" />
    
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  </head>
  <body>
    <nav class="navbar">
      <div class="container navbar-content">
        <a href="/" class="navbar-brand"><img src="/icon/Logo_Razo.png" class="titulo-emoji-reemplazo" alt="Razo">RazoConnect</a>
        <ul class="navbar-menu">
          <li><a href="/login.html" class="navbar-link">Iniciar Sesión</a></li>
        </ul>
      </div>
    </nav>

    <div class="container">
      <div class="form-container">
        <h1 class="form-title">Crear cuenta</h1>
        <p class="form-subtitle">Regístrate como cliente en RazoConnect</p>

        <div class="social-register-section mb-4">
          <a
            href="/api/auth/google"
            class="btn-google w-100"
          >
            <img
              src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg"
              alt="Google logo"
              width="24"
              height="24"
              class="me-2"
            />
            <span>Registrarse con Google</span>
          </a>

          <div class="text-center my-3 text-muted">
            <small>&mdash; o regístrate con tu correo &mdash;</small>
          </div>
        </div>

        <div id="alert" class="registro-alert-hidden"></div>

        <form id="registroForm">
          <div class="form-group">
            <label class="form-label" for="nombre">Nombre</label>
            <input
              type="text"
              id="nombre"
              name="nombre"
              class="form-input"
              placeholder="Juan"
              required
            />
            <div class="form-error" id="nombreError"></div>
          </div>

          <div class="form-group">
            <label class="form-label" for="apellido">Apellido</label>
            <input
              type="text"
              id="apellido"
              name="apellido"
              class="form-input"
              placeholder="Pérez"
              required
            />
            <div class="form-error" id="apellidoError"></div>
          </div>

          <div class="form-group">
            <label class="form-label" for="email">Correo Electrónico</label>
            <input
              type="email"
              id="email"
              name="email"
              class="form-input"
              placeholder="tu@email.com"
            />
            <div class="form-error" id="emailError"></div>
            <small class="registro-hint-text">Ingresa correo o teléfono (o ambos)</small>
          </div>

          <div class="form-group">
            <label class="form-label" for="telefono">Teléfono</label>
            <input
              type="tel"
              id="telefono"
              name="telefono"
              class="form-input"
              placeholder="5551234567"
            />
            <div class="form-error" id="telefonoError"></div>
          </div>

          <div class="form-group">
            <label class="form-label" for="password">Contraseña</label>
            <div class="registro-password-container">
              <input
                type="password"
                id="password"
                name="password"
                class="form-input registro-password-input"
                placeholder="Mínimo 6 caracteres"
                required
              />
              <button
                type="button"
                id="togglePassword"
                class="registro-toggle-password"
                aria-label="Mostrar contraseña"
              >
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                  <circle cx="12" cy="12" r="3"></circle>
                </svg>
              </button>
            </div>
            <div class="form-error" id="passwordError"></div>
          </div>

          <div class="form-group">
            <label class="form-label" for="confirmPassword"
              >Confirmar Contraseña</label
            >
            <div class="registro-password-container">
              <input
                type="password"
                id="confirmPassword"
                name="confirmPassword"
                class="form-input registro-password-input"
                placeholder="Repite tu contraseña"
                required
              />
              <button
                type="button"
                id="toggleConfirmPassword"
                class="registro-toggle-password"
                aria-label="Mostrar contraseña"
              >
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                  <circle cx="12" cy="12" r="3"></circle>
                </svg>
              </button>
            </div>
            <div class="form-error" id="confirmPasswordError"></div>
          </div>

          <button
            type="submit"
            class="btn btn-primary btn-block"
            id="submitBtn"
          >
            <span id="btnText">Crear cuenta</span>
            <div
              class="spinner registro-btn-spinner"
              id="btnSpinner"
            ></div>
          </button>
        </form>

        <p class="text-center mt-3 registro-footer-text">
          ¿Ya tienes cuenta?
          <a
            href="/login.html"
            class="registro-footer-link"
            >Inicia sesión</a
          >
        </p>
      </div>
    </div>

    <script src="js/auth-manager.js"></script>
    <script src="js/api.js"></script>
    <script>
      const registroForm = document.getElementById("registroForm");
      const nombreInput = document.getElementById("nombre");
      const apellidoInput = document.getElementById("apellido");
      const emailInput = document.getElementById("email");
      const telefonoInput = document.getElementById("telefono");
      const passwordInput = document.getElementById("password");
      const confirmPasswordInput = document.getElementById("confirmPassword");
      const submitBtn = document.getElementById("submitBtn");
      const btnText = document.getElementById("btnText");
      const btnSpinner = document.getElementById("btnSpinner");
      const alertDiv = document.getElementById("alert");
      const togglePasswordBtn = document.getElementById("togglePassword");
      const toggleConfirmPasswordBtn = document.getElementById("toggleConfirmPassword");

      // Toggle password visibility
      if (togglePasswordBtn) {
        togglePasswordBtn.addEventListener("click", function() {
          const type = passwordInput.getAttribute("type") === "password" ? "text" : "password";
          passwordInput.setAttribute("type", type);
          
          if (type === "password") {
            this.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>';
          } else {
            this.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>';
          }
        });
      }

      // Toggle confirm password visibility
      if (toggleConfirmPasswordBtn) {
        toggleConfirmPasswordBtn.addEventListener("click", function() {
          const type = confirmPasswordInput.getAttribute("type") === "password" ? "text" : "password";
          confirmPasswordInput.setAttribute("type", type);
          
          if (type === "password") {
            this.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>';
          } else {
            this.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>';
          }
        });
      }

      // Check if user is already logged in
      if (isAuthenticated()) {
        window.location.href = "/inicio.html";
      }

      // Show alert message
      function showAlert(message, type = "error") {
        alertDiv.className = `alert alert-${type}`;
        alertDiv.textContent = message;
        alertDiv.style.display = "block";

        setTimeout(() => {
          alertDiv.style.display = "none";
        }, 5000);
      }

      // Validate email format
      function validateEmail(email) {
        const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        return re.test(email);
      }

      // Handle form submission
      registroForm.addEventListener("submit", async (e) => {
        e.preventDefault();

        // Clear previous errors
        document
          .querySelectorAll(".form-error")
          .forEach((el) => el.classList.remove("show"));
        document
          .querySelectorAll(".form-input")
          .forEach((el) => el.classList.remove("error"));

        const nombre = nombreInput.value.trim();
        const apellido = apellidoInput.value.trim();
        const email = emailInput.value.trim();
        const telefono = telefonoInput.value.trim();
        const password = passwordInput.value.trim();
        const confirmPassword = confirmPasswordInput.value.trim();

        // Validation
        let hasError = false;

        if (!nombre) {
          document.getElementById("nombreError").textContent =
            "El nombre es requerido";
          document.getElementById("nombreError").classList.add("show");
          nombreInput.classList.add("error");
          hasError = true;
        }

        if (!apellido) {
          document.getElementById("apellidoError").textContent =
            "El apellido es requerido";
          document.getElementById("apellidoError").classList.add("show");
          apellidoInput.classList.add("error");
          hasError = true;
        }

        // Validar que al menos uno de los dos (email o teléfono) esté presente
        if (!email && !telefono) {
          Swal.fire({
            title: 'Datos incompletos',
            text: 'Debes ingresar al menos un medio de contacto (Correo o Teléfono).',
            icon: 'warning',
            confirmButtonText: 'Entendido',
            confirmButtonColor: '#f97316'
          });
          hasError = true;
        }

        // Validar formato de email solo si se proporcionó
        if (email && !validateEmail(email)) {
          document.getElementById("emailError").textContent =
            "Formato de correo inválido";
          document.getElementById("emailError").classList.add("show");
          emailInput.classList.add("error");
          hasError = true;
        }

        // Validar formato de teléfono solo si se proporcionó
        if (telefono && (telefono.length < 10 || !/^\d+$/.test(telefono))) {
          document.getElementById("telefonoError").textContent =
            "El teléfono debe tener al menos 10 dígitos";
          document.getElementById("telefonoError").classList.add("show");
          telefonoInput.classList.add("error");
          hasError = true;
        }

        if (!password) {
          document.getElementById("passwordError").textContent =
            "La contraseña es requerida";
          document.getElementById("passwordError").classList.add("show");
          passwordInput.classList.add("error");
          hasError = true;
        } else if (password.length < 6) {
          document.getElementById("passwordError").textContent =
            "La contraseña debe tener al menos 6 caracteres";
          document.getElementById("passwordError").classList.add("show");
          passwordInput.classList.add("error");
          hasError = true;
        }

        if (!confirmPassword) {
          document.getElementById("confirmPasswordError").textContent =
            "Confirma tu contraseña";
          document.getElementById("confirmPasswordError").classList.add("show");
          confirmPasswordInput.classList.add("error");
          hasError = true;
        } else if (password !== confirmPassword) {
          document.getElementById("confirmPasswordError").textContent =
            "Las contraseñas no coinciden";
          document.getElementById("confirmPasswordError").classList.add("show");
          confirmPasswordInput.classList.add("error");
          hasError = true;
        }

        if (hasError) return;

        // Show loading state
        submitBtn.disabled = true;
        btnText.style.display = "none";
        btnSpinner.style.display = "block";

        try {
          const formData = {
            Nombre: nombre,
            Apellido: apellido,
            Email: email || null,
            Password: password,
            Telefono: telefono || null,
          };

          const response = await API.registroCliente(formData);

          if (response.ok && response.data.success) {
            // Save auth data
            saveAuthData(response.data.data.token, response.data.data.cliente);

            // Show success message with SweetAlert2
            Swal.fire({
              title: '¡Bienvenido a RazoConnect!',
              html: `<p>Tu cuenta ha sido creada exitosamente.</p>
                     <p style="margin-top: 1rem; color: #6b7280;">Serás redirigido al catálogo...</p>`,
              icon: 'success',
              confirmButtonText: 'Continuar',
              confirmButtonColor: '#10b981',
              timer: 2000,
              timerProgressBar: true
            }).then(() => {
              window.location.href = "/inicio.html";
            });
          } else {
            // Show error message
            const errorMessage =
              response.data.message || "Error al registrar la cuenta";

            // Detectar si es error de email o teléfono duplicado
            if (errorMessage.toLowerCase().includes("correo") || 
                errorMessage.toLowerCase().includes("email") ||
                errorMessage.toLowerCase().includes("teléfono") ||
                errorMessage.toLowerCase().includes("telefono")) {
              // Determinar si es staff o cliente
              const isStaffEmail = errorMessage.toLowerCase().includes("staff") || 
                                   errorMessage.toLowerCase().includes("administrador") ||
                                   errorMessage.toLowerCase().includes("agente");
              
              const isTelefono = errorMessage.toLowerCase().includes("teléfono") ||
                                 errorMessage.toLowerCase().includes("telefono");
              
              Swal.fire({
                title: '¡Atención!',
                html: `<p>${errorMessage}</p>
                       ${isStaffEmail ? 
                         '<p style="margin-top: 1rem; color: #6b7280;">Si eres parte del equipo, usa tu correo personal para compras.</p>' :
                         isTelefono ?
                         '<p style="margin-top: 1rem; color: #6b7280;">Este número ya está asociado a otra cuenta. Usa un teléfono diferente o intenta iniciar sesión.</p>' :
                         '<p style="margin-top: 1rem; color: #6b7280;">¿Intentas <a href="/login.html" style="color: #f97316; font-weight: 600;">iniciar sesión</a>?</p>'
                       }`,
                icon: 'warning',
                confirmButtonText: 'Entendido',
                confirmButtonColor: '#f97316',
                showCancelButton: !isStaffEmail && !isTelefono,
                cancelButtonText: 'Ir a Login',
                cancelButtonColor: '#6b7280'
              }).then((result) => {
                if (result.dismiss === Swal.DismissReason.cancel) {
                  window.location.href = '/login.html';
                }
              });
            } else if (response.data.errors && Array.isArray(response.data.errors)) {
              // Errores de validación múltiples
              Swal.fire({
                title: 'Errores de validación',
                html: '<ul style="text-align: left; padding-left: 1.5rem;">' +
                      response.data.errors.map(err => `<li>${err}</li>`).join('') +
                      '</ul>',
                icon: 'error',
                confirmButtonText: 'Corregir',
                confirmButtonColor: '#ef4444'
              });
            } else {
              // Otros errores
              Swal.fire({
                title: 'Error',
                text: errorMessage,
                icon: 'error',
                confirmButtonText: 'Entendido',
                confirmButtonColor: '#ef4444'
              });
            }
          }
        } catch (error) {
          console.error("Registro error:", error);
          Swal.fire({
            title: 'Error de conexión',
            text: 'No se pudo conectar con el servidor. Por favor, verifica tu conexión a internet e intenta nuevamente.',
            icon: 'error',
            confirmButtonText: 'Entendido',
            confirmButtonColor: '#ef4444'
          });
        } finally {
          // Reset button state
          submitBtn.disabled = false;
          btnText.style.display = "inline";
          btnSpinner.style.display = "none";
        }
      });

      // Real-time validation
      emailInput.addEventListener("blur", () => {
        const email = emailInput.value.trim();
        if (email && !validateEmail(email)) {
          document.getElementById("emailError").textContent =
            "Formato de correo inválido";
          document.getElementById("emailError").classList.add("show");
          emailInput.classList.add("error");
        } else {
          document.getElementById("emailError").classList.remove("show");
          emailInput.classList.remove("error");
        }
      });

      passwordInput.addEventListener("input", () => {
        const password = passwordInput.value;
        if (password.length > 0 && password.length < 6) {
          document.getElementById("passwordError").textContent =
            "Mínimo 6 caracteres";
          document.getElementById("passwordError").classList.add("show");
          passwordInput.classList.add("error");
        } else {
          document.getElementById("passwordError").classList.remove("show");
          passwordInput.classList.remove("error");
        }
      });

      confirmPasswordInput.addEventListener("input", () => {
        const password = passwordInput.value;
        const confirmPassword = confirmPasswordInput.value;
        if (confirmPassword.length > 0 && password !== confirmPassword) {
          document.getElementById("confirmPasswordError").textContent =
            "Las contraseñas no coinciden";
          document.getElementById("confirmPasswordError").classList.add("show");
          confirmPasswordInput.classList.add("error");
        } else {
          document
            .getElementById("confirmPasswordError")
            .classList.remove("show");
          confirmPasswordInput.classList.remove("error");
        }
      });
    </script>

    <!-- Sistema de Temas Estacionales -->
    <script src="/js/theme-manager.js"></script>
    <script src="js/instructional-banner.js"></script>
  </body>
</html>
