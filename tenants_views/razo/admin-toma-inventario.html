<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Auditoría de Inventario (Doble Ciego) - Admin RazoConnect</title>
    <link rel="icon" type="image/png" href="/icon/Logo_Razo.png" />

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <!-- PROTECCIÓN DE AUTENTICACIÓN ADMIN -->
    <script src="js/auth-guard-admin.js"></script>

    <!-- SISTEMA DE RENOVACIÓN DE TOKENS -->

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/admin.css" />
      <link rel="stylesheet" href="css/mobile-responsive.css" />
  </head>
  <body data-page-title="Auditoría Inventario">
    <div class="admin-layout">
      <!-- Sidebar -->
      <div id="sidebar-container"></div>

      <!-- Main Content -->
      <main class="admin-main">
        <div id="admin-header-container"></div>

        <div class="admin-content" style="display: grid; gap: 1.25rem">
          <section class="admin-card" style="padding: 1.25rem">
            <div
              style="
                display: flex;
                flex-wrap: wrap;
                gap: 1rem;
                align-items: end;
                justify-content: space-between;
              "
            >
              <div style="min-width: 280px; flex: 1" id="crearSesionBlock">
                <label for="sesionNombre" class="form-label">Nueva sesión</label>
                <div style="display: flex; gap: 0.75rem; flex-wrap: wrap">
                  <input
                    id="sesionNombre"
                    class="form-input"
                    placeholder="Ej: Auditoría Sucursal Centro"
                    style="min-width: 260px; flex: 1"
                  />
                  <button
                    type="button"
                    id="btnCrearSesion"
                    class="btn btn-primary"
                    style="background: var(--razo-orange, #f97316); border: none"
                  >
                    Crear
                  </button>
                </div>
              </div>

              <div style="min-width: 280px">
                <label for="sesionSelect" class="form-label">Sesión activa</label>
                <select id="sesionSelect" class="form-input">
                  <option value="">Selecciona una sesión…</option>
                </select>
              </div>

              <div style="display: grid; gap: 0.25rem; min-width: 280px">
                <div style="font-size: 0.85rem; color: #6b7280">Estatus</div>
                <div id="sesionEstatus" style="font-weight: 700">—</div>
                <div id="sesionStats" style="font-size: 0.85rem; color: #6b7280">
                  —
                </div>
              </div>
            </div>
          </section>

          <section class="admin-card" style="padding: 1.25rem">
            <ul class="nav nav-tabs" id="auditTabs" role="tablist">
              <li class="nav-item" role="presentation">
                <button
                  class="nav-link active"
                  id="operador-tab"
                  data-bs-toggle="tab"
                  data-bs-target="#operador"
                  type="button"
                  role="tab"
                >
                  Modo Operador
                </button>
              </li>
              <li class="nav-item" role="presentation" id="auditorTabLi">
                <button
                  class="nav-link"
                  id="auditor-tab"
                  data-bs-toggle="tab"
                  data-bs-target="#auditor"
                  type="button"
                  role="tab"
                >
                  Modo Auditor (Tablero)
                </button>
              </li>
            </ul>

            <div class="tab-content" style="padding-top: 1rem">
              <!-- Operador -->
              <div class="tab-pane fade show active" id="operador" role="tabpanel">
                <!-- Filtros de Búsqueda -->
                <div
                  style="
                    background: #fff;
                    border: 1px solid var(--razo-gray-light);
                    border-radius: 0.75rem;
                    padding: 1rem;
                    margin-bottom: 1rem;
                  "
                >
                  <div
                    style="
                      display: grid;
                      grid-template-columns: 1.5fr 1fr 1fr;
                      gap: 0.75rem;
                      align-items: end;
                    "
                  >
                    <div class="form-group" style="margin: 0">
                      <label for="searchInput" class="form-label">Buscar</label>
                      <input
                        id="searchInput"
                        type="text"
                        class="form-input"
                        placeholder="Buscar por SKU o nombre..."
                        style="padding: 0.8rem 0.9rem"
                      />
                    </div>

                    <div class="form-group" style="margin: 0">
                      <label for="filterCategoria" class="form-label">Categoría</label>
                      <select id="filterCategoria" class="form-input form-select">
                        <option value="">Todas</option>
                      </select>
                    </div>

                    <div class="form-group" style="margin: 0">
                      <label for="filterMedida" class="form-label">Medidas</label>
                      <select id="filterMedida" class="form-input form-select">
                        <option value="">Todas</option>
                      </select>
                    </div>
                  </div>
                </div>

                <!-- Indicador de Último Registro -->
                <div
                  id="ultimoRegistro"
                  style="
                    padding: 0.75rem 1rem;
                    background: #f0f9ff;
                    border: 1px solid #bae6fd;
                    border-radius: 0.75rem;
                    color: #0369a1;
                    margin-bottom: 1rem;
                    display: none;
                  "
                >
                  <strong>✓ Último registro:</strong> <span id="ultimoRegistroTexto">—</span>
                </div>

                <!-- Loading Spinner -->
                <div id="shelfLoading" class="loading" style="display: none">
                  <div class="spinner"></div>
                </div>

                <!-- Resumen de Resultados -->
                <div id="shelfSummary" style="color: var(--razo-gray-warm); font-size: 0.9rem; margin-bottom: 0.75rem"></div>

                <!-- Grilla de Productos (Estantería) -->
                <div id="productShelf" class="inventory-shelf-grid"></div>

                <!-- Estado Vacío -->
                <div id="emptyShelf" style="display: none">
                  <div class="empty-state">
                    <div class="empty-state-icon">📦</div>
                    <h3 class="empty-state-title">No se encontraron productos</h3>
                    <p class="empty-state-text">Prueba con otro término o ajusta los filtros.</p>
                  </div>
                </div>
              </div>

              <!-- Auditor -->
              <div class="tab-pane fade" id="auditor" role="tabpanel">
                <div
                  style="
                    display: flex;
                    justify-content: space-between;
                    align-items: center;
                    gap: 0.75rem;
                    flex-wrap: wrap;
                    margin-bottom: 0.75rem;
                  "
                >
                  <div style="display: flex; gap: 0.75rem; flex-wrap: wrap">
                    <button
                      type="button"
                      id="btnRefrescar"
                      class="btn btn-outline-secondary"
                    >
                      Refrescar
                    </button>
                    <button
                      type="button"
                      id="btnAplicar"
                      class="btn btn-primary"
                      style="background: var(--razo-orange, #f97316); border: none"
                      disabled
                    >
                      Aplicar Inventario
                    </button>
                  </div>

                  <div
                    id="aplicarHint"
                    style="font-size: 0.9rem; color: #6b7280"
                  >
                    —
                  </div>
                </div>

                <div id="dashboardLoading" class="loading" style="display: none">
                  <div class="spinner"></div>
                </div>

                <div style="overflow-x: auto">
                  <table class="admin-table" id="dashboardTable" style="display: none">
                    <thead>
                      <tr>
                        <th>SKU</th>
                        <th>Producto</th>
                        <th>Estatus</th>
                        <th style="width: 220px">Detalle</th>
                      </tr>
                    </thead>
                    <tbody id="dashboardTbody"></tbody>
                  </table>
                </div>
              </div>
            </div>
          </section>
        </div>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/layout.js" defer></script>
    <script src="js/sidebar-toggle.js" defer></script>
    <script src="js/api.js"></script>
    <script src="js/components/admin-header-loader.js"></script>
    <script src="js/components/user-profile.js"></script>
    <script src="js/admin-header-dropdown.js"></script>

    <style>
      .inventory-shelf-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 1rem;
      }

      .inventory-card {
        background: #ffffff;
        border: 1px solid var(--razo-gray-light);
        border-radius: 0.85rem;
        overflow: hidden;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.06);
        display: flex;
        flex-direction: column;
        transition: all 0.2s ease;
      }

      .inventory-card.registered {
        border: 2px solid #22c55e;
        box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.1);
      }

      .inventory-card-img {
        width: 100%;
        height: 180px;
        background: #f3f4f6;
        object-fit: cover;
        display: block;
      }

      .inventory-card-body {
        padding: 0.85rem;
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
        flex: 1;
      }

      .inventory-card-title {
        margin: 0;
        font-weight: 800;
        color: var(--razo-gray-dark);
        font-size: 1rem;
        line-height: 1.2;
      }

      .inventory-card-meta {
        font-size: 0.85rem;
        color: var(--razo-gray-warm);
      }

      .inventory-card-footer {
        padding: 0.75rem 0.85rem;
        border-top: 1px solid var(--razo-gray-light);
        display: flex;
        gap: 0.5rem;
        align-items: center;
      }

      .inventory-qty-input {
        flex: 1;
        padding: 0.6rem;
        border: 1px solid #d1d5db;
        border-radius: 0.5rem;
        font-size: 1rem;
        text-align: center;
        font-weight: 700;
      }

      .inventory-qty-input:focus {
        outline: none;
        border-color: var(--razo-orange);
        box-shadow: 0 0 0 3px rgba(249, 115, 22, 0.1);
      }

      .inventory-register-btn {
        padding: 0.6rem 1rem;
        background: var(--razo-orange);
        color: white;
        border: none;
        border-radius: 0.5rem;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.15s ease;
        white-space: nowrap;
      }

      .inventory-register-btn:hover {
        background: #ea580c;
        transform: translateY(-1px);
      }

      .inventory-register-btn:disabled {
        background: #d1d5db;
        cursor: not-allowed;
        transform: none;
      }

      .inventory-registered-badge {
        display: inline-flex;
        align-items: center;
        gap: 0.35rem;
        padding: 0.35rem 0.75rem;
        background: #dcfce7;
        color: #166534;
        border-radius: 0.5rem;
        font-size: 0.8rem;
        font-weight: 700;
      }

      @media (max-width: 768px) {
        .inventory-shelf-grid {
          grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
        }
      }

      @media (max-width: 520px) {
        .inventory-shelf-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>

    <script>
      const crearSesionBlock = document.getElementById("crearSesionBlock");
      const auditorTabLi = document.getElementById("auditorTabLi");

      const sesionNombre = document.getElementById("sesionNombre");
      const btnCrearSesion = document.getElementById("btnCrearSesion");
      const sesionSelect = document.getElementById("sesionSelect");
      const sesionEstatus = document.getElementById("sesionEstatus");
      const sesionStats = document.getElementById("sesionStats");

      const searchInput = document.getElementById("searchInput");
      const filterCategoria = document.getElementById("filterCategoria");
      const filterMedida = document.getElementById("filterMedida");
      const productShelf = document.getElementById("productShelf");
      const emptyShelf = document.getElementById("emptyShelf");
      const shelfLoading = document.getElementById("shelfLoading");
      const shelfSummary = document.getElementById("shelfSummary");
      const ultimoRegistro = document.getElementById("ultimoRegistro");
      const ultimoRegistroTexto = document.getElementById("ultimoRegistroTexto");

      const btnRefrescar = document.getElementById("btnRefrescar");
      const btnAplicar = document.getElementById("btnAplicar");
      const aplicarHint = document.getElementById("aplicarHint");
      const dashboardLoading = document.getElementById("dashboardLoading");
      const dashboardTable = document.getElementById("dashboardTable");
      const dashboardTbody = document.getElementById("dashboardTbody");

      const state = {
        sesionId: null,
        sesionEstatus: null,
        filas: [],
        isAgente: false,
        catalogo: [],
        filteredProducts: [],
        registeredVariants: new Set(),
      };

      const getAdminDataForAudit = () => {
        if (typeof window.getAdminData === "function") {
          return window.getAdminData();
        }
        const raw = localStorage.getItem("razoconnect_admin");
        if (!raw) return null;
        try {
          return JSON.parse(raw);
        } catch (e) {
          return null;
        }
      };

      const detectIsAgente = () => {
        const adminData = getAdminDataForAudit();
        if (!adminData) return false;

        const rol = adminData.rol ? String(adminData.rol).toLowerCase() : "";
        if (rol === "agente") return true;

        if (Array.isArray(adminData.roles)) {
          return adminData.roles.some(
            (r) => r && String(r).toLowerCase() === "agente"
          );
        }

        const origen = adminData.origen || adminData.adminSource;
        if (origen && String(origen).toLowerCase() === "agent") return true;

        return false;
      };

      const applyRoleRestrictions = () => {
        state.isAgente = detectIsAgente();

        if (state.isAgente) {
          if (crearSesionBlock) crearSesionBlock.style.display = "none";
          if (btnAplicar) btnAplicar.style.display = "none";
          if (btnRefrescar) btnRefrescar.style.display = "none";
          if (auditorTabLi) auditorTabLi.style.display = "none";

          // Forzar pestaña Operador
          try {
            const opTabBtn = document.getElementById("operador-tab");
            if (opTabBtn) {
              const tab = bootstrap.Tab.getOrCreateInstance(opTabBtn);
              tab.show();
            }
          } catch (e) {
            // ignore
          }
        }
      };

      const toast = (icon, title) =>
        Swal.fire({
          toast: true,
          position: "top-end",
          icon,
          title,
          showConfirmButton: false,
          timer: 1600,
          timerProgressBar: true,
        });

      const setDashboardLoading = (loading) => {
        dashboardLoading.style.display = loading ? "block" : "none";
      };

      const safeText = (v) => (v == null ? "" : String(v));

      const escapeHtml = (value) => {
        return (value || "").toString().replace(/[&<>"']/g, (c) => {
          switch (c) {
            case "&": return "&amp;";
            case "<": return "&lt;";
            case ">": return "&gt;";
            case '"': return "&quot;";
            case "'": return "&#39;";
            default: return c;
          }
        });
      };

      const setShelfLoading = (loading) => {
        if (shelfLoading) shelfLoading.style.display = loading ? "flex" : "none";
      };

      const normalizeText = (value) => {
        return (value || "").toString().trim().toLowerCase();
      };

      async function loadCategorias() {
        try {
          const resp = await apiCall("/admin/categorias", { method: "GET" });
          if (!resp.ok) return;
          
          const categorias = Array.isArray(resp.data?.data?.categorias) ? resp.data.data.categorias : [];
          
          if (filterCategoria) {
            categorias.forEach((c) => {
              const opt = document.createElement("option");
              opt.value = c.categoriaId;
              opt.textContent = c.nombre;
              filterCategoria.appendChild(opt);
            });
          }
        } catch (e) {
          console.error("Error cargando categorías:", e);
        }
      }

      async function loadMedidas() {
        try {
          const resp = await apiCall("/admin/medidas-existentes", { method: "GET" });
          if (!resp.ok) return;
          
          const medidas = Array.isArray(resp.data?.data?.medidas) ? resp.data.data.medidas : [];
          
          if (filterMedida) {
            medidas.forEach((m) => {
              const opt = document.createElement("option");
              opt.value = m;
              opt.textContent = m;
              filterMedida.appendChild(opt);
            });
          }
        } catch (e) {
          console.error("Error cargando medidas:", e);
        }
      }

      async function loadProductCatalog() {
        setShelfLoading(true);
        try {
          const resp = await apiCall(
            "/admin/auditoria-inventario/buscar-productos?q=",
            { method: "GET" }
          );

          if (!resp.ok) {
            throw new Error(resp.data?.message || "Error al cargar catálogo");
          }

          const resultados = Array.isArray(resp.data?.data?.resultados)
            ? resp.data.data.resultados
            : [];

          state.catalogo = resultados;
          applyFilters();
        } catch (e) {
          console.error("Error cargando catálogo:", e);
          state.catalogo = [];
          state.filteredProducts = [];
          renderShelf();
        } finally {
          setShelfLoading(false);
        }
      }

      function applyFilters() {
        const q = normalizeText(searchInput?.value || "");
        const categoriaId = (filterCategoria?.value || "").trim();
        const medida = (filterMedida?.value || "").trim();

        state.filteredProducts = state.catalogo.filter((item) => {
          if (categoriaId && String(item.categoriaId || "") !== categoriaId) return false;
          if (medida && normalizeText(item.medidas || "") !== normalizeText(medida)) return false;

          if (q) {
            const searchText = normalizeText(
              `${item.nombreProducto} ${item.sku} ${item.nombreVariante || ""}`
            );
            return searchText.includes(q);
          }

          return true;
        });

        renderShelf();
      }

      function renderShelf() {
        if (!productShelf || !emptyShelf) return;

        if (shelfSummary) {
          shelfSummary.textContent = `${state.filteredProducts.length} producto(s) encontrado(s)`;
        }

        if (state.filteredProducts.length === 0) {
          productShelf.innerHTML = "";
          emptyShelf.style.display = "block";
          return;
        }

        emptyShelf.style.display = "none";

        productShelf.innerHTML = state.filteredProducts
          .map((item) => {
            const varianteId = item.varianteId || 0;
            const isRegistered = state.registeredVariants.has(varianteId);
            const img = item.imagen || "/icon/Logo_Razo.png";
            const nombre = item.nombreProducto || "(Sin nombre)";
            const sku = item.sku || "—";
            const medidas = item.medidas || "—";
            const varianteLabel = item.nombreVariante ? ` (${item.nombreVariante})` : "";

            return `
              <div class="inventory-card ${isRegistered ? 'registered' : ''}" data-variante-id="${varianteId}">
                <img
                  src="${img}"
                  class="inventory-card-img"
                  alt="${escapeHtml(nombre)}"
                  loading="lazy"
                  onerror="this.src='/icon/Logo_Razo.png'; this.onerror=null;"
                />
                <div class="inventory-card-body">
                  <h3 class="inventory-card-title">${escapeHtml(nombre)}${escapeHtml(varianteLabel)}</h3>
                  <div class="inventory-card-meta">SKU: <code>${escapeHtml(sku)}</code></div>
                  <div class="inventory-card-meta">Medidas: <strong>${escapeHtml(medidas)}</strong></div>
                  ${isRegistered ? '<div class="inventory-registered-badge">✓ Registrado</div>' : ''}
                </div>
                <div class="inventory-card-footer">
                  <input
                    type="number"
                    class="inventory-qty-input"
                    id="qty-${varianteId}"
                    min="0"
                    step="1"
                    value="0"
                    placeholder="Cantidad"
                    ${!state.sesionId ? 'disabled' : ''}
                  />
                  <button
                    type="button"
                    class="inventory-register-btn"
                    onclick="registrarProducto(${varianteId})"
                    ${!state.sesionId ? 'disabled' : ''}
                  >
                    Registrar
                  </button>
                </div>
              </div>
            `;
          })
          .join("");
      }

      let searchDebounce = null;
      function onSearchChange() {
        if (searchDebounce) clearTimeout(searchDebounce);
        searchDebounce = setTimeout(() => applyFilters(), 300);
      }

      window.registrarProducto = async function(varianteId) {
        if (!state.sesionId) {
          toast("warning", "Selecciona una sesión");
          return;
        }

        const vid = Number.parseInt(varianteId, 10);
        if (!Number.isInteger(vid) || vid <= 0) {
          toast("warning", "Variante inválida");
          return;
        }

        const qtyInput = document.getElementById(`qty-${vid}`);
        if (!qtyInput) {
          toast("warning", "No se encontró el input de cantidad");
          return;
        }

        const cantidad = Number.parseInt(qtyInput.value || "0", 10) || 0;

        if (cantidad < 0) {
          toast("warning", "Cantidad inválida");
          qtyInput.focus();
          return;
        }

        try {
          const resp = await apiCall("/admin/auditoria-inventario/registrar-conteo", {
            method: "POST",
            body: JSON.stringify({
              sesionId: state.sesionId,
              varianteId: vid,
              cantidad,
              usuarioId: null,
            }),
          });

          if (!resp.ok) {
            throw new Error(resp.data?.message || "No se pudo registrar");
          }

          const producto = state.catalogo.find(p => p.varianteId === vid);
          const nombreProducto = producto ? `${producto.nombreProducto} (${producto.sku})` : `Variante ${vid}`;

          toast("success", `Registrado: ${nombreProducto} (${cantidad})`);
          
          state.registeredVariants.add(vid);
          
          if (ultimoRegistro && ultimoRegistroTexto) {
            ultimoRegistroTexto.textContent = `${nombreProducto} · Cantidad: ${cantidad}`;
            ultimoRegistro.style.display = "block";
          }

          qtyInput.value = "0";
          
          renderShelf();
          loadDashboard();
        } catch (error) {
          console.error(error);
          toast("error", error.message || "Error al registrar");
        }
      };

      const updateControls = () => {
        const hasSesion = Boolean(state.sesionId);
        
        renderShelf();

        const validados = state.filas.filter((f) => f.estatusFila === "VALIDADO").length;
        const conflictos = state.filas.filter((f) => f.estatusFila === "CONFLICTO").length;
        const canApply =
          hasSesion &&
          state.sesionEstatus === "ABIERTA" &&
          validados > 0 &&
          !state.isAgente;
        btnAplicar.disabled = !canApply;

        if (!hasSesion) {
          aplicarHint.textContent = "Selecciona una sesión.";
          return;
        }

        if (state.sesionEstatus !== "ABIERTA") {
          aplicarHint.textContent = `No se puede aplicar: sesión ${safeText(state.sesionEstatus)}.`;
          return;
        }

        if (validados === 0) {
          aplicarHint.textContent = "No hay productos validados para aplicar.";
          return;
        }

        if (conflictos > 0) {
          aplicarHint.textContent = `Listo para aplicar ${validados} validado(s). ${conflictos} conflicto(s) serán ignorados.`;
          return;
        }

        aplicarHint.textContent = `Listo para aplicar ${validados} producto(s) validado(s).`;
      };

      const renderDashboard = (data) => {
        dashboardTbody.innerHTML = "";
        const filas = Array.isArray(data?.filas) ? data.filas : [];
        state.filas = filas;
        state.sesionEstatus = data?.sesion?.estatus || null;

        sesionEstatus.textContent = safeText(state.sesionEstatus || "—");

        const stats = data?.stats || {};
        sesionStats.textContent = `Total: ${safeText(stats.total || 0)} · Validados: ${safeText(
          stats.validados || 0
        )} · Conflictos: ${safeText(stats.conflictos || 0)} · Pendientes: ${safeText(
          stats.pendientes || 0
        )}`;

        if (!filas.length) {
          dashboardTable.style.display = "none";
          updateControls();
          return;
        }

        dashboardTable.style.display = "table";

        for (const f of filas) {
          const tr = document.createElement("tr");

          // Colores: Validado (verde), Conflicto (rojo), Pendiente (amarillo)
          if (f.estatusFila === "VALIDADO") {
            tr.style.background = "rgba(34, 197, 94, 0.10)";
          } else if (f.estatusFila === "CONFLICTO") {
            tr.style.background = "rgba(239, 68, 68, 0.10)";
          } else {
            tr.style.background = "rgba(245, 158, 11, 0.10)";
          }

          const tdSku = document.createElement("td");
          tdSku.textContent = safeText(f.sku);

          const tdProd = document.createElement("td");
          tdProd.textContent = safeText(f.nombreProducto);

          const tdEstatus = document.createElement("td");
          tdEstatus.textContent = safeText(f.estatusFila);

          const tdDetalle = document.createElement("td");
          if (f.estatusFila === "CONFLICTO") {
            const aTxt = f.conteoA == null ? "🔒" : safeText(f.conteoA);
            const bTxt = f.conteoB == null ? "🔒" : safeText(f.conteoB);
            tdDetalle.textContent = `A: ${aTxt} · B: ${bTxt}`;
          } else if (f.estatusFila === "VALIDADO") {
            tdDetalle.textContent = `Final: ${safeText(f.cantidadFinal)}`;
          } else {
            tdDetalle.textContent = "Pendiente";
          }

          tr.appendChild(tdSku);
          tr.appendChild(tdProd);
          tr.appendChild(tdEstatus);
          tr.appendChild(tdDetalle);
          dashboardTbody.appendChild(tr);
        }

        updateControls();
      };

      const fillSesionesSelect = (sesiones, preferId) => {
        const current = sesionSelect.value;
        sesionSelect.innerHTML = "";

        const placeholder = document.createElement("option");
        placeholder.value = "";
        placeholder.textContent = "Selecciona una sesión…";
        sesionSelect.appendChild(placeholder);

        for (const s of sesiones) {
          const option = document.createElement("option");
          option.value = String(s.sesionId);
          option.textContent = `#${s.sesionId} — ${safeText(s.nombre)} (${safeText(
            s.estatus
          )})`;
          sesionSelect.appendChild(option);
        }

        const targetId = preferId || (current ? Number.parseInt(current, 10) : null);
        if (Number.isInteger(targetId) && targetId > 0) {
          const exists = Array.from(sesionSelect.options).some(
            (o) => o.value === String(targetId)
          );
          if (exists) {
            sesionSelect.value = String(targetId);
            state.sesionId = targetId;
          }
        }
      };

      const loadSesiones = async (preferId) => {
        try {
          const resp = await apiCall(
            "/admin/auditoria-inventario/sesiones?estatus=ABIERTA",
            { method: "GET" }
          );

          if (!resp.ok) {
            throw new Error(resp.data?.message || "No se pudieron cargar sesiones");
          }

          const sesiones = Array.isArray(resp.data?.data?.sesiones)
            ? resp.data.data.sesiones
            : [];

          fillSesionesSelect(sesiones, preferId);
          updateControls();
        } catch (error) {
          console.error(error);
          // Mantener placeholder si falla
        }
      };

      const loadDashboard = async () => {
        if (!state.sesionId) return;
        if (state.isAgente) return;
        setDashboardLoading(true);

        try {
          const resp = await apiCall(
            `/admin/auditoria-inventario/dashboard/${encodeURIComponent(state.sesionId)}`,
            { method: "GET" }
          );

          if (!resp.ok) {
            throw new Error(resp.data?.message || "Error al cargar dashboard");
          }

          renderDashboard(resp.data?.data);
        } catch (error) {
          console.error(error);
          toast("error", error.message || "Error al cargar");
        } finally {
          setDashboardLoading(false);
        }
      };

      const crearSesion = async () => {
        if (state.isAgente) {
          toast("error", "No tienes permisos para crear sesiones");
          return;
        }
        const nombre = safeText(sesionNombre.value).trim();
        if (!nombre) {
          toast("warning", "Escribe un nombre de sesión");
          return;
        }

        try {
          btnCrearSesion.disabled = true;
          const resp = await apiCall("/admin/auditoria-inventario/crear-sesion", {
            method: "POST",
            body: JSON.stringify({ nombre }),
          });

          if (!resp.ok) {
            throw new Error(resp.data?.message || "No se pudo crear sesión");
          }

          const sesion = resp.data?.data?.sesion;
          if (!sesion?.sesionId) {
            throw new Error("Respuesta inválida del servidor");
          }

          const option = document.createElement("option");
          option.value = String(sesion.sesionId);
          option.textContent = `#${sesion.sesionId} — ${safeText(sesion.nombre)}`;
          sesionSelect.appendChild(option);

          sesionSelect.value = String(sesion.sesionId);
          state.sesionId = sesion.sesionId;
          state.sesionEstatus = sesion.estatus;

          toast("success", "Sesión creada");
          sesionNombre.value = "";

          await loadDashboard();
          updateControls();
        } catch (error) {
          console.error(error);
          toast("error", error.message || "Error al crear sesión");
        } finally {
          btnCrearSesion.disabled = false;
          updateControls();
        }
      };


      const aplicarInventario = async () => {
        if (!state.sesionId) return;
        if (state.isAgente) {
          toast("error", "No tienes permisos para aplicar inventario");
          return;
        }

        const validados = state.filas.filter((f) => f.estatusFila === "VALIDADO").length;
        const conflictos = state.filas.filter((f) => f.estatusFila === "CONFLICTO").length;
        const pendientes = state.filas.filter((f) => f.estatusFila === "PENDIENTE_A" || f.estatusFila === "PENDIENTE_B").length;

        if (validados === 0) {
          toast("warning", "No hay productos validados para aplicar");
          return;
        }

        let confirmText = `Se aplicará el inventario de ${validados} producto(s) VALIDADO(S).`;
        if (conflictos > 0) {
          confirmText += `\n\nLos ${conflictos} producto(s) en CONFLICTO serán ignorados y quedarán registrados en esta sesión cerrada.`;
        }
        if (pendientes > 0) {
          confirmText += `\n\nLos ${pendientes} producto(s) PENDIENTES también serán ignorados.`;
        }
        confirmText += "\n\n¿Desea continuar?";

        const confirm = await Swal.fire({
          icon: "warning",
          title: "Aplicar inventario parcial",
          html: confirmText.replace(/\n/g, "<br>"),
          showCancelButton: true,
          confirmButtonText: "Aplicar",
          cancelButtonText: "Cancelar",
          confirmButtonColor: "#F97316",
        });

        if (!confirm.isConfirmed) return;

        try {
          btnAplicar.disabled = true;
          const resp = await apiCall(
            `/admin/auditoria-inventario/aplicar/${encodeURIComponent(state.sesionId)}`,
            { method: "POST" }
          );

          if (!resp.ok) {
            if (resp.status === 409) {
              throw new Error(resp.data?.message || "No se puede aplicar");
            }
            throw new Error(resp.data?.message || "Error al aplicar");
          }

          const result = resp.data?.data || {};
          let successMsg = `Inventario aplicado: ${result.filasProcesadas || validados} producto(s) actualizado(s).`;
          if (conflictos > 0 || pendientes > 0) {
            successMsg += ` ${conflictos + pendientes} ítem(s) no aplicado(s) quedaron registrados.`;
          }

          await Swal.fire({
            icon: "success",
            title: "Aplicado",
            html: successMsg.replace(/\. /g, ".<br>"),
            confirmButtonColor: "#F97316",
          });

          await loadDashboard();
        } catch (error) {
          console.error(error);
          await Swal.fire({
            icon: "error",
            title: "Error",
            text: error.message || "No se pudo aplicar",
            confirmButtonColor: "#F97316",
          });
        } finally {
          updateControls();
        }
      };

      btnCrearSesion.addEventListener("click", crearSesion);
      sesionNombre.addEventListener("keydown", (e) => {
        if (e.key === "Enter") crearSesion();
      });

      sesionSelect.addEventListener("change", async () => {
        const id = Number.parseInt(sesionSelect.value, 10);
        if (!id) {
          state.sesionId = null;
          updateControls();
          return;
        }
        state.sesionId = id;
        updateControls();
        if (!state.isAgente) {
          await loadDashboard();
        }
      });

      if (searchInput) {
        searchInput.addEventListener("input", onSearchChange);
      }
      if (filterCategoria) {
        filterCategoria.addEventListener("change", applyFilters);
      }
      if (filterMedida) {
        filterMedida.addEventListener("change", applyFilters);
      }

      btnRefrescar.addEventListener("click", loadDashboard);
      btnAplicar.addEventListener("click", aplicarInventario);

      updateControls();
      applyRoleRestrictions();

      (async function init() {
        await loadCategorias();
        await loadMedidas();
        await loadProductCatalog();

        try {
          const params = new URLSearchParams(window.location.search);
          const sesionIdParam = Number.parseInt(params.get("sesionId"), 10);
          if (Number.isInteger(sesionIdParam) && sesionIdParam > 0) {
            await loadSesiones(sesionIdParam);
            if (state.sesionId && !state.isAgente) {
              await loadDashboard();
            }
          } else {
            await loadSesiones(null);
          }
        } catch (e) {
          await loadSesiones(null);
        }
      })();
    </script>
  </body>
</html>
