<!-- Modal: Autenticación (Login/Registro) -->
<div id="modalAuth" class="modal-auth" style="display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.6); backdrop-filter: blur(4px); justify-content: center; align-items: center; padding: 1rem;">
  <div class="modal-content" style="max-width: 500px; width: 95%; padding: 2rem; border-radius: 1rem; background: white; box-shadow: 0 20px 60px rgba(0,0,0,0.3);">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
      <h2 style="font-size: 1.5rem; font-weight: 700; margin: 0; color: #111827;">Inicia sesión</h2>
      <button id="btnCerrarAuthModal" style="border: none; background: transparent; font-size: 1.5rem; cursor: pointer; color: #6b7280;" aria-label="Cerrar">×</button>
    </div>
    
    <!-- Tabs -->
    <div style="display: flex; gap: 0.5rem; margin-bottom: 1.5rem; border-bottom: 2px solid #e5e7eb;">
      <button id="tabLoginModal" class="auth-tab active" style="flex: 1; padding: 0.75rem; border: none; background: transparent; cursor: pointer; font-weight: 600; border-bottom: 3px solid var(--razo-orange); color: var(--razo-orange);">Iniciar Sesión</button>
      <button id="tabRegistroModal" class="auth-tab" style="flex: 1; padding: 0.75rem; border: none; background: transparent; cursor: pointer; font-weight: 600; border-bottom: 3px solid transparent; color: #6b7280;">Registrarse</button>
    </div>

    <!-- Login Form -->
    <form id="formLoginModal" style="display: block;">
      <div style="margin-bottom: 1rem;">
        <label for="loginEmailModal" style="display: block; margin-bottom: 0.5rem; font-weight: 600; color: #374151;">Email</label>
        <input type="email" id="loginEmailModal" required style="width: 100%; padding: 0.75rem; border: 1px solid #d1d5db; border-radius: 0.5rem; font-size: 1rem;" placeholder="tu@email.com">
      </div>
      <div style="margin-bottom: 1.5rem;">
        <label for="loginPasswordModal" style="display: block; margin-bottom: 0.5rem; font-weight: 600; color: #374151;">Contraseña</label>
        <div style="position: relative;">
          <input type="password" id="loginPasswordModal" required style="width: 100%; padding: 0.75rem 3rem 0.75rem 0.75rem; border: 1px solid #d1d5db; border-radius: 0.5rem; font-size: 1rem;" placeholder="••••••••">
          <button type="button" id="toggleLoginPasswordModal" style="position: absolute; right: 0.75rem; top: 50%; transform: translateY(-50%); border: none; background: transparent; cursor: pointer; color: #6b7280; font-size: 1.25rem;" aria-label="Mostrar contraseña">
            <i class="bi bi-eye"></i>
          </button>
        </div>
      </div>
      <button type="submit" class="btn btn-primary" style="width: 100%; padding: 0.875rem; font-size: 1rem; font-weight: 600; background: var(--razo-orange); border: none; border-radius: 0.5rem; color: white; cursor: pointer;">Iniciar Sesión</button>
    </form>

    <!-- Registration Form -->
    <form id="formRegistroModal" style="display: none;">
      <div style="margin-bottom: 1rem;">
        <label for="regNombreModal" style="display: block; margin-bottom: 0.5rem; font-weight: 600; color: #374151;">Nombre Completo</label>
        <input type="text" id="regNombreModal" required style="width: 100%; padding: 0.75rem; border: 1px solid #d1d5db; border-radius: 0.5rem; font-size: 1rem;" placeholder="Juan Pérez">
      </div>
      <div style="margin-bottom: 1rem;">
        <label for="regEmailModal" style="display: block; margin-bottom: 0.5rem; font-weight: 600; color: #374151;">Email</label>
        <input type="email" id="regEmailModal" required style="width: 100%; padding: 0.75rem; border: 1px solid #d1d5db; border-radius: 0.5rem; font-size: 1rem;" placeholder="tu@email.com">
      </div>
      <div style="margin-bottom: 1rem;">
        <label for="regTelefonoModal" style="display: block; margin-bottom: 0.5rem; font-weight: 600; color: #374151;">Teléfono</label>
        <input type="tel" id="regTelefonoModal" required style="width: 100%; padding: 0.75rem; border: 1px solid #d1d5db; border-radius: 0.5rem; font-size: 1rem;" placeholder="5512345678">
      </div>
      <div style="margin-bottom: 1rem;">
        <label for="regPasswordModal" style="display: block; margin-bottom: 0.5rem; font-weight: 600; color: #374151;">Contraseña</label>
        <div style="position: relative;">
          <input type="password" id="regPasswordModal" required style="width: 100%; padding: 0.75rem 3rem 0.75rem 0.75rem; border: 1px solid #d1d5db; border-radius: 0.5rem; font-size: 1rem;" placeholder="••••••••" minlength="6">
          <button type="button" id="toggleRegPasswordModal" style="position: absolute; right: 0.75rem; top: 50%; transform: translateY(-50%); border: none; background: transparent; cursor: pointer; color: #6b7280; font-size: 1.25rem;" aria-label="Mostrar contraseña">
            <i class="bi bi-eye"></i>
          </button>
        </div>
      </div>
      <div style="margin-bottom: 1.5rem;">
        <label for="regPasswordConfirmModal" style="display: block; margin-bottom: 0.5rem; font-weight: 600; color: #374151;">Confirmar Contraseña</label>
        <div style="position: relative;">
          <input type="password" id="regPasswordConfirmModal" required style="width: 100%; padding: 0.75rem 3rem 0.75rem 0.75rem; border: 1px solid #d1d5db; border-radius: 0.5rem; font-size: 1rem;" placeholder="••••••••" minlength="6">
          <button type="button" id="toggleRegPasswordConfirmModal" style="position: absolute; right: 0.75rem; top: 50%; transform: translateY(-50%); border: none; background: transparent; cursor: pointer; color: #6b7280; font-size: 1.25rem;" aria-label="Mostrar contraseña">
            <i class="bi bi-eye"></i>
          </button>
        </div>
      </div>
      <button type="submit" class="btn btn-primary" style="width: 100%; padding: 0.875rem; font-size: 1rem; font-weight: 600; background: var(--razo-orange); border: none; border-radius: 0.5rem; color: white; cursor: pointer;">Crear Cuenta</button>
    </form>
  </div>
</div>
