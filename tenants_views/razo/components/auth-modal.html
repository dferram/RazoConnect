<!-- Modal: Autenticación (Login/Registro) -->
<div id="modalAuth" class="modal fade" tabindex="-1" aria-labelledby="modalAuthLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content auth-modal-content">
    <div class="auth-modal-header">
      <h2 class="auth-modal-title">Inicia sesión</h2>
      <button id="btnCerrarAuthModal" class="auth-modal-close" aria-label="Cerrar">×</button>
    </div>
    
    <!-- Tabs -->
    <div class="auth-tabs">
      <button id="tabLoginModal" class="auth-tab active">Iniciar Sesión</button>
      <button id="tabRegistroModal" class="auth-tab">Registrarse</button>
    </div>

    <!-- Login Form -->
    <form id="formLoginModal" class="auth-form active">
      <div class="form-group">
        <label for="loginEmailModal" class="form-label">Correo Electrónico o Teléfono</label>
        <input type="text" id="loginEmailModal" name="identifier" required autocomplete="username" class="form-control" placeholder="ejemplo@correo.com o 5512345678" aria-label="Correo electrónico o teléfono">
      </div>
      <div class="form-group">
        <label for="loginPasswordModal" class="form-label">Contraseña</label>
        <div class="password-input-wrapper">
          <input type="password" id="loginPasswordModal" name="password" required autocomplete="current-password" minlength="6" class="form-control password-input" placeholder="••••••••" aria-label="Contraseña">
          <button type="button" id="toggleLoginPasswordModal" class="password-toggle" aria-label="Mostrar contraseña">
            <i class="bi bi-eye"></i>
          </button>
        </div>
      </div>
      <button type="submit" class="btn btn-primary btn-block auth-submit-btn">Iniciar Sesión</button>
    </form>

    <!-- Registration Form -->
    <form id="formRegistroModal" class="auth-form">
      <div class="form-group">
        <label for="regNombreModal" class="form-label">Nombre Completo</label>
        <input type="text" id="regNombreModal" name="nombre" required minlength="3" maxlength="100" autocomplete="name" class="form-control" placeholder="Juan Pérez" aria-label="Nombre completo">
      </div>
      <div class="form-group">
        <label for="regEmailModal" class="form-label">Email</label>
        <input type="email" id="regEmailModal" name="email" required autocomplete="email" class="form-control" placeholder="tu@email.com" aria-label="Correo electrónico">
      </div>
      <div class="form-group">
        <label for="regTelefonoModal" class="form-label">Teléfono</label>
        <input type="tel" id="regTelefonoModal" name="telefono" required pattern="[0-9]{10}" maxlength="10" autocomplete="tel" class="form-control" placeholder="5512345678" aria-label="Teléfono (10 dígitos)" title="Ingresa 10 dígitos">
      </div>
      <div class="form-group">
        <label for="regPasswordModal" class="form-label">Contraseña</label>
        <div class="password-input-wrapper">
          <input type="password" id="regPasswordModal" name="password" required minlength="6" maxlength="50" autocomplete="new-password" class="form-control password-input" placeholder="••••••••" aria-label="Contraseña (mínimo 6 caracteres)" title="Mínimo 6 caracteres">
          <button type="button" id="toggleRegPasswordModal" class="password-toggle" aria-label="Mostrar contraseña">
            <i class="bi bi-eye"></i>
          </button>
        </div>
      </div>
      <div class="form-group">
        <label for="regPasswordConfirmModal" class="form-label">Confirmar Contraseña</label>
        <div class="password-input-wrapper">
          <input type="password" id="regPasswordConfirmModal" name="passwordConfirm" required minlength="6" maxlength="50" autocomplete="new-password" class="form-control password-input" placeholder="••••••••" aria-label="Confirmar contraseña" title="Repite la contraseña">
          <button type="button" id="toggleRegPasswordConfirmModal" class="password-toggle" aria-label="Mostrar contraseña">
            <i class="bi bi-eye"></i>
          </button>
        </div>
      </div>
      <button type="submit" class="btn btn-primary btn-block auth-submit-btn">Crear Cuenta</button>
    </form>
    </div>
  </div>
</div>
