<div id="modalOptimizacionCompras" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.65); z-index:9999; overflow-y:auto; padding:2rem; box-sizing:border-box;">
  <div style="background:white; border-radius:1rem; max-width:1200px; width:100%; margin:0 auto; border:2px solid #F97316; box-shadow:0 25px 60px rgba(0,0,0,0.4); position:relative;">

    <div style="background:linear-gradient(135deg,#F97316 0%,#FB923C 100%); color:white; border-radius:1rem 1rem 0 0; padding:1.25rem 1.5rem; display:flex; justify-content:space-between; align-items:center; gap:1rem;">
      <h5 style="margin:0; font-weight:800; font-size:1.2rem; display:flex; align-items:center; gap:0.5rem; flex:1;">
        <i class="bi bi-lightbulb-fill"></i> 💡 Oportunidades de Ahorro Detectadas
      </h5>
      <button onclick="window.optimizacionManager && window.optimizacionManager.cerrarModal()" title="Cerrar"
        style="background:rgba(255,255,255,0.25); border:2px solid rgba(255,255,255,0.7); color:white; width:40px; height:40px; border-radius:50%; font-size:1.4rem; font-weight:700; line-height:1; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:background 0.15s;"
        onmouseover="this.style.background='rgba(255,255,255,0.4)'" onmouseout="this.style.background='rgba(255,255,255,0.25)'">
        &times;
      </button>
    </div>

    <div style="padding:2rem;">
      <div id="resumenOptimizacion" style="background:#FFF7ED; border:2px solid #F97316; border-radius:0.75rem; padding:1.25rem; margin-bottom:1.5rem;">
        <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:1rem;">
          <div>
            <h6 style="color:#F97316; font-weight:700; margin-bottom:0.5rem;">
              <i class="bi bi-graph-up-arrow me-2"></i>Resumen de Optimización
            </h6>
            <p style="margin:0; color:#6b5d57;">
              <strong id="totalOportunidades">0</strong> oportunidades encontradas &bull;
              Ahorro potencial: <strong id="ahorroTotal" style="color:#16A34A;">0 piezas</strong> &bull;
              <strong id="ordenesAfectadas">0</strong> órdenes pueden agruparse
            </p>
          </div>
          <button id="btnAgruparTodas" class="btn btn-success" style="border-radius:0.5rem; font-weight:700; white-space:nowrap;">
            <i class="bi bi-check-circle me-1"></i>Agrupar Todas
          </button>
        </div>
      </div>

      <div id="listaOportunidades"></div>

      <div id="noOportunidades" style="display:none; text-align:center; padding:3rem;">
        <i class="bi bi-check-circle-fill" style="font-size:4rem; color:#16A34A;"></i>
        <h5 style="margin-top:1rem; color:#6b5d57;">¡Todo optimizado!</h5>
        <p style="color:#999;">No se encontraron oportunidades de consolidación en este momento.</p>
      </div>
    </div>

    <div style="border-top:2px solid #f5f1ed; padding:1rem 2rem; display:flex; justify-content:flex-end;">
      <button onclick="window.optimizacionManager && window.optimizacionManager.cerrarModal()"
        style="background:#6b7280; color:white; border:none; padding:0.6rem 1.5rem; border-radius:0.5rem; font-weight:600; cursor:pointer; font-size:0.9rem; display:inline-flex; align-items:center; gap:0.4rem;">
        <i class="bi bi-x-circle"></i> Cerrar
      </button>
    </div>
  </div>
</div>
