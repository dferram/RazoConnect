<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestión de Categorías - Admin RazoConnect</title>
    <link rel="icon" type="image/png" href="/icon/Logo_Razo.png" />
    
    <!-- External Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <!-- Core Scripts - ORDEN CRÍTICO: api.js debe cargarse primero -->
    <script src="js/api.js"></script>
    <script src="js/auth-guard-admin.js" defer></script>
    

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/admin.css" />
    <link rel="stylesheet" href="css/mobile-responsive.css" />
  </head>
  <body data-sidebar="admin" data-page-title="Gestión de categorías">
    <div class="admin-layout">
      <div id="admin-sidebar-container"></div>

      <main class="admin-main">
        <div id="admin-header-container"></div>

        <div class="admin-content">
          <div id="instructionalBanner" class="instructional-banner">
            <p>
              ?? <strong>Gestión de Categorías:</strong> Organiza tu catálogo de productos creando y administrando categorías.
            </p>
            <button class="instructional-banner-close" title="Cerrar">×</button>
          </div>

          <div class="admin-table-container" style="margin-bottom: 2rem">
            <div class="admin-table-header">
              <h2 class="admin-table-title">Agregar nueva categoría</h2>
            </div>

            <form id="categoriaForm" style="padding: 1.5rem">
              <div class="form-group">
                <label for="nombre" class="form-label">Nombre *</label>
                <input type="text" id="nombre" class="form-input" required />
              </div>

              <div class="form-group">
                <label for="descripcion" class="form-label">Descripción</label>
                <textarea
                  id="descripcion"
                  class="form-input"
                  rows="3"
                  placeholder="Describe brevemente la categoría"
                ></textarea>
              </div>

              <div class="form-group">
                <label class="form-label">Imagen de portada</label>
                <input
                  type="file"
                  id="imagenInput"
                  accept="image/png,image/jpeg,image/jpg,image/webp"
                  style="display: none;"
                />
                <div id="imagePreviewContainer" style="display: none;">
                  <img id="imagePreview" style="width: 200px; height: 200px; object-fit: cover; border-radius: 8px;" />
                  <button type="button" id="btnRemoveImage" class="btn btn-sm btn-danger">Eliminar</button>
                </div>
                <button type="button" class="btn btn-secondary" id="btnSelectImage" style="width: 100%;">
                  <i class="bi bi-image"></i> Seleccionar imagen
                </button>
              </div>

              <div style="display: flex; justify-content: flex-end; gap: 1rem; margin-top: 1.5rem;">
                <button type="reset" class="btn btn-secondary">Limpiar</button>
                <button type="submit" class="btn btn-primary">Guardar categoría</button>
              </div>
            </form>
          </div>

          <div class="admin-table-container">
            <div class="admin-table-header">
              <h2 class="admin-table-title">Listado de categorías</h2>
            </div>

            <div id="loadingState" class="loading">
              <div class="spinner"></div>
            </div>

            <table class="admin-table" id="categoriasTable" style="display: none">
              <thead>
                <tr>
                  <th>Nombre</th>
                  <th>Descripción</th>
                  <th>Imagen</th>
                  <th>Acciones</th>
                </tr>
              </thead>
              <tbody id="categoriasTableBody"></tbody>
            </table>

            <div id="emptyState" class="empty-state" style="display: none">
              <div class="empty-state-icon">???</div>
              <h3 class="empty-state-title">No hay categorías registradas</h3>
              <p class="empty-state-text">Crea una categoría para iniciar la gestión del catálogo.</p>
            </div>
          </div>
        </div>
      </main>
    </div>

    <script src="js/token-validator.js"></script>
    <script src="js/layout.js" defer></script>
    <script src="js/sidebar-toggle.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Utilidades compartidas -->
    <script src="js/shared/network-status.js"></script>
    <script src="js/shared/api-client.js"></script>
    <script src="js/shared/ui-helpers.js"></script>
    
    <script src="js/components/admin-header-loader.js"></script>
    <script src="js/components/admin-sidebar-loader.js"></script>
    <script src="js/admin-categorias.js"></script>
  </body>
</html>
