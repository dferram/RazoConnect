<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recuperar contraseña - RazoConnect</title>
  <link rel="icon" type="image/png" href="/icon/Logo_Razo.png" />
  <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/mobile-responsive.css" />
    <script src="js/api.js"></script>
  </head>
<body>
  <div class="auth-wrapper">
    <div class="form-container">
      <h1 class="form-title">Recuperar contraseña</h1>
      <p class="form-subtitle">Ingresa tu correo electrónico y te enviaremos instrucciones.</p>

      <form id="forgotForm">
        <div class="form-group">
          <label class="form-label" for="email">Correo electrónico o teléfono</label>
          <input type="text" id="email" class="form-input" placeholder="tu@email.com o teléfono" required>
          <div id="feedbackMessage" style="display: none; margin-top: 0.75rem; padding: 0.75rem; border-radius: 0.5rem; font-size: 0.9rem;"></div>
        </div>
        <button type="submit" class="btn btn-primary btn-block" id="submitBtn">
          <span id="btnText">Enviar enlace de recuperación</span>
          <div class="spinner" id="btnSpinner" style="display: none; width: 20px; height: 20px; border-width: 2px;"></div>
        </button>
      </form>

      <p class="text-center mt-3"><a href="/login.html" class="link-underline">Volver al inicio de sesión</a></p>
    </div>
  </div>

  <script src="js/auth-manager.js"></script><script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Utilidades compartidas -->
    <script src="js/shared/network-status.js"></script>
    <script src="js/shared/api-client.js"></script>
    <script src="js/shared/ui-helpers.js"></script>
  <script>
    const form = document.getElementById('forgotForm');
    const emailInput = document.getElementById('email');
    const submitBtn = document.getElementById('submitBtn');
    const btnText = document.getElementById('btnText');
    const feedbackMessage = document.getElementById('feedbackMessage');

    form.addEventListener('submit', async (event) => {
      event.preventDefault();

      feedbackMessage.style.display = 'none';
      feedbackMessage.innerHTML = '';

      submitBtn.disabled = true;
      btnText.style.display = 'none';
      btnSpinner.style.display = 'block';

      try {
        const response = await fetch(`${API_BASE_URL}/auth/forgot-password`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: emailInput.value.trim() })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.message || 'No se pudo procesar la solicitud');
        }

        // Manejar los tres casos según el status
        if (data.status === 'email_sent') {
          // Caso A: Email enviado - Verde
          feedbackMessage.style.backgroundColor = '#d1fae5';
          feedbackMessage.style.color = '#065f46';
          feedbackMessage.style.border = '1px solid #10b981';
          feedbackMessage.innerHTML = '<strong>✓</strong> Hemos enviado las instrucciones a tu correo electrónico.';
        } else if (data.status === 'phone_only') {
          // Caso B: Solo teléfono - Naranja con botón WhatsApp
          feedbackMessage.style.backgroundColor = '#fed7aa';
          feedbackMessage.style.color = '#92400e';
          feedbackMessage.style.border = '1px solid #f97316';
          feedbackMessage.innerHTML = `
            <div><strong>⚠</strong> Tu cuenta está registrada solo con teléfono. Contáctanos para recuperarla.</div>
            <a href="https://api.whatsapp.com/send/?phone=525560989524&text&type=phone_number&app_absent=0" 
               target="_blank" 
               style="display: inline-block; margin-top: 0.75rem; padding: 0.5rem 1rem; background: #25D366; color: white; text-decoration: none; border-radius: 0.5rem; font-weight: 600;">
              📱 Contactar por WhatsApp
            </a>
          `;
        } else if (data.status === 'user_not_found') {
          // Caso C: Usuario no encontrado - Rojo
          feedbackMessage.style.backgroundColor = '#fee2e2';
          feedbackMessage.style.color = '#991b1b';
          feedbackMessage.style.border = '1px solid #ef4444';
          feedbackMessage.innerHTML = '<strong>✗</strong> El correo o teléfono ingresado no está registrado.';
        }

        feedbackMessage.style.display = 'block';

      } catch (error) {
        feedbackMessage.style.backgroundColor = '#fee2e2';
        feedbackMessage.style.color = '#991b1b';
        feedbackMessage.style.border = '1px solid #ef4444';
        feedbackMessage.innerHTML = `<strong>✗</strong> ${error.message || 'Ocurrió un error. Intenta nuevamente.'}`;
        feedbackMessage.style.display = 'block';
      } finally {
        submitBtn.disabled = false;
        btnText.style.display = 'inline';
        btnSpinner.style.display = 'none';
      }
    });
  </script>
</body>
</html>
