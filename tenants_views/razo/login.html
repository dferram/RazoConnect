<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Iniciar sesión - RazoConnect | Regalando Sonrisas</title>
    <link rel="icon" type="image/png" href="/icon/Logo_Razo.png" />
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/mobile-responsive.css" />
    
    <!-- SweetAlert2 para alertas mejoradas -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <!-- Auth Manager - DEBE cargarse antes de scripts inline -->
    <script src="js/auth-manager.js"></script>
    
    <!-- Monitor de conexión a internet (no invasivo) -->
    <script src="js/shared/network-status.js"></script>
  </head>
  <body>
    <nav class="navbar">
      <div class="container navbar-content">
        <a href="/" class="navbar-brand"><img src="/icon/Logo_Razo.png" class="titulo-emoji-reemplazo" alt="Razo">RazoConnect</a>
        <ul class="navbar-menu">
          <li><a href="/registro.html" class="navbar-link">Registro</a></li>
        </ul>
      </div>
    </nav>

    <div class="container">
      <div class="form-container">
        <h1 class="form-title">Iniciar sesión</h1>
        <br />
        <div id="alert" style="display: none"></div>

        <form id="loginForm">
          <div class="form-group">
            <label class="form-label" for="email">Correo Electrónico o Teléfono</label>
            <input
              type="text"
              id="email"
              name="email"
              class="form-input"
              placeholder="ejemplo@correo.com o 5512345678"
              required
            />
            <div class="form-error" id="emailError"></div>
          </div>

          <div class="form-group">
            <label class="form-label" for="password">Contraseña</label>
            <div style="position: relative;">
              <input
                type="password"
                id="password"
                name="password"
                class="form-input"
                placeholder="••••••••"
                required
                style="padding-right: 45px;"
              />
              <button
                type="button"
                id="togglePassword"
                style="
                  position: absolute;
                  right: 10px;
                  top: 50%;
                  transform: translateY(-50%);
                  background: none;
                  border: none;
                  cursor: pointer;
                  padding: 5px;
                  color: #6b7280;
                  display: flex;
                  align-items: center;
                  justify-content: center;
                "
                aria-label="Mostrar contraseña"
              >
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                  <circle cx="12" cy="12" r="3"></circle>
                </svg>
              </button>
            </div>
            <div class="form-error" id="passwordError"></div>
          </div>

          <button
            type="submit"
            class="btn btn-primary btn-block"
            id="submitBtn"
          >
            <span id="btnText">Iniciar sesión</span>
            <div
              class="spinner"
              id="btnSpinner"
              style="
                display: none;
                width: 20px;
                height: 20px;
                border-width: 2px;
              "
            ></div>
          </button>

          <a
            href="#"
            class="btn-google"
            id="googleLoginBtn"
          >
            <img
              src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg"
              alt="Google logo"
            />
            <span>Continuar con Google</span>
          </a>

          <p class="text-center mt-2">
            <a href="/forgot-password.html" class="link-underline"
              >Olvidé mi contraseña</a
            >
          </p>
        </form>

        <p class="text-center mt-3" style="color: var(--text-secondary)">
          ¿No tienes cuenta?
          <a
            href="/registro.html"
            style="color: var(--primary-color); text-decoration: none"
            >Crear cuenta</a
          >
        </p>
      </div>
    </div>

    <!-- Login logic - Migrado a archivo externo para CSP sin unsafe-inline -->
    <script src="js/login.js"></script>

    <!-- Sistema de Temas Estacionales -->
    <script src="/js/theme-manager.js"></script>
    <script src="js/instructional-banner.js"></script>
  </body>
</html>
