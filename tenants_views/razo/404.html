<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Página no encontrada | RazoConnect</title>
  <link rel="icon" type="image/png" href="/icon/Logo_Razo.png">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #FFF7ED 0%, #FFEDD5 100%);
      color: #3F2D20;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 2rem;
      text-align: center;
    }

    .container {
      max-width: 600px;
      width: 100%;
      animation: fadeIn 0.6s ease-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .emoji {
      font-size: 120px;
      line-height: 1;
      margin-bottom: 1.5rem;
      animation: bounce 2s infinite;
    }

    @keyframes bounce {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-20px);
      }
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 800;
      color: #F97316;
      margin-bottom: 1rem;
      line-height: 1.2;
    }

    .subtitle {
      font-size: 1.5rem;
      font-weight: 600;
      color: #9A3412;
      margin-bottom: 1.5rem;
    }

    .message {
      font-size: 1.2rem;
      color: #7C2D12;
      line-height: 1.6;
      margin-bottom: 2.5rem;
      padding: 0 1rem;
    }

    .btn-home {
      display: inline-block;
      padding: 1rem 2.5rem;
      background: #F97316;
      color: #fff;
      text-decoration: none;
      border-radius: 2rem;
      font-weight: 700;
      font-size: 1.2rem;
      box-shadow: 0 4px 20px rgba(249, 115, 22, 0.3);
      transition: all 0.3s ease;
      border: none;
      cursor: pointer;
    }

    .btn-home:hover {
      background: #EA580C;
      transform: translateY(-2px);
      box-shadow: 0 6px 25px rgba(249, 115, 22, 0.4);
    }

    .btn-home:active {
      transform: translateY(0);
    }

    .footer {
      margin-top: 3rem;
      opacity: 0.5;
      font-size: 0.95rem;
      color: #7C2D12;
    }

    .logo {
      width: 80px;
      height: 80px;
      margin: 0 auto 1.5rem;
      opacity: 0.9;
    }

    .logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    @media (max-width: 640px) {
      .emoji {
        font-size: 80px;
      }

      h1 {
        font-size: 2rem;
      }

      .subtitle {
        font-size: 1.2rem;
      }

      .message {
        font-size: 1rem;
      }

      .btn-home {
        font-size: 1rem;
        padding: 0.875rem 2rem;
      }
    }

    /* Animación de partículas de fondo */
    .bg-decoration {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      z-index: -1;
      pointer-events: none;
    }

    .circle {
      position: absolute;
      border-radius: 50%;
      background: rgba(249, 115, 22, 0.1);
      animation: float 20s infinite ease-in-out;
    }

    .circle:nth-child(1) {
      width: 100px;
      height: 100px;
      top: 10%;
      left: 10%;
      animation-delay: 0s;
    }

    .circle:nth-child(2) {
      width: 150px;
      height: 150px;
      top: 60%;
      right: 10%;
      animation-delay: 3s;
    }

    .circle:nth-child(3) {
      width: 80px;
      height: 80px;
      bottom: 20%;
      left: 20%;
      animation-delay: 6s;
    }

    @keyframes float {
      0%, 100% {
        transform: translateY(0) translateX(0);
      }
      25% {
        transform: translateY(-30px) translateX(20px);
      }
      50% {
        transform: translateY(-60px) translateX(-20px);
      }
      75% {
        transform: translateY(-30px) translateX(20px);
      }
    }
  </style>
</head>
<body>
  <div class="bg-decoration">
    <div class="circle"></div>
    <div class="circle"></div>
    <div class="circle"></div>
  </div>

  <div class="container">
    <div class="logo">
      <img src="/icon/Logo_Razo.png" alt="RazoConnect Logo">
    </div>
    
    <div class="emoji">🦊</div>
    
    <h1>¡Ups! Página no encontrada</h1>
    
    <p class="subtitle">Error 404</p>
    
    <p class="message">
      La página que buscas no existe.<br>
      Quizá el enlace está mal escrito, la página fue movida o necesitas iniciar sesión con otro rol.
    </p>
    
    <a href="login.html" id="btnHome" class="btn-home">Ir al inicio</a>
    
    <div class="footer">
      © 2026 RazoConnect - Sistema de Gestión Empresarial
    </div>
  </div>

  <script>
    // Determinar a dónde redirigir según el tipo de usuario
    document.getElementById('btnHome').addEventListener('click', function(e) {
      e.preventDefault();
      
      // Verificar si hay sesión activa
      const adminData = localStorage.getItem('razoconnect_admin');
      const agenteData = localStorage.getItem('razoconnect_agente');
      const clienteData = localStorage.getItem('razoconnect_cliente');
      
      let redirectUrl = '/inicio.html'; // Default para usuarios no autenticados
      
      if (adminData) {
        try {
          const admin = JSON.parse(adminData);
          if (admin && admin.nombre) {
            redirectUrl = '/admin-dashboard.html';
          }
        } catch (e) {
          console.error('Error parseando admin data:', e);
        }
      } else if (agenteData) {
        try {
          const agente = JSON.parse(agenteData);
          if (agente && agente.nombre) {
            redirectUrl = '/agente-dashboard.html';
          }
        } catch (e) {
          console.error('Error parseando agente data:', e);
        }
      } else if (clienteData) {
        try {
          const cliente = JSON.parse(clienteData);
          if (cliente && cliente.nombre) {
            redirectUrl = '/dashboard.html';
          }
        } catch (e) {
          console.error('Error parseando cliente data:', e);
        }
      }
      
      window.location.href = redirectUrl;
    });
  </script>
</body>
</html>
