<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mis Notificaciones - RazoConnect</title>
    <link rel="icon" type="image/png" href="/icon/Logo_Razo.png" />

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <!-- PROTECCIÓN DE AUTENTICACIÓN (admin y agente usan token admin) -->
    <script src="js/auth-guard-staff.js"></script>

    <!-- SISTEMA DE RENOVACIÓN DE TOKENS -->

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />

    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/admin.css" />
      <link rel="stylesheet" href="css/mobile-responsive.css" />
  </head>
  <body>
    <div class="admin-layout">
      <div id="sidebar-container"></div>

      <main class="admin-main">
        <header class="admin-header">
          <h1 class="admin-header-title">Mis Notificaciones</h1>

          <div class="admin-header-actions">
            <div class="d-flex align-items-center gap-2">
              <button
                type="button"
                class="btn btn-outline-primary"
                id="btnMarcarTodas"
              >
                Marcar todas como leídas
              </button>

              <ul class="navbar-nav">
                <li class="nav-item dropdown">
                  <a
                    class="nav-link dropdown-toggle d-flex align-items-center position-relative admin-user-info"
                    href="#"
                    id="userDropdown"
                    role="button"
                    data-bs-toggle="dropdown"
                    aria-expanded="false"
                  >
                    <div class="admin-user-avatar" id="userAvatar">A</div>
                    <div class="admin-user-details">
                      <div class="admin-user-name" id="userName">Fernando</div>
                      <div class="admin-user-role" id="userRole">STAFF</div>
                    </div>
                    <span
                      id="indicadorAlertaUsuario"
                      class="position-absolute top-0 start-100 translate-middle p-1 bg-danger border border-light rounded-circle d-none"
                      style="margin-left: -10px; margin-top: 10px"
                    >
                      <span class="visually-hidden">Alertas</span>
                    </span>
                  </a>

                  <ul
                    class="dropdown-menu dropdown-menu-end shadow"
                    aria-labelledby="userDropdown"
                  >
                    <li>
                      <a class="dropdown-item" href="perfil.html"
                        ><i class="bi bi-person me-2"></i> Mi Perfil</a
                      >
                    </li>

                    <li>
                      <a
                        class="dropdown-item d-flex justify-content-between align-items-center"
                        href="staff-notificaciones.html"
                      >
                        <span
                          ><i class="bi bi-bell me-2"></i> Notificaciones</span
                        >
                        <span
                          id="badgeNotifMenu"
                          class="badge bg-danger rounded-pill d-none"
                          >0</span
                        >
                      </a>
                    </li>

                    <li><hr class="dropdown-divider" /></li>
                    <li>
                      <a
                        class="dropdown-item text-danger"
                        href="#"
                        onclick="logoutStaff()"
                        ><i class="bi bi-box-arrow-right me-2"></i> Cerrar
                        Sesión</a
                      >
                    </li>
                  </ul>
                </li>
              </ul>
            </div>
          </div>
        </header>

        <div class="admin-content">
          <div class="admin-card">
            <div class="admin-card-body">
              <div id="loadingNotificaciones" class="loading">
                <div class="spinner"></div>
              </div>

              <div
                id="listaNotificaciones"
                style="display: none; margin-top: 1rem"
              ></div>

              <div
                id="emptyNotificaciones"
                class="empty-state"
                style="display: none"
              >
                <div class="empty-state-icon">🔔</div>
                <h3 class="empty-state-title">Sin notificaciones</h3>
                <p class="empty-state-text">
                  Aquí aparecerán tus notificaciones internas del sistema.
                </p>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/layout.js" defer></script>
    <script src="js/api.js"></script>
    <script src="js/components/user-profile.js"></script>
    <script src="js/staff-notificaciones-badge.js"></script>
    <script src="js/staff-notificaciones.js"></script>

    <script>
      function logoutStaff() {
        try {
          if (typeof clearAuthData === "function") {
            clearAuthData();
          } else {
            localStorage.removeItem("razoconnect_admin_token");
            localStorage.removeItem("razoconnect_admin");
            localStorage.removeItem("razoconnect_token");
            localStorage.removeItem("razoconnect_user");
          }
        } catch (e) {
          console.error("Error al cerrar sesión:", e);
        }
        window.location.href = "/login.html";
      }
    </script>
  </body>
</html>
