<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Remisiones - RazoConnect Admin</title>
    <link rel="icon" type="image/png" href="/icon/Logo_Razo.png" />
    
    <!-- PROTECCIÓN DE AUTENTICACIÓN ADMIN -->
    <script src="js/auth-guard-admin.js"></script>
    
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/admin.css" />
    <link rel="stylesheet" href="css/mobile-responsive.css" />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body data-page-title="Gestión de Remisiones">
    <div class="admin-layout">
        <!-- Sidebar -->
        <div id="sidebar-container"></div>

        <!-- Main Content -->
        <main class="admin-main">
            <div id="admin-header-container"></div>

            <div class="admin-content">
                <div class="admin-card">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h5 class="mb-0">
                            <i class="bi bi-filter"></i>
                            Filtros de Búsqueda
                        </h5>
                    </div>

                    <div class="row g-3">
                        <div class="col-md-3">
                            <label class="form-label">Estado</label>
                            <select id="filtro-estado" class="form-select" aria-label="Filtrar por estado de remisión">
                                <option value="">Todos</option>
                                <option value="BORRADOR">Borrador</option>
                                <option value="EMITIDA">Emitida</option>
                                <option value="ENTREGADA">Entregada</option>
                                <option value="CANCELADA">Cancelada</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Fecha Desde</label>
                            <input type="date" id="filtro-fecha-desde" class="form-control" placeholder="Seleccionar fecha inicial" aria-label="Fecha inicial del rango de búsqueda">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Fecha Hasta</label>
                            <input type="date" id="filtro-fecha-hasta" class="form-control" placeholder="Seleccionar fecha final" aria-label="Fecha final del rango de búsqueda">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">&nbsp;</label>
                            <button id="btn-buscar" class="btn btn-primary w-100">
                                <i class="bi bi-search"></i>
                                Buscar
                            </button>
                        </div>
                    </div>
                </div>

                <div class="admin-card">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h5 class="mb-0">
                            <i class="bi bi-list-ul"></i>
                            Listado de Remisiones
                        </h5>
                        <div class="d-flex gap-2">
                            <button id="btn-exportar" class="btn btn-success">
                                <i class="bi bi-file-earmark-excel"></i>
                                Exportar
                            </button>
                        </div>
                    </div>

                    <div id="loading-spinner" class="text-center py-5" style="display: none;">
                        <div class="spinner-border text-primary" role="status">
                            <span class="visually-hidden">Cargando...</span>
                        </div>
                        <p class="mt-2 text-muted">Cargando remisiones...</p>
                    </div>

                    <div id="tabla-container">
                        <div class="table-responsive">
                            <table class="admin-table">
                                <thead>
                                    <tr>
                                        <th>Folio</th>
                                        <th>Pedido</th>
                                        <th>Cliente</th>
                                        <th>Fecha Emisión</th>
                                        <th>Total</th>
                                        <th>Estado</th>
                                        <th>Items</th>
                                        <th>Acciones</th>
                                    </tr>
                                </thead>
                                <tbody id="tabla-remisiones">
                                    <tr>
                                        <td colspan="8" class="text-center text-muted py-4">
                                            No hay remisiones para mostrar
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>

                        <div id="pagination-container" class="d-flex justify-content-between align-items-center mt-4">
                            <div id="pagination-info" class="text-muted"></div>
                            <nav>
                                <ul id="pagination-controls" class="pagination mb-0"></ul>
                            </nav>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div class="modal fade" id="modalDetalleRemision" tabindex="-1">
        <div class="modal-dialog modal-xl">
            <div class="modal-content" style="border-radius: 1rem; border: none; box-shadow: 0 10px 40px rgba(0,0,0,0.15);">
                <div class="modal-header" style="background: linear-gradient(135deg, #F97316 0%, #fb923c 100%); color: white; border-radius: 1rem 1rem 0 0; padding: 1.5rem;">
                    <h5 class="modal-title">
                        <i class="bi bi-file-earmark-text"></i>
                        Detalle de Remisión
                    </h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Cerrar modal de detalle de remisión"></button>
                </div>
                <div class="modal-body" style="padding: 2rem;">
                    <div id="detalle-remision-content">
                        <div class="text-center py-5">
                            <div class="spinner-border text-primary" role="status">
                                <span class="visually-hidden">Cargando...</span>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer" style="border-top: 1px solid rgba(0,0,0,0.1); padding: 1.5rem; margin-top: 1.5rem; margin-bottom: 1rem;">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                        <i class="bi bi-x-circle"></i>
                        Cerrar
                    </button>
                    <button type="button" id="btn-cancelar-remision" class="btn btn-danger" style="display: none;">
                        <i class="bi bi-x-octagon"></i>
                        Cancelar Remisión
                    </button>
                    <button type="button" id="btn-imprimir-remision" class="btn btn-primary">
                        <i class="bi bi-printer"></i>
                        Imprimir
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/auth-guard-admin.js"></script>
    <script src="/js/components/admin-header-loader.js"></script>
    <script src="/js/components/admin-sidebar-loader.js"></script>
    <script src="/js/admin-remisiones.js"></script>
</body>
</html>
