<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Remisiones - RazoConnect Admin</title>
    <link rel="icon" type="image/png" href="/icon/Logo_Razo.png" />
    
    <!-- PROTECCIÓN DE AUTENTICACIÓN ADMIN -->
    <script src="js/auth-guard-admin.js"></script>
    
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/admin.css" />
    <link rel="stylesheet" href="css/mobile-responsive.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body data-page-title="Gestión de Remisiones">
    <div class="admin-layout">
        <!-- Sidebar -->
        <div id="sidebar-container"></div>

        <!-- Main Content -->
        <main class="admin-main">
            <div id="admin-header-container"></div>

            <div class="admin-content">
                <div class="admin-table-container" style="margin-bottom: 1.5rem; padding: 1.5rem;">
                    <h2 style="margin: 0 0 1.5rem 0; font-size: 1.25rem; color: var(--razo-orange, #F97316);">
                        <i class="bi bi-filter"></i>
                        Filtros de Búsqueda
                    </h2>

                    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; align-items: end;">
                        <div>
                            <label class="form-label" style="font-weight: 600; margin-bottom: 0.5rem; display: block;">Estado</label>
                            <select id="filtro-estado" class="form-input" style="width: 100%; padding: 0.75rem; border: 2px solid var(--razo-gray-light); border-radius: 0.5rem;" aria-label="Filtrar por estado de remisión">
                                <option value="">Todos</option>
                                <option value="BORRADOR">Borrador</option>
                                <option value="EMITIDA">Emitida</option>
                                <option value="ENTREGADA">Entregada</option>
                                <option value="CANCELADA">Cancelada</option>
                            </select>
                        </div>
                        <div>
                            <label class="form-label" style="font-weight: 600; margin-bottom: 0.5rem; display: block;">Fecha Desde</label>
                            <input type="date" id="filtro-fecha-desde" class="form-input" style="width: 100%; padding: 0.75rem; border: 2px solid var(--razo-gray-light); border-radius: 0.5rem;" aria-label="Fecha inicial del rango de búsqueda">
                        </div>
                        <div>
                            <label class="form-label" style="font-weight: 600; margin-bottom: 0.5rem; display: block;">Fecha Hasta</label>
                            <input type="date" id="filtro-fecha-hasta" class="form-input" style="width: 100%; padding: 0.75rem; border: 2px solid var(--razo-gray-light); border-radius: 0.5rem;" aria-label="Fecha final del rango de búsqueda">
                        </div>
                        <div>
                            <button id="btn-buscar" class="btn btn-primary" style="width: 100%; padding: 0.75rem 1.5rem;">
                                <i class="bi bi-search"></i>
                                Buscar
                            </button>
                        </div>
                    </div>
                </div>

                <div class="admin-content" style="margin-top: 1rem;">
                    <div class="d-flex justify-content-end" style="padding: 1rem; background: white; border-radius: 0.75rem; border: 1px solid rgba(0,0,0,0.1);">
                        <button id="btn-exportar" type="button" class="btn btn-success">
                            <i class="bi bi-file-earmark-excel"></i>
                            <span class="ms-1">Exportar a Excel</span>
                        </button>
                    </div>
                </div>

                <div class="admin-table-container" style="margin-top: 1.5rem;">
                    <div class="admin-table-header">
                        <h2 class="admin-table-title">
                            <i class="bi bi-list-ul"></i>
                            Listado de Remisiones
                        </h2>
                    </div>

                    <div id="loading-spinner" class="loading" style="display: none;">
                        <div class="spinner"></div>
                    </div>

                    <div id="tabla-container">
                        <div style="overflow-x: auto;">
                            <table class="admin-table" style="display: none;" id="remisiones-table">
                                <thead>
                                    <tr>
                                        <th>Folio</th>
                                        <th>Pedido</th>
                                        <th>Cliente</th>
                                        <th>Fecha Emisión</th>
                                        <th>Total</th>
                                        <th>Estado</th>
                                        <th>Items</th>
                                        <th>Acciones</th>
                                    </tr>
                                </thead>
                                <tbody id="tabla-remisiones"></tbody>
                            </table>
                        </div>

                        <div id="empty-remisiones" class="empty-state" style="display: none;">
                            <div class="empty-state-icon">📄</div>
                            <h3 class="empty-state-title">No hay remisiones</h3>
                            <p class="empty-state-text">Las remisiones aparecerán aquí cuando se generen desde los pedidos</p>
                        </div>

                        <div id="pagination-container" style="display: flex; justify-content: space-between; align-items: center; margin-top: 1.5rem; padding: 1rem 0;">
                            <div id="pagination-info" style="color: var(--razo-gray-warm); font-size: 0.875rem;"></div>
                            <nav>
                                <ul id="pagination-controls" class="pagination" style="margin: 0; padding: 0; list-style: none; display: flex; gap: 0.5rem;"></ul>
                            </nav>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div class="modal fade" id="modalDetalleRemision" tabindex="-1">
        <div class="modal-dialog modal-xl">
            <div class="modal-content" style="border-radius: 1rem; border: none; box-shadow: 0 10px 40px rgba(0,0,0,0.15);">
                <div class="modal-header" style="background: linear-gradient(135deg, #F97316 0%, #fb923c 100%); color: white; border-radius: 1rem 1rem 0 0; padding: 1.5rem;">
                    <h5 class="modal-title">
                        <i class="bi bi-file-earmark-text"></i>
                        Detalle de Remisión
                    </h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Cerrar modal de detalle de remisión"></button>
                </div>
                <div class="modal-body" style="padding: 2rem;">
                    <div id="detalle-remision-content">
                        <div class="text-center py-5">
                            <div class="spinner-border text-primary" role="status">
                                <span class="visually-hidden">Cargando...</span>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer" style="border-top: 1px solid rgba(0,0,0,0.1); padding: 1.5rem; margin-top: 1.5rem; margin-bottom: 1rem;">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                        <i class="bi bi-x-circle"></i>
                        Cerrar
                    </button>
                    <button type="button" id="btn-cancelar-remision" class="btn btn-danger" style="display: none;">
                        <i class="bi bi-x-octagon"></i>
                        Cancelar Remisión
                    </button>
                    <button type="button" id="btn-imprimir-remision" class="btn btn-primary">
                        <i class="bi bi-printer"></i>
                        Imprimir
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/components/admin-header-loader.js"></script>
    <script src="js/components/admin-sidebar-loader.js"></script>
    <script src="js/admin-remisiones.js"></script>
</body>
</html>
