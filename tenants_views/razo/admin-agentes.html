<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestión de Agentes - Admin RazoConnect</title>
    <link rel="icon" type="image/png" href="/icon/Logo_Razo.png" />

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- PROTECCIÓN DE AUTENTICACIÓN ADMIN -->
    <script src="js/auth-guard-admin.js"></script>

    <!-- SISTEMA DE RENOVACIÓN DE TOKENS -->

    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/admin.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
    />
    <style>
      /* Optimización de tabla de agentes para mejor ajuste en pantalla */
      .admin-table-container > div[style*="overflow-x"] {
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
      }
      
      #agentsTable {
        font-size: 0.75rem;
        min-width: 100%;
        table-layout: auto;
      }
      
      #agentsTable thead th {
        padding: 10px 6px;
        font-size: 0.7rem;
        white-space: nowrap;
        letter-spacing: 0;
        line-height: 1.3;
      }
      
      #agentsTable tbody td {
        padding: 8px 4px;
        vertical-align: middle;
        font-size: 0.75rem;
      }
      
      /* Ajuste de anchos de columna - más compactos */
      #agentsTable th:nth-child(1),
      #agentsTable td:nth-child(1) { 
        min-width: 100px;
        max-width: 130px;
        overflow: hidden;
        text-overflow: ellipsis;
      } /* Nombre */
      #agentsTable th:nth-child(2),
      #agentsTable td:nth-child(2) { 
        min-width: 120px;
        max-width: 150px;
        font-size: 0.7rem;
        overflow: hidden;
        text-overflow: ellipsis;
      } /* Email */
      #agentsTable th:nth-child(3),
      #agentsTable td:nth-child(3) { 
        min-width: 85px;
        max-width: 100px;
        white-space: nowrap;
        font-size: 0.7rem;
      } /* Teléfono */
      #agentsTable th:nth-child(4),
      #agentsTable td:nth-child(4) { 
        min-width: 70px;
        max-width: 80px;
      } /* Código */
      #agentsTable th:nth-child(5),
      #agentsTable td:nth-child(5) { 
        min-width: 80px;
        max-width: 90px;
        white-space: nowrap;
        text-align: center;
      } /* % Comisión */
      #agentsTable th:nth-child(6),
      #agentsTable td:nth-child(6) { 
        min-width: 85px;
        max-width: 95px;
        text-align: center;
      } /* Total Ventas */
      #agentsTable th:nth-child(7),
      #agentsTable td:nth-child(7) { 
        min-width: 95px;
        max-width: 110px;
        white-space: nowrap;
        text-align: right;
      } /* Monto Vendido */
      #agentsTable th:nth-child(8),
      #agentsTable td:nth-child(8) { 
        min-width: 90px;
        max-width: 105px;
        white-space: nowrap;
        text-align: right;
      } /* Comisiones */
      #agentsTable th:nth-child(9),
      #agentsTable td:nth-child(9) { 
        min-width: 70px;
        max-width: 80px;
        text-align: center;
      } /* Estado */
      #agentsTable th:nth-child(10),
      #agentsTable td:nth-child(10) { 
        min-width: 150px;
        max-width: 170px;
      } /* Acciones */
      
      /* Botones más compactos */
      #agentsTable .btn {
        padding: 0.4rem 0.6rem;
        font-size: 0.7rem;
        white-space: nowrap;
        line-height: 1.2;
      }
      
      /* Badges más pequeños */
      #agentsTable .admin-badge {
        padding: 0.2rem 0.4rem;
        font-size: 0.65rem;
        display: inline-block;
      }
      
      /* Optimización del formulario de creación */
      #agenteForm .form-group {
        margin-bottom: 0.75rem;
      }
      
      #agenteForm .form-label {
        font-size: 0.875rem;
        margin-bottom: 0.375rem;
      }
      
      #agenteForm .form-input {
        padding: 0.5rem 0.75rem;
        font-size: 0.875rem;
      }
      
      /* Responsive */
      @media (max-width: 1400px) {
        #agentsTable {
          font-size: 0.75rem;
        }
        #agentsTable thead th,
        #agentsTable tbody td {
          padding: 8px 4px;
        }
        #agentsTable .btn {
          padding: 0.4rem 0.6rem;
          font-size: 0.7rem;
        }
      }
    </style>
      <link rel="stylesheet" href="css/mobile-responsive.css" />
  </head>
  <body data-page-title="Gestión de agentes">
    <div class="admin-layout">
      <!-- Sidebar -->
      <div id="sidebar-container"></div>

      <!-- Main Content -->
      <main class="admin-main">
        <div id="admin-header-container"></div>

        <div class="admin-content">
          <!-- Form to Create Agent -->
          <div class="admin-table-container agent-form-container">
            <div class="admin-table-header">
              <h2 class="admin-table-title">Agregar nuevo agente</h2>
            </div>
            <form id="agenteForm" class="agent-form">
              <div class="agent-form-grid">
                <div class="form-group">
                  <label for="nombre" class="form-label">Nombre *</label>
                  <input type="text" id="nombre" class="form-input" required />
                </div>
                <div class="form-group">
                  <label for="apellido" class="form-label">Apellido *</label>
                  <input
                    type="text"
                    id="apellido"
                    class="form-input"
                    required
                  />
                </div>
                <div class="form-group">
                  <label for="telefono" class="form-label">Teléfono</label>
                  <input
                    type="tel"
                    id="telefono"
                    class="form-input"
                    placeholder="Ej: 5551234567"
                  />
                </div>
                <div class="form-group">
                  <label for="email" class="form-label">Email</label>
                  <input type="email" id="email" class="form-input" />
                </div>
                <div class="form-group">
                  <label for="password" class="form-label">Contraseña *</label>
                  <input
                    type="password"
                    id="password"
                    class="form-input"
                    required
                  />
                </div>
                <div class="form-group">
                  <label for="porcentaje_comision" class="form-label">
                    Porcentaje de Comisión (%)
                    <span class="form-label-hint">
                      (Default: 5%)
                    </span>
                  </label>
                  <input
                    type="number"
                    id="porcentaje_comision"
                    class="form-input"
                    min="0"
                    max="100"
                    step="0.01"
                    placeholder="5.00"
                  />
                </div>
              </div>
              <div class="agent-form-actions">
                <button type="reset" class="btn btn-secondary">Limpiar</button>
                <button type="submit" class="btn btn-primary" id="submitBtn">
                  <span id="btnText">Crear agente</span>
                  <div class="spinner d-none" id="btnSpinner"></div>
                </button>
              </div>
            </form>
          </div>

          <!-- Agents List -->
          <div class="admin-table-container">
            <div class="admin-table-header">
              <h2 class="admin-table-title">Lista de agentes</h2>
              <button class="btn btn-secondary" onclick="loadAgentes()">
                Actualizar
              </button>
            </div>
            <div id="loadingAgents" class="loading">
              <div class="spinner"></div>
            </div>
            <div class="table-scroll-wrapper">
              <table class="admin-table table-hidden" id="agentsTable">
                <thead>
                  <tr>
                    <th>Nombre</th>
                    <th>Email</th>
                    <th>Teléfono</th>
                    <th>Código</th>
                    <th>% Comisión</th>
                    <th>Total Ventas</th>
                    <th>Monto Vendido</th>
                    <th>Comisiones</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                  </tr>
                </thead>
                <tbody id="agentsTableBody"></tbody>
              </table>
            </div>
            <div id="emptyAgents" class="empty-state d-none">
              <div class="empty-state-icon">💼</div>
              <h3 class="empty-state-title">No hay agentes</h3>
              <p class="empty-state-text">Crea tu primer agente de ventas</p>
            </div>

            <!-- Paginación -->
            <div id="paginationContainer" class="pagination-container">
              <div class="pagination-wrapper">
                <!-- Información de registros -->
                <div class="pagination-info">
                  Mostrando <strong id="pageStart">1</strong> a
                  <strong id="pageEnd">10</strong> de
                  <strong id="totalRecords">0</strong> agentes
                </div>

                <!-- Controles de paginación -->
                <div class="pagination-controls">
                  <button
                    id="btnPrevPage"
                    onclick="cambiarPagina('prev')"
                    class="btn btn-secondary pagination-btn"
                    disabled
                  >
                    ← Anterior
                  </button>

                  <div id="pageNumbers" class="page-numbers">
                    <!-- Los números de página se generarán dinámicamente -->
                  </div>

                  <button
                    id="btnNextPage"
                    onclick="cambiarPagina('next')"
                    class="btn btn-secondary pagination-btn"
                  >
                    Siguiente →
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>

    <!-- Modal para editar agente -->
    <div id="editarAgenteModal" class="agent-edit-modal">
      <div class="agent-edit-modal-content">
        <div class="agent-edit-modal-header">
          <h2 class="agent-edit-modal-title">
            ✏️ Editar Agente
          </h2>
          <button class="agent-edit-modal-close" onclick="closeEditarAgenteModal()">
            &times;
          </button>
        </div>
        <form id="editarAgenteForm" class="agent-edit-form">
          <input type="hidden" id="edit_agente_id" />
          <div class="agent-edit-form-grid">
            <div class="form-group">
              <label for="edit_nombre" class="form-label">Nombre *</label>
              <input type="text" id="edit_nombre" class="form-input" required />
            </div>
            <div class="form-group">
              <label for="edit_apellido" class="form-label">Apellido *</label>
              <input type="text" id="edit_apellido" class="form-input" required />
            </div>
            <div class="form-group">
              <label for="edit_telefono" class="form-label">Teléfono</label>
              <input
                type="tel"
                id="edit_telefono"
                class="form-input"
                placeholder="Ej: 5551234567"
              />
            </div>
            <div class="form-group">
              <label for="edit_email" class="form-label">Email</label>
              <input type="email" id="edit_email" class="form-input" />
            </div>
            <div class="form-group">
              <label for="edit_porcentaje_comision" class="form-label">
                Porcentaje de Comisión (%)
                <span style="color: var(--razo-gray-warm); font-weight: normal; font-size: 0.875rem;">
                  (Default: 5%)
                </span>
              </label>
              <input
                type="number"
                id="edit_porcentaje_comision"
                class="form-input"
                min="0"
                max="100"
                step="0.01"
                placeholder="5.00"
              />
            </div>
          </div>
          <div class="agent-edit-form-actions">
            <button type="button" class="btn btn-secondary" onclick="closeEditarAgenteModal()">
              Cancelar
            </button>
            <button type="submit" class="btn btn-primary" id="editSubmitBtn">
              <span id="editBtnText">Guardar Cambios</span>
              <div class="spinner d-none" id="editBtnSpinner"></div>
            </button>
          </div>
        </form>
      </div>
    </div>

    <!-- Modal para ver detalle del agente -->
    <div id="detalleAgenteModal" class="detail-modal">
      <div class="detail-modal-content">
        <div class="detail-modal-header">
          <h2 class="detail-modal-title">
            👤 Detalle del Agente
          </h2>
          <div class="detail-modal-header-actions">
            <a
              id="btn-ir-detalle-completo"
              href="#"
              class="btn btn-primary detail-modal-link"
            >
              <span aria-hidden="true">🔗</span>
              <span>Ver Perfil Completo</span>
            </a>
            <button class="detail-modal-close" onclick="closeDetalleAgenteModal()">
              &times;
            </button>
          </div>
        </div>
        <div id="detalleAgenteModalBody">
          <!-- El contenido se llenará dinámicamente -->
        </div>
      </div>
    </div>

    <script src="js/layout.js" defer></script>
    <script src="js/sidebar-toggle.js" defer></script>
    <script src="js/api.js"></script>
    <script src="js/admin-header-dropdown.js"></script>
    <script src="js/components/admin-header-loader.js"></script>
    <script src="js/components/user-profile.js"></script>
    <script>
      const adminToken = localStorage.getItem("razoconnect_admin_token");
      if (!adminToken) window.location.href = "/login.html";

      // Variables de estado y paginación
      let todosLosAgentes = [];
      let paginaActual = 1;
      const registrosPorPagina = 10;
      let isSuperAdmin = false;

      async function init() {
        await verifyAndLoadAdmin();
        await loadAgentes();
      }

      async function verifyAndLoadAdmin() {
        try {
          const response = await fetch(`${API_BASE_URL}/admin/verify`, {
            headers: {
              Authorization: `Bearer ${adminToken}`,
              "Content-Type": "application/json",
            },
          });
          if (!response.ok) throw new Error("Invalid token");
          const data = await response.json();
          if (data.success) {
            const admin = data.data.admin;
            const userNameEl = document.getElementById("userName");
            const userRoleEl = document.getElementById("userRole");
            const userAvatarEl = document.getElementById("userAvatar");
            if (userNameEl) userNameEl.textContent = admin.nombre;
            if (userRoleEl) {
              userRoleEl.textContent =
                admin.rol === "superadmin" ? "Super Admin" : "Admin";
            }

            const words = admin.nombre.split(" ");
            const initials =
              words.length >= 2
                ? `${words[0].charAt(0)}${words[1].charAt(0)}`
                : admin.nombre.substring(0, 2);
            if (userAvatarEl) userAvatarEl.textContent = initials;
          }
        } catch (error) {
          console.error("Error verifying admin:", error);
          localStorage.removeItem("razoconnect_admin_token");
          localStorage.removeItem("razoconnect_admin");
        }
      }

      async function aprobarSolicitudAgente(controlCambioId) {
        if (!controlCambioId) return;

        if (typeof Swal !== "undefined" && Swal && typeof Swal.fire === "function") {
          const result = await Swal.fire({
            title: "¿Aprobar esta solicitud de creación de agente?",
            icon: "question",
            showCancelButton: true,
            confirmButtonText: "Sí, aprobar",
            cancelButtonText: "Cancelar",
            confirmButtonColor: "#F97316",
            cancelButtonColor: "#6b7280",
          });

          if (!result.isConfirmed) {
            return;
          }
        } else {
          console.warn(
            "SweetAlert2 no disponible; acción de aprobarSolicitudAgente cancelada."
          );
          return;
        }

        try {
          const response = await fetch(
            `${API_BASE_URL}/admin/cambios/aprobar-lote`,
            {
              method: "POST",
              headers: {
                Authorization: `Bearer ${adminToken}`,
                "Content-Type": "application/json",
              },
              body: JSON.stringify({ ids: [controlCambioId] }),
            }
          );

          const data = await response.json();
          if (response.ok && data.success) {
            showToast("Solicitud aprobada correctamente", "success");
            await loadAgentes();
          } else {
            showToast(data.message || "Error al aprobar solicitud", "error");
          }
        } catch (error) {
          console.error("Error al aprobar solicitud de agente:", error);
          showToast("Error al conectar con el servidor", "error");
        }
      }

      async function rechazarSolicitudAgente(controlCambioId) {
        if (!controlCambioId) return;

        if (typeof Swal !== "undefined" && Swal && typeof Swal.fire === "function") {
          const result = await Swal.fire({
            title: "¿Rechazar esta solicitud de creación de agente?",
            icon: "warning",
            showCancelButton: true,
            confirmButtonText: "Sí, rechazar",
            cancelButtonText: "Cancelar",
            confirmButtonColor: "#F97316",
            cancelButtonColor: "#6b7280",
          });

          if (!result.isConfirmed) {
            return;
          }
        } else {
          console.warn(
            "SweetAlert2 no disponible; acción de rechazarSolicitudAgente cancelada."
          );
          return;
        }

        try {
          const response = await fetch(
            `${API_BASE_URL}/admin/cambios/rechazar-lote`,
            {
              method: "POST",
              headers: {
                Authorization: `Bearer ${adminToken}`,
                "Content-Type": "application/json",
              },
              body: JSON.stringify({ ids: [controlCambioId] }),
            }
          );

          const data = await response.json();
          if (response.ok && data.success) {
            showToast("Solicitud rechazada correctamente", "success");
            await loadAgentes();
          } else {
            showToast(data.message || "Error al rechazar solicitud", "error");
          }
        } catch (error) {
          console.error("Error al rechazar solicitud de agente:", error);
          showToast("Error al conectar con el servidor", "error");
        }
      }

      async function loadAgentes() {
        const loading = document.getElementById("loadingAgents");
        const table = document.getElementById("agentsTable");
        const empty = document.getElementById("emptyAgents");

        try {
          loading.classList.remove("d-none");
          table.classList.add("table-hidden");
          empty.classList.add("d-none");

          const response = await fetch(`${API_BASE_URL}/admin/agentes`, {
            headers: {
              Authorization: `Bearer ${adminToken}`,
              "Content-Type": "application/json",
            },
          });
          const data = await response.json();

          if (data.success && data.data.agentes.length > 0) {
            todosLosAgentes = data.data.agentes;
            paginaActual = 1;
            renderAgentes();
          } else {
            empty.classList.remove("d-none");
          }
        } catch (error) {
          console.error("Error:", error);
          showToast("Error al cargar agentes", "error");
        } finally {
          loading.classList.add("d-none");
        }
      }

      // Renderizar agentes con paginación
      function renderAgentes() {
        const tbody = document.getElementById("agentsTableBody");
        const table = document.getElementById("agentsTable");
        const pagination = document.getElementById("paginationContainer");

        const inicio = (paginaActual - 1) * registrosPorPagina;
        const fin = inicio + registrosPorPagina;
        const agentesPagina = todosLosAgentes.slice(inicio, fin);

        tbody.innerHTML = agentesPagina
          .map((a) => {
            const isPending = !!a._isPending;
            if (isPending) {
              const controlId = a.controlCambioId || "";
              const actionsHtml = isSuperAdmin
                ? `<button 
                    class="btn btn-success btn-sm" 
                    style="margin-right:0.35rem;"
                    title="Aprobar solicitud de creación"
                    onclick="aprobarSolicitudAgente(${controlId})">
                    ✔
                  </button>
                  <button 
                    class="btn btn-danger btn-sm" 
                    title="Rechazar solicitud de creación"
                    onclick="rechazarSolicitudAgente(${controlId})">
                    ✖
                  </button>`
                : `<span style="font-size:0.8rem; color: var(--razo-gray-warm);">En revisión</span>`;

              return `
        <tr class="table-warning">
          <td><strong>${a.nombre} ${a.apellido}</strong></td>
          <td>${a.email}</td>
          <td>${a.telefono || '—'}</td>
          <td><span class="admin-badge info">${
            a.codigoAgente || "—"
          }</span></td>
          <td><strong style="color: var(--razo-orange);">${a.porcentajeComision || 5.00}%</strong></td>
          <td>${a.totalVentas}</td>
          <td><strong>$${a.montoTotalVentas.toLocaleString()}</strong></td>
          <td><strong style="color: var(--success-color)">$${a.comisionesTotales.toLocaleString()}</strong></td>
          <td>
            <span class="admin-badge warning">⏳ Por Confirmar</span>
          </td>
          <td>
            <div style="display: flex; gap: 0.5rem; flex-wrap: wrap; align-items:center;">
              ${actionsHtml}
            </div>
          </td>
        </tr>
      `;
            }

            return `
        <tr>
          <td><strong>${a.nombre} ${a.apellido}</strong></td>
          <td>${a.email}</td>
          <td>${a.telefono || '—'}</td>
          <td><span class="admin-badge info">${
            a.codigoAgente || "—"
          }</span></td>
          <td><strong style="color: var(--razo-orange);">${a.porcentajeComision || 5.00}%</strong></td>
          <td>${a.totalVentas}</td>
          <td><strong>$${a.montoTotalVentas.toLocaleString()}</strong></td>
          <td><strong style="color: var(--success-color)">$${a.comisionesTotales.toLocaleString()}</strong></td>
          <td><span class="admin-badge ${a.activo ? "success" : "danger"}">${
              a.activo ? "Activo" : "Inactivo"
            }</span></td>
          <td>
            <div class="agent-actions-container">
              <button 
                class="btn btn-primary agent-action-btn" 
                onclick="verDetalleAgente(${a.agenteId})">
                Ver Detalle
              </button>
              <button 
                class="btn btn-secondary agent-action-btn" 
                onclick="editarAgente(${a.agenteId})">
                Editar
              </button>
              ${
                a.activo
                  ? `<button 
                class="btn btn-danger agent-action-btn" 
                onclick="desactivarAgente(${a.agenteId}, '${a.nombre} ${a.apellido}')">
                Desactivar
              </button>`
                  : ""
              }
            </div>
          </td>
        </tr>
      `;
          })
          .join("");

        table.classList.remove("table-hidden");
        pagination.classList.add("show");
        actualizarPaginacion();
      }

      // Actualizar controles de paginación
      function actualizarPaginacion() {
        const totalPaginas = Math.ceil(
          todosLosAgentes.length / registrosPorPagina
        );
        const inicio = (paginaActual - 1) * registrosPorPagina + 1;
        const fin = Math.min(
          paginaActual * registrosPorPagina,
          todosLosAgentes.length
        );

        // Actualizar información
        document.getElementById("pageStart").textContent = inicio;
        document.getElementById("pageEnd").textContent = fin;
        document.getElementById("totalRecords").textContent =
          todosLosAgentes.length;

        // Actualizar botones prev/next
        document.getElementById("btnPrevPage").disabled = paginaActual === 1;
        document.getElementById("btnNextPage").disabled =
          paginaActual === totalPaginas;

        // Generar números de página
        const pageNumbers = document.getElementById("pageNumbers");
        pageNumbers.innerHTML = "";

        // Mostrar máximo 5 números de página
        let startPage = Math.max(1, paginaActual - 2);
        let endPage = Math.min(totalPaginas, startPage + 4);

        if (endPage - startPage < 4) {
          startPage = Math.max(1, endPage - 4);
        }

        for (let i = startPage; i <= endPage; i++) {
          const pageBtn = document.createElement("button");
          pageBtn.textContent = i;
          pageBtn.className = "btn";
          pageBtn.style.cssText = `
            padding: 0.5rem 0.75rem;
            font-size: 0.875rem;
            min-width: 2.5rem;
            ${
              i === paginaActual
                ? "background: var(--razo-orange); color: white; font-weight: 600;"
                : "background: white; color: var(--razo-gray-dark); border: 1px solid #E5E7EB;"
            }
          `;
          pageBtn.onclick = () => irAPagina(i);
          pageNumbers.appendChild(pageBtn);
        }
      }

      // Cambiar de página
      function cambiarPagina(direccion) {
        const totalPaginas = Math.ceil(
          todosLosAgentes.length / registrosPorPagina
        );

        if (direccion === "prev" && paginaActual > 1) {
          paginaActual--;
        } else if (direccion === "next" && paginaActual < totalPaginas) {
          paginaActual++;
        }

        renderAgentes();
      }

      // Ir a página específica
      function irAPagina(pagina) {
        paginaActual = pagina;
        renderAgentes();
      }

      document
        .getElementById("agenteForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();
          const btn = document.getElementById("submitBtn");
          const btnText = document.getElementById("btnText");
          const btnSpinner = document.getElementById("btnSpinner");

          // Validar que al menos teléfono o email estén presentes
          const telefono = document.getElementById("telefono").value.trim();
          const email = document.getElementById("email").value.trim();

          if (!telefono && !email) {
            Swal.fire({
              title: 'Datos incompletos',
              text: 'Debes proporcionar al menos un teléfono o un email para el agente.',
              icon: 'warning',
              confirmButtonText: 'Entendido',
              confirmButtonColor: '#f97316'
            });
            return;
          }

          try {
            btn.disabled = true;
            btnText.classList.add("d-none");
            btnSpinner.classList.remove("d-none");

            const porcentajeComision = document.getElementById("porcentaje_comision").value;
            
            const response = await fetch(`${API_BASE_URL}/admin/agentes`, {
              method: "POST",
              headers: {
                Authorization: `Bearer ${adminToken}`,
                "Content-Type": "application/json",
              },
              body: JSON.stringify({
                nombre: document.getElementById("nombre").value,
                apellido: document.getElementById("apellido").value,
                telefono: document.getElementById("telefono").value,
                email: document.getElementById("email").value,
                password: document.getElementById("password").value,
                porcentaje_comision: porcentajeComision || null,
              }),
            });
            const data = await response.json();

            if (response.ok && data.success) {
              Swal.fire({
                title: '¡Agente creado!',
                html: `<p>El agente <strong>${document.getElementById("nombre").value} ${document.getElementById("apellido").value}</strong> ha sido creado exitosamente.</p>`,
                icon: 'success',
                confirmButtonText: 'Continuar',
                confirmButtonColor: '#10b981'
              });
              e.target.reset();
              loadAgentes();
            } else {
              const errorMessage = data.message || "Error al crear agente";
              
              if (response.status === 400 && 
                  (errorMessage.toLowerCase().includes("correo") || 
                   errorMessage.toLowerCase().includes("email"))) {
                Swal.fire({
                  title: 'Correo no disponible',
                  html: `<p>${errorMessage}</p>
                         <p class="swal-error-hint">Por favor, utiliza un email diferente o verifica si ya existe en el sistema.</p>`,
                  icon: 'warning',
                  confirmButtonText: 'Entendido',
                  confirmButtonColor: '#f97316'
                });
              } else {
                Swal.fire({
                  title: 'Error',
                  text: errorMessage,
                  icon: 'error',
                  confirmButtonText: 'Entendido',
                  confirmButtonColor: '#ef4444'
                });
              }
            }
          } catch (error) {
            console.error("Error:", error);
            Swal.fire({
              title: 'Error de conexión',
              text: 'No se pudo conectar con el servidor. Por favor, verifica tu conexión a internet e intenta nuevamente.',
              icon: 'error',
              confirmButtonText: 'Entendido',
              confirmButtonColor: '#ef4444'
            });
          } finally {
            btn.disabled = false;
            btnText.classList.remove("d-none");
            btnSpinner.classList.add("d-none");
          }
        });

      // Ver detalle del agente en modal
      async function verDetalleAgente(agenteId) {
        try {
          const response = await fetch(
            `${API_BASE_URL}/admin/agentes/${agenteId}`,
            {
              headers: {
                Authorization: `Bearer ${adminToken}`,
                "Content-Type": "application/json",
              },
            }
          );

          if (!response.ok) throw new Error("Error al cargar agente");

          const data = await response.json();

          if (data.success) {
            const { agente, ventas, comisiones } = data.data;
            const btnPerfil = document.getElementById(
              "btn-ir-detalle-completo"

            const resolvedAgenteId =

            if (btnPerfil) {
              btnPerfil.href = `/admin-agente-detalle.html?id=${resolvedAgenteId}`;

            const contenido = `
            <!-- Información del Agente -->
            <div style="background: var(--razo-cream); padding: 1.25rem; border-radius: 0.75rem; margin-bottom: 1.5rem; border-left: 4px solid var(--razo-orange);">
              <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem;">
                <div>
                  <p style="margin: 0.5rem 0; font-size: 0.875rem;"><strong style="color: var(--razo-gray-warm);">Nombre:</strong></p>
                  <p style="margin: 0; font-size: 1rem; font-weight: 600; color: var(--razo-gray-dark);">${
                    agente.nombre
                  } ${agente.apellido}</p>
                </div>
                <div>
                  <p style="margin: 0.5rem 0; font-size: 0.875rem;"><strong style="color: var(--razo-gray-warm);">Email:</strong></p>
                  <p style="margin: 0; font-size: 1rem; color: var(--razo-gray-dark);">${
                    agente.email
                  }</p>
                </div>
                <div>
                  <p style="margin: 0.5rem 0; font-size: 0.875rem;"><strong style="color: var(--razo-gray-warm);">Código:</strong></p>
                  <p style="margin: 0;"><span class="admin-badge info">${
                    agente.codigoAgente
                  }</span></p>
                </div>
                <div>
                  <p style="margin: 0.5rem 0; font-size: 0.875rem;"><strong style="color: var(--razo-gray-warm);">Estado:</strong></p>
                  <p style="margin: 0;"><span class="admin-badge ${
                    agente.activo ? "success" : "danger"
                  }">${agente.activo ? "Activo" : "Inactivo"}</span></p>
                </div>
              </div>
            </div>

            <!-- Estadísticas -->
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 1.5rem;">
              <div style="background: linear-gradient(135deg, #ff7a18, #ffae42); padding: 1.25rem; border-radius: 0.75rem; color: white; box-shadow: 0 12px 24px rgba(251, 146, 60, 0.3); border: 1px solid rgba(251, 146, 60, 0.45);">
                <p style="margin: 0; font-size: 0.875rem; opacity: 0.9;">Total Ventas</p>
                <p style="margin: 0.5rem 0 0 0; font-size: 2rem; font-weight: 700;">${
                  ventas.length
                }</p>
              </div>
              <div style="background: linear-gradient(135deg, #ff7a18, #ffae42); padding: 1.25rem; border-radius: 0.75rem; color: white; box-shadow: 0 12px 24px rgba(251, 146, 60, 0.3); border: 1px solid rgba(251, 146, 60, 0.45);">
                <p style="margin: 0; font-size: 0.875rem; opacity: 0.9;">Comisiones Totales</p>
                <p style="margin: 0.5rem 0 0 0; font-size: 2rem; font-weight: 700;">$${totalComisiones.toLocaleString()}</p>
              </div>
            </div>

            <!-- Ventas -->
            <div style="margin-bottom: 1.5rem;">
              <h3 style="margin: 0 0 0.75rem 0; font-size: 1rem; color: #2D3748; font-weight: 600;">🛒 Ventas Realizadas (${
                ventas.length
              })</h3>
              ${
                ventas.length > 0
                  ? `
                <div style="overflow-x: auto; border: 1px solid #E5E7EB; border-radius: 0.5rem; max-height: 300px; overflow-y: auto;">
                  <table class="admin-table" style="font-size: 0.875rem;">
                    <thead>
                      <tr style="background: #F9FAFB;">
                        <th style="padding: 0.75rem;">#Pedido</th>
                        <th style="padding: 0.75rem;">Cliente</th>
                        <th style="padding: 0.75rem;">Fecha</th>
                        <th style="padding: 0.75rem;">Monto</th>
                        <th style="padding: 0.75rem;">Estado</th>
                      </tr>
                    </thead>
                    <tbody>
                      ${ventas
                        .map((v) => {
                          let badge = "info";
                          if (v.estatus === "Confirmado") badge = "success";
                          else if (v.estatus === "Enviado") badge = "warning";
                          else if (v.estatus === "Entregado") badge = "success";

                          return `
                          <tr style="border-bottom: 1px solid #E5E7EB;">
                            <td style="padding: 0.75rem;"><strong>#${
                              v.pedidoId
                            }</strong></td>
                            <td style="padding: 0.75rem;">${
                              v.clienteNombre
                            }</td>
                            <td style="padding: 0.75rem;">${new Date(
                              v.fechaPedido
                            ).toLocaleDateString("es-MX")}</td>
                            <td style="padding: 0.75rem;"><strong>$${v.montoTotal.toLocaleString()}</strong></td>
                            <td style="padding: 0.75rem;"><span class="admin-badge ${badge}">${
                            v.estatus
                          }</span></td>
                          </tr>
                        `;
                        })
                        .join("")}
                    </tbody>
                  </table>
                </div>
              `
                  : '<div style="background: #F9FAFB; padding: 2rem; text-align: center; border-radius: 0.5rem; border: 1px dashed #E5E7EB;"><p style="margin: 0; color: var(--razo-gray-warm);">No hay ventas registradas</p></div>'
              }
            </div>

            <!-- Comisiones -->
            <div>
              <h3 style="margin: 0 0 0.75rem 0; font-size: 1rem; color: #2D3748; font-weight: 600;">💰 Comisiones (${
                comisiones.length
              })</h3>
              ${
                comisiones.length > 0
                  ? `
                <div style="overflow-x: auto; border: 1px solid #E5E7EB; border-radius: 0.5rem; max-height: 300px; overflow-y: auto;">
                  <table class="admin-table" style="font-size: 0.875rem;">
                    <thead>
                      <tr style="background: #F9FAFB;">
                        <th style="padding: 0.75rem;">#Comisión</th>
                        <th style="padding: 0.75rem;">#Pedido</th>
                        <th style="padding: 0.75rem;">Monto</th>
                        <th style="padding: 0.75rem;">Estado</th>
                      </tr>
                    </thead>
                    <tbody>
                      ${comisiones
                        .map(
                          (c) => `
                        <tr style="border-bottom: 1px solid #E5E7EB;">
                          <td style="padding: 0.75rem;"><strong>#${
                            c.comisionId
                          }</strong></td>
                          <td style="padding: 0.75rem;">#${c.pedidoId}</td>
                          <td style="padding: 0.75rem;"><strong style="color: var(--success-color)">$${c.montoComision.toLocaleString()}</strong></td>
                          <td style="padding: 0.75rem;"><span class="admin-badge ${
                            c.estatus === "Pagada" ? "success" : "warning"

                        </tr>
                      `
                        )
                        .join("")}
                    </tbody>
                  </table>
                </div>
              `
                  : '<div style="background: #F9FAFB; padding: 2rem; text-align: center; border-radius: 0.5rem; border: 1px dashed #E5E7EB;"><p style="margin: 0; color: var(--razo-gray-warm);">No hay comisiones registradas</p></div>'
              }
            </div>
          `;

            // Mostrar el modal
            document.getElementById("detalleAgenteModalBody").innerHTML =
              contenido;
            const modal = document.getElementById("detalleAgenteModal");
            modal.classList.add("show");
          }
        } catch (error) {
          console.error("Error:", error);
          showToast("Error al cargar datos del agente", "error");
        }
      }

      // Cerrar modal de detalle
      function closeDetalleAgenteModal() {
        const modal = document.getElementById("detalleAgenteModal");
        modal.classList.remove("show");
      }

      // Cerrar modal al hacer click fuera
      window.onclick = function (event) {
        const modal = document.getElementById("detalleAgenteModal");
        if (event.target == modal) {
          closeDetalleAgenteModal();
        }
      };

      document
        .querySelectorAll(".admin-nav-link[data-module]")
        .forEach((link) => {
          link.addEventListener("click", (e) => {
            e.preventDefault();
            showToast(
              `Módulo "${
                link.querySelector("span:last-child").textContent
              }" próximamente`,
              "info"
            );
          });
        });

      // Editar agente
      async function editarAgente(agenteId) {
        try {
          const response = await fetch(`${API_BASE_URL}/admin/agentes/${agenteId}`, {
            headers: {
              Authorization: `Bearer ${adminToken}`,
              "Content-Type": "application/json",
            },
          });

          if (!response.ok) throw new Error("Error al cargar agente");

          const data = await response.json();

          if (data.success) {
            const { agente } = data.data;
            
            document.getElementById("edit_agente_id").value = agente.agenteId || agente.agenteid;
            document.getElementById("edit_nombre").value = agente.nombre || "";
            document.getElementById("edit_apellido").value = agente.apellido || "";
            document.getElementById("edit_telefono").value = agente.telefono || "";
            document.getElementById("edit_email").value = agente.email || "";
            document.getElementById("edit_porcentaje_comision").value = agente.porcentajeComision || agente.porcentaje_comision || 5.00;

            const modal = document.getElementById("editarAgenteModal");
            modal.classList.add("show");
          }
        } catch (error) {
          console.error("Error:", error);
          showToast("Error al cargar datos del agente", "error");
        }
      }

      function closeEditarAgenteModal() {
        const modal = document.getElementById("editarAgenteModal");
        modal.classList.remove("show");
        document.getElementById("editarAgenteForm").reset();
      }

      document.getElementById("editarAgenteForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        const btn = document.getElementById("editSubmitBtn");
        const btnText = document.getElementById("editBtnText");
        const btnSpinner = document.getElementById("editBtnSpinner");

        const agenteId = document.getElementById("edit_agente_id").value;
        const telefono = document.getElementById("edit_telefono").value.trim();
        const email = document.getElementById("edit_email").value.trim();

        if (!telefono && !email) {
          Swal.fire({
            title: 'Datos incompletos',
            text: 'Debes proporcionar al menos un teléfono o un email para el agente.',
            icon: 'warning',
            confirmButtonText: 'Entendido',
            confirmButtonColor: '#f97316'
          });
          return;
        }

        try {
          btn.disabled = true;
          btnText.classList.add("d-none");
          btnSpinner.classList.remove("d-none");

          const porcentajeComision = document.getElementById("edit_porcentaje_comision").value;

          const response = await fetch(`${API_BASE_URL}/admin/agentes/${agenteId}`, {
            method: "PUT",
            headers: {
              Authorization: `Bearer ${adminToken}`,
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              nombre: document.getElementById("edit_nombre").value,
              apellido: document.getElementById("edit_apellido").value,
              telefono: document.getElementById("edit_telefono").value,
              email: document.getElementById("edit_email").value,
              porcentaje_comision: porcentajeComision || null,
            }),
          });
          const data = await response.json();

          if (response.ok && data.success) {
            await Swal.fire({
              title: '¡Agente actualizado!',
              html: `<p>El agente <strong>${document.getElementById("edit_nombre").value} ${document.getElementById("edit_apellido").value}</strong> ha sido actualizado exitosamente.</p>`,
              icon: 'success',
              confirmButtonText: 'Continuar',
              confirmButtonColor: '#10b981'
            });
            closeEditarAgenteModal();
            await loadAgentes();
          } else {
            const errorMessage = data.message || "Error al actualizar agente";
            
            if (response.status === 400 && 
                (errorMessage.toLowerCase().includes("correo") || 
                 errorMessage.toLowerCase().includes("email"))) {
              Swal.fire({
                title: 'Correo no disponible',
                html: `<p>${errorMessage}</p>
                       <p class="swal-error-hint">Por favor, utiliza un email diferente o verifica si ya existe en el sistema.</p>`,
                icon: 'warning',
                confirmButtonText: 'Entendido',
                confirmButtonColor: '#f97316'
              });
            } else {
              Swal.fire({
                title: 'Error',
                text: errorMessage,
                icon: 'error',
                confirmButtonText: 'Entendido',
                confirmButtonColor: '#ef4444'
              });
            }
          }
        } catch (error) {
          console.error("Error:", error);
          Swal.fire({
            title: 'Error de conexión',
            text: 'No se pudo conectar con el servidor. Por favor, verifica tu conexión a internet e intenta nuevamente.',
            icon: 'error',
            confirmButtonText: 'Entendido',
            confirmButtonColor: '#ef4444'
          });
        } finally {
          btn.disabled = false;
          btnText.classList.remove("d-none");
          btnSpinner.classList.add("d-none");
        }
      });

      init();
    </script>
  </body>
</html>
