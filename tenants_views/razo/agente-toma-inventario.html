<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Auditoría de Inventario (Modo Operador) - Agente RazoConnect</title>
    <link rel="icon" type="image/png" href="/icon/Logo_Razo.png" />

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <!-- Protección de autenticación -->
    <script src="js/auth-guard-agent.js"></script>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/admin.css" />
    <link rel="stylesheet" href="css/mobile-responsive.css" />
  </head>
  <body data-sidebar="agent" data-page-title="Auditoría de Inventario">
    <div class="admin-layout">
      <div id="sidebar-container"></div>

      <main class="admin-main">
        <div id="admin-header-container"></div>

        <div class="admin-content" style="display: grid; gap: 1.25rem">
          <!-- Session Selector -->
          <section class="admin-card" style="padding: 1.25rem">
            <div style="min-width: 280px">
              <label for="sesionSelect" class="form-label">Sesión activa</label>
              <select id="sesionSelect" class="form-input">
                <option value="">Selecciona una sesión…</option>
              </select>
            </div>
          </section>

          <!-- Tab System -->
          <section class="admin-card" style="padding: 1.25rem">
            <ul class="nav nav-tabs" id="auditTabs" role="tablist">
              <li class="nav-item" role="presentation">
                <button
                  class="nav-link active"
                  id="operador-tab"
                  data-bs-toggle="tab"
                  data-bs-target="#operador"
                  type="button"
                  role="tab"
                >
                  Modo Operador
                </button>
              </li>
            </ul>

            <div class="tab-content" style="padding-top: 1rem">
              <!-- Operador Tab -->
              <div class="tab-pane fade show active" id="operador" role="tabpanel">
                <!-- Filtros de Búsqueda -->
                <div
                  style="
                    background: #fff;
                    border: 1px solid var(--razo-gray-light);
                    border-radius: 0.75rem;
                    padding: 1rem;
                    margin-bottom: 1rem;
                  "
                >
                  <div
                    style="
                      display: grid;
                      grid-template-columns: 1.5fr 1fr 1fr;
                      gap: 0.75rem;
                      align-items: end;
                    "
                  >
                    <div class="form-group" style="margin: 0">
                      <label for="searchInput" class="form-label">Buscar</label>
                      <input
                        id="searchInput"
                        type="text"
                        class="form-input"
                        placeholder="Buscar por SKU o nombre..."
                        style="padding: 0.8rem 0.9rem"
                      />
                    </div>

                    <div class="form-group" style="margin: 0">
                      <label for="filterCategoria" class="form-label">Categoría</label>
                      <select id="filterCategoria" class="form-input form-select">
                        <option value="">Todas</option>
                      </select>
                    </div>

                    <div class="form-group" style="margin: 0">
                      <label for="filterMedida" class="form-label">Medidas</label>
                      <select id="filterMedida" class="form-input form-select">
                        <option value="">Todas</option>
                      </select>
                    </div>
                  </div>
                </div>

                <!-- Indicador de Último Registro -->
                <div
                  id="ultimoRegistro"
                  style="
                    padding: 0.75rem 1rem;
                    background: #f0f9ff;
                    border: 1px solid #bae6fd;
                    border-radius: 0.75rem;
                    color: #0369a1;
                    margin-bottom: 1rem;
                    display: none;
                  "
                >
                  <strong>✓ Último registro:</strong> <span id="ultimoRegistroTexto">—</span>
                </div>

                <!-- Loading Spinner -->
                <div id="shelfLoading" class="loading" style="display: none">
                  <div class="spinner"></div>
                </div>

                <!-- Resumen de Resultados -->
                <div id="shelfSummary" style="color: var(--razo-gray-warm); font-size: 0.9rem; margin-bottom: 0.75rem"></div>

                <!-- Grilla de Productos (Estantería) -->
                <div id="productShelf" class="inventory-shelf-grid"></div>

                <!-- Estado Vacío -->
                <div id="emptyShelf" style="display: none">
                  <div class="empty-state">
                    <div class="empty-state-icon">📦</div>
                    <h3 class="empty-state-title">No se encontraron productos</h3>
                    <p class="empty-state-text">Prueba con otro término o ajusta los filtros.</p>
                  </div>
                </div>
              </div>
            </div>
          </section>
        </div>
      </main>
    </div>

    <!-- Modal de Variantes (BLIND COUNT - NO STOCK SHOWN) -->
    <div id="variantesModal" class="modal">
      <div class="modal-dialog modal-xl">
        <div
          class="modal-content"
          style="
            background: white;
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 95%;
            max-width: 1200px;
          "
        >
          <div
            class="modal-header"
            style="
              display: flex;
              justify-content: space-between;
              align-items: center;
              margin-bottom: 1.5rem;
              padding-bottom: 1rem;
              border-bottom: 2px solid #f5f1ed;
            "
          >
            <div>
              <h2 id="variantesModalTitle" style="margin: 0; font-size: 1.35rem; color: #2d3748">
                Variantes
              </h2>
              <div id="variantesModalSubtitle" style="margin-top: 0.35rem; font-size: 0.9rem; color: var(--razo-gray-warm)">
                Registra la cantidad física que tienes frente a ti (conteo ciego).
              </div>
            </div>
            <button
              class="modal-close"
              onclick="closeVariantesModal()"
              style="
                background: none;
                border: none;
                font-size: 2rem;
                cursor: pointer;
                color: #6b5d57;
                line-height: 1;
                padding: 0;
                width: 32px;
                height: 32px;
                display: flex;
                align-items: center;
                justify-content: center;
                border-radius: 50%;
                transition: all 0.2s;
              "
            >
              &times;
            </button>
          </div>

          <div class="modal-body">
            <div id="variantesModalBody" style="overflow-x: auto">
              <table class="admin-table" style="min-width: 660px">
                <thead>
                  <tr>
                    <th>Imagen</th>
                    <th>Variante / SKU</th>
                    <th style="width: 150px">Cantidad Física</th>
                    <th style="width: 120px">Acción</th>
                  </tr>
                </thead>
                <tbody id="variantesTableBody"></tbody>
              </table>
            </div>

            <div style="margin-top: 1.5rem; margin-bottom: 1rem; display: flex; justify-content: flex-end;">
              <button
                type="button"
                class="btn btn-secondary"
                onclick="closeVariantesModal()"
                style="padding: 0.7rem 1.2rem"
              >
                Cerrar
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/layout.js" defer></script>
    <script src="js/sidebar-toggle.js" defer></script>
    <script src="js/api.js"></script>
    <script src="js/components/agente-header-loader.js"></script>
    <script src="js/components/user-profile.js"></script>
    <script src="js/mobile-nav.js"></script>

    <style>
      .inventory-shelf-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 1rem;
      }

      .inventory-card {
        background: #ffffff;
        border: 1px solid var(--razo-gray-light);
        border-radius: 0.85rem;
        overflow: hidden;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.06);
        display: flex;
        flex-direction: column;
        transition: all 0.2s ease;
      }

      .inventory-card.registered {
        border: 2px solid #22c55e;
        box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.1);
      }

      .inventory-card-img {
        width: 100%;
        height: 180px;
        background: #f3f4f6;
        object-fit: cover;
        display: block;
      }

      .inventory-card-body {
        padding: 0.85rem;
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
        flex: 1;
      }

      .inventory-card-title {
        margin: 0;
        font-weight: 800;
        color: var(--razo-gray-dark);
        font-size: 1rem;
        line-height: 1.2;
      }

      .inventory-card-meta {
        font-size: 0.85rem;
        color: var(--razo-gray-warm);
      }

      .inventory-card-footer {
        padding: 0.75rem 0.85rem;
        border-top: 1px solid var(--razo-gray-light);
        display: flex;
        gap: 0.5rem;
        align-items: center;
      }

      .modal {
        display: none;
        position: fixed;
        z-index: 1000;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.6);
        -webkit-backdrop-filter: blur(4px);
        backdrop-filter: blur(4px);
        justify-content: center;
        align-items: center;
        padding: 1rem;
        overflow-y: auto;
      }

      .modal-content {
        animation: modalSlideIn 0.3s ease-out;
        max-height: 90vh;
        overflow-y: auto;
        position: relative;
      }

      .modal-close:hover {
        background-color: var(--razo-gray-light);
        color: var(--razo-orange);
      }

      @keyframes modalSlideIn {
        from {
          opacity: 0;
          transform: translateY(-20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @media (max-width: 768px) {
        .inventory-shelf-grid {
          grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
        }
      }

      @media (max-width: 520px) {
        .inventory-shelf-grid {
          grid-template-columns: 1fr;
        }
      }

      .loading {
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 3rem;
      }

      .spinner {
        width: 40px;
        height: 40px;
        border: 4px solid #f3f4f6;
        border-top-color: var(--razo-orange);
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      .empty-state {
        text-align: center;
        padding: 3rem 1rem;
      }

      .empty-state-icon {
        font-size: 4rem;
        margin-bottom: 1rem;
      }

      .empty-state-title {
        color: #1e293b;
        font-size: 1.25rem;
        font-weight: 600;
        margin-bottom: 0.5rem;
      }

      .empty-state-text {
        color: #64748b;
        font-size: 0.9rem;
      }
    </style>

    <script>
      const sesionSelect = document.getElementById("sesionSelect");
      const searchInput = document.getElementById("searchInput");
      const filterCategoria = document.getElementById("filterCategoria");
      const filterMedida = document.getElementById("filterMedida");
      const productShelf = document.getElementById("productShelf");
      const emptyShelf = document.getElementById("emptyShelf");
      const shelfLoading = document.getElementById("shelfLoading");
      const shelfSummary = document.getElementById("shelfSummary");
      const ultimoRegistro = document.getElementById("ultimoRegistro");
      const ultimoRegistroTexto = document.getElementById("ultimoRegistroTexto");

      const state = {
        sesionId: null,
        catalogo: [],
        filteredProducts: [],
        registeredVariants: new Set(),
        variantesPorProducto: new Map(),
        varianteById: new Map(),
        productoById: new Map(),
        productoModalActualId: null,
      };

      const toast = (icon, title) =>
        Swal.fire({
          toast: true,
          position: "top-end",
          icon,
          title,
          showConfirmButton: false,
          timer: 1600,
          timerProgressBar: true,
        });

      const safeText = (v) => (v == null ? "" : String(v));

      const escapeHtml = (value) => {
        return (value || "").toString().replace(/[&<>"']/g, (c) => {
          switch (c) {
            case "&": return "&amp;";
            case "<": return "&lt;";
            case ">": return "&gt;";
            case '"': return "&quot;";
            case "'": return "&#39;";
            default: return c;
          }
        });
      };

      const setShelfLoading = (loading) => {
        if (shelfLoading) shelfLoading.style.display = loading ? "flex" : "none";
      };

      const normalizeText = (value) => {
        return (value || "").toString().trim().toLowerCase();
      };

      async function loadCategorias() {
        try {
          const resp = await apiCall("/admin/categorias", { method: "GET" });
          if (!resp.ok) return;
          
          const categorias = Array.isArray(resp.data?.data?.categorias) ? resp.data.data.categorias : [];
          
          if (filterCategoria) {
            categorias.forEach((c) => {
              const opt = document.createElement("option");
              opt.value = c.categoriaId;
              opt.textContent = c.nombre;
              filterCategoria.appendChild(opt);
            });
          }
        } catch (e) {
          console.error("Error cargando categorías:", e);
        }
      }

      async function loadMedidas() {
        try {
          const resp = await apiCall("/admin/medidas-existentes", { method: "GET" });
          if (!resp.ok) return;
          
          const medidas = Array.isArray(resp.data?.data?.medidas) ? resp.data.data.medidas : [];
          
          if (filterMedida) {
            medidas.forEach((m) => {
              const opt = document.createElement("option");
              opt.value = m;
              opt.textContent = m;
              filterMedida.appendChild(opt);
            });
          }
        } catch (e) {
          console.error("Error cargando medidas:", e);
        }
      }

      async function loadProductCatalog() {
        setShelfLoading(true);
        
        try {
          const resp = await apiCall(
            "/admin/productos/buscar-compra?all=1",
            { method: "GET" }
          );

          if (!resp.ok) {
            throw new Error(resp.data?.message || "Error al cargar catálogo");
          }

          const resultados = Array.isArray(resp.data?.data?.resultados)
            ? resp.data.data.resultados
            : [];

          state.variantesPorProducto = new Map();
          state.varianteById = new Map();
          state.productoById = new Map();

          for (const v of resultados) {
            const pid = Number.parseInt(v.productoid, 10);
            const vid = Number.parseInt(v.varianteid, 10);
            if (!Number.isInteger(pid) || pid <= 0) continue;

            if (Number.isInteger(vid) && vid > 0) {
              state.varianteById.set(vid, v);
            }

            if (!state.variantesPorProducto.has(pid)) state.variantesPorProducto.set(pid, []);
            state.variantesPorProducto.get(pid).push(v);

            if (!state.productoById.has(pid)) {
              state.productoById.set(pid, {
                productoid: pid,
                proveedorid: v.proveedorid ?? null,
                categoriaid: v.categoriaid ?? null,
                nombreproducto: v.nombreproducto || null,
                sku_maestro: v.sku_maestro || null,
                medidasSet: new Set(),
                variantes: [],
                searchText: "",
              });
            }

            const p = state.productoById.get(pid);
            if (v.medidas) p.medidasSet.add(String(v.medidas));
            p.variantes.push(v);
          }

          state.catalogo = Array.from(state.productoById.values()).map((p) => {
            const skus = (p.variantes || []).map((vv) => (vv.sku || "").toString()).join(" ");
            const base = `${p.nombreproducto || ""} ${p.sku_maestro || ""} ${skus}`;
            p.searchText = base;
            return p;
          });

          applyFilters();
        } catch (e) {
          console.error("Error cargando catálogo:", e);
          state.catalogo = [];
          state.filteredProducts = [];
          renderShelf();
          toast("error", `Error: ${e.message}`);
        } finally {
          setShelfLoading(false);
        }
      }

      function applyFilters() {
        const q = normalizeText(searchInput?.value || "");
        const categoriaId = (filterCategoria?.value || "").trim();
        const medida = (filterMedida?.value || "").trim();

        state.filteredProducts = state.catalogo.filter((item) => {
          if (categoriaId && String(item.categoriaid || "") !== categoriaId) return false;
          
          if (medida) {
            const medidas = Array.from(item.medidasSet || []);
            if (!medidas.some(m => normalizeText(m) === normalizeText(medida))) return false;
          }

          if (q) {
            const searchText = normalizeText(item.searchText || "");
            return searchText.includes(q);
          }

          return true;
        });

        renderShelf();
      }

      function renderShelf() {
        if (!productShelf || !emptyShelf) return;

        if (shelfSummary) {
          shelfSummary.textContent = `${state.filteredProducts.length} producto(s) encontrado(s)`;
        }

        if (state.filteredProducts.length === 0) {
          productShelf.innerHTML = "";
          emptyShelf.style.display = "block";
          return;
        }

        emptyShelf.style.display = "none";

        productShelf.innerHTML = state.filteredProducts
          .map((p) => {
            let img = "/icon/Logo_Razo.png";
            if (p.variantes && p.variantes.length > 0) {
              const varianteConImagen = p.variantes.find(v => v.url_imagen_variante);
              if (varianteConImagen) {
                img = varianteConImagen.url_imagen_variante;
              } else {
                const primeraVariante = p.variantes[0];
                if (primeraVariante?.url_imagen_producto) {
                  img = primeraVariante.url_imagen_producto;
                }
              }
            }
            
            const nombre = p.nombreproducto || "(Sin nombre)";
            const skuMaestro = p.sku_maestro || "—";
            const medidas = Array.from(p.medidasSet || []);
            const medidasLabel = (() => {
              if (!medidas.length) return "-";
              if (medidas.length <= 3) return medidas.join(", ");
              return `${medidas.slice(0, 3).join(", ")} +${medidas.length - 3}`;
            })();
            const variantesCount = Array.isArray(p.variantes) ? p.variantes.length : 0;

            return `
              <div class="inventory-card" onclick="openVariantesModal(${p.productoid})" style="cursor: pointer;" title="Ver variantes">
                <img
                  src="${img}"
                  class="inventory-card-img"
                  alt="${escapeHtml(nombre)}"
                  loading="lazy"
                  onerror="this.src='/icon/Logo_Razo.png'; this.onerror=null;"
                />
                <div class="inventory-card-body">
                  <h3 class="inventory-card-title">${escapeHtml(nombre)}</h3>
                  <div class="inventory-card-meta">SKU Maestro: <code>${escapeHtml(skuMaestro)}</code></div>
                  <div class="inventory-card-meta">Medidas: <strong>${escapeHtml(medidasLabel)}</strong></div>
                </div>
                <div class="inventory-card-footer">
                  <div class="inventory-card-meta">Variantes: <strong>${variantesCount}</strong></div>
                  <div class="inventory-card-meta" style="color: var(--razo-orange); font-weight: 800;">Ver detalles</div>
                </div>
              </div>
            `;
          })
          .join("");
      }

      let searchDebounce = null;
      function onSearchChange() {
        if (searchDebounce) clearTimeout(searchDebounce);
        searchDebounce = setTimeout(() => applyFilters(), 300);
      }

      window.openVariantesModal = function(productoId) {
        const pid = Number.parseInt(productoId, 10);
        if (!Number.isInteger(pid) || pid <= 0) return;

        const modal = document.getElementById("variantesModal");
        if (!modal) return;

        state.productoModalActualId = pid;

        const p = state.productoById.get(pid);
        const titleEl = document.getElementById("variantesModalTitle");
        const subEl = document.getElementById("variantesModalSubtitle");
        if (titleEl) titleEl.textContent = p?.nombreproducto || "Variantes";
        if (subEl) {
          const skuM = p?.sku_maestro ? `SKU Maestro: ${p.sku_maestro} - ` : "";
          subEl.textContent = skuM + "Registra la cantidad física que tienes frente a ti (conteo ciego).";
        }

        renderVariantesModal(pid);
        modal.style.display = "flex";
      };

      window.closeVariantesModal = function() {
        const modal = document.getElementById("variantesModal");
        if (!modal) return;
        modal.style.display = "none";
        state.productoModalActualId = null;
      };

      function renderVariantesModal(productoId) {
        const pid = Number.parseInt(productoId, 10);
        const tbody = document.getElementById("variantesTableBody");
        if (!tbody) return;

        const variantes = state.variantesPorProducto.get(pid) || [];
        if (!variantes.length) {
          tbody.innerHTML =
            '<tr><td colspan="4" style="padding: 1rem; color: var(--razo-gray-warm); text-align: center;">No hay variantes para este producto</td></tr>';
          return;
        }

        tbody.innerHTML = variantes
          .map((v) => {
            const imagenVariante = v.url_imagen_variante || null;
            const imagenMaestra = v.url_imagen_producto || null;
            const img = imagenVariante || imagenMaestra || "/icon/Logo_Razo.png";
            
            const vid = Number.parseInt(v.varianteid, 10);
            const sku = v.sku || "Sin SKU";
            const medidas = v.medidas || "-";
            const isRegistered = state.registeredVariants.has(vid);

            return `
              <tr ${isRegistered ? 'style="background: #dcfce7;"' : ''}>
                <td style="width: 70px;">
                  <div style="width: 56px; height: 56px; border-radius: 4px; overflow: hidden; background: #f3f4f6;">
                    <img
                      src="${img}"
                      alt="${escapeHtml(sku)}"
                      style="width: 100%; height: 100%; object-fit: cover;"
                      loading="lazy"
                      onerror="this.src='/icon/Logo_Razo.png'; this.onerror=null;"
                    />
                  </div>
                </td>
                <td>
                  <div style="font-weight: 800; color: var(--razo-gray-dark);">${escapeHtml(medidas)}</div>
                  <div style="font-size: 0.8rem; color: var(--razo-gray-warm); margin-top: 0.25rem;">
                    SKU: <code>${escapeHtml(sku)}</code>
                  </div>
                  ${isRegistered ? '<div style="margin-top: 0.25rem; color: #166534; font-weight: 700; font-size: 0.75rem;">✓ Registrado</div>' : ''}
                </td>
                <td>
                  <input
                    type="number"
                    id="modalVarQty-${vid}"
                    min="0"
                    step="1"
                    value="0"
                    placeholder="0"
                    style="width: 100%; padding: 0.5rem; border: 1px solid #d1d5db; border-radius: 0.5rem; text-align: center; font-weight: 700;"
                    ${!state.sesionId ? 'disabled' : ''}
                  />
                </td>
                <td style="text-align: center;">
                  <button
                    type="button"
                    onclick="registrarVariante(${vid})"
                    style="padding: 0.5rem 1rem; background: var(--razo-orange); color: white; border: none; border-radius: 0.5rem; font-weight: 700; cursor: pointer; transition: all 0.15s ease;"
                    onmouseover="this.style.background='#ea580c'"
                    onmouseout="this.style.background='var(--razo-orange)'"
                    ${!state.sesionId ? 'disabled' : ''}
                  >
                    Registrar
                  </button>
                </td>
              </tr>
            `;
          })
          .join("");
      }

      window.registrarVariante = async function(varianteId) {
        if (!state.sesionId) {
          toast("warning", "Selecciona una sesión");
          return;
        }

        const vid = Number.parseInt(varianteId, 10);
        if (!Number.isInteger(vid) || vid <= 0) {
          toast("warning", "Variante inválida");
          return;
        }

        const qtyInput = document.getElementById(`modalVarQty-${vid}`);
        if (!qtyInput) {
          toast("warning", "No se encontró el input de cantidad");
          return;
        }

        const cantidad = Number.parseInt(qtyInput.value || "0", 10) || 0;

        if (cantidad < 0) {
          toast("warning", "Cantidad inválida");
          qtyInput.focus();
          return;
        }

        try {
          const resp = await apiCall("/admin/auditoria-inventario/registrar-conteo", {
            method: "POST",
            body: JSON.stringify({
              sesionId: state.sesionId,
              varianteId: vid,
              cantidad,
            }),
          });

          if (!resp.ok) {
            throw new Error(resp.data?.message || "No se pudo registrar");
          }

          const variante = state.varianteById.get(vid);
          const nombreProducto = variante ? `${variante.nombreproducto} (${variante.sku})` : `Variante ${vid}`;

          toast("success", `Registrado: ${nombreProducto} (${cantidad})`);
          
          state.registeredVariants.add(vid);
          
          if (ultimoRegistro && ultimoRegistroTexto) {
            ultimoRegistroTexto.textContent = `${nombreProducto} · Cantidad: ${cantidad}`;
            ultimoRegistro.style.display = "block";
          }

          qtyInput.value = "0";
          
          if (state.productoModalActualId) {
            renderVariantesModal(state.productoModalActualId);
          }
        } catch (error) {
          console.error(error);
          toast("error", error.message || "Error al registrar");
        }
      };

      const loadSesiones = async () => {
        try {
          const resp = await apiCall(
            "/admin/auditoria-inventario/sesiones?estatus=ABIERTA",
            { method: "GET" }
          );

          if (!resp.ok) {
            throw new Error(resp.data?.message || "No se pudieron cargar sesiones");
          }

          const sesiones = Array.isArray(resp.data?.data?.sesiones)
            ? resp.data.data.sesiones
            : [];

          sesionSelect.innerHTML = "";

          const placeholder = document.createElement("option");
          placeholder.value = "";
          placeholder.textContent = "Selecciona una sesión…";
          sesionSelect.appendChild(placeholder);

          for (const s of sesiones) {
            const option = document.createElement("option");
            option.value = String(s.sesionId);
            option.textContent = `#${s.sesionId} — ${safeText(s.nombre)} (${safeText(s.estatus)})`;
            sesionSelect.appendChild(option);
          }
        } catch (error) {
          console.error(error);
        }
      };

      sesionSelect.addEventListener("change", () => {
        const id = Number.parseInt(sesionSelect.value, 10);
        if (!id) {
          state.sesionId = null;
          return;
        }
        state.sesionId = id;
      });

      if (searchInput) {
        searchInput.addEventListener("input", onSearchChange);
      }
      if (filterCategoria) {
        filterCategoria.addEventListener("change", applyFilters);
      }
      if (filterMedida) {
        filterMedida.addEventListener("change", applyFilters);
      }

      (async function init() {
        await loadCategorias();
        await loadMedidas();
        await loadProductCatalog();
        await loadSesiones();
      })();
    </script>
  </body>
</html>
