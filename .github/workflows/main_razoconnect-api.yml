# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and Deploy to Azure — razoconnect-api

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    name: Run Tests Before Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install ALL dependencies (including devDependencies for tests)
        run: npm ci

      - name: Run tests
        run: npm test
        env:
          NODE_ENV: test
          JWT_SECRET: test-secret-suficientemente-largo-32chars-ci
          JWT_REFRESH_SECRET: test-refresh-secret-suficientemente-largo-32chars-ci
          JWT_EXPIRES_IN: 1h
          JWT_REFRESH_EXPIRES_IN: 30d
          SESSION_SECRET: test-session-secret-suficientemente-largo-ci
          FRONTEND_BASE_URL: https://tudominio.com
          BCRYPT_ROUNDS: 10
          CLOUDINARY_CLOUD_NAME: test-cloud
          CLOUDINARY_API_KEY: test-api-key
          CLOUDINARY_API_SECRET: test-api-secret

  build:
    name: Build for Production
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install production dependencies only
        run: npm ci --omit=dev

      - name: Cleanup unnecessary files
        run: |
          echo "🧹 Cleaning up unnecessary files before artifact upload..."
          # Remove temporary files and caches
          rm -rf .npm
          rm -rf .cache
          rm -rf node_modules/.cache
          # Remove documentation and development files
          rm -rf docs/
          rm -rf tests/
          rm -rf scripts/
          rm -rf Excel-templates/
          rm -rf .azure/
          rm -rf .git/
          # Remove markdown and SQL files
          find . -type f \( -name "*.md" -o -name "*.sql" \) -delete
          # Remove other unnecessary files
          rm -f .gitignore .gitattributes .editorconfig
          echo "✅ Cleanup completed"

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: |
            index.js
            package.json
            package-lock.json
            db.js
            startup.sh
            config/
            controllers/
            middlewares/
            routes/
            services/
            utils/
            templates/
            tenants_views/
            node_modules/
          retention-days: 1

  deploy:
    name: Deploy to Azure Web App
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: ./deployment

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_B00922BC747F415EAC81B4018E3F6D10 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_787249DC449845939719E371F83161B5 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_B0CD5CD4A9124DF99B64C9EB0989C5EB }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'razoconnect-api'
          slot-name: 'Production'
          package: ./deployment
