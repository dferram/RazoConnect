name: CI — Tests & Quality (FIXED)

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    # 🔧 NUEVO: Servicio PostgreSQL para tests de integración
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: test_razoconnect
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    strategy:
      matrix:
        node-version: [22.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install ALL dependencies (including devDependencies)
        run: npm ci

      # 🔧 NUEVO: Esperar a que PostgreSQL esté listo
      - name: Wait for PostgreSQL
        run: |
          until nc -z localhost 5432; do
            echo 'waiting for postgres...'
            sleep 1
          done

      # 🔧 NUEVO: Inicializar BD de test
      - name: Initialize test database
        env:
          PGPASSWORD: test_password
        run: |
          psql -h localhost -U test_user -d test_razoconnect -c "CREATE SCHEMA IF NOT EXISTS public;" || true
          psql -h localhost -U test_user -d test_razoconnect -c "CREATE TABLE IF NOT EXISTS administradores (adminid SERIAL PRIMARY KEY);" || true

      - name: Run Unit Tests (Mocked)
        run: npm test -- --testPathPatterns="tests/unit" --testPathIgnorePatterns="tests/integration"
        env:
          NODE_ENV: test
          JWT_SECRET: test-secret-suficientemente-largo-32chars-ci
          JWT_REFRESH_SECRET: test-refresh-secret-suficientemente-largo-32chars-ci
          JWT_EXPIRES_IN: 1h
          JWT_REFRESH_EXPIRES_IN: 30d
          SESSION_SECRET: test-session-secret-suficientemente-largo-ci
          FRONTEND_BASE_URL: https://tudominio.com
          BCRYPT_ROUNDS: 10
          CLOUDINARY_CLOUD_NAME: test-cloud
          CLOUDINARY_API_KEY: test-api-key
          CLOUDINARY_API_SECRET: test-api-secret
          MP_ACCESS_TOKEN: test-mp-token-for-ci
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: test_razoconnect
          DB_USER: test_user
          DB_PASSWORD: test_password

      - name: Run Integration Tests (Con BD)
        run: npm test -- --testPathPatterns="tests/integration"
        env:
          NODE_ENV: test
          JWT_SECRET: test-secret-suficientemente-largo-32chars-ci
          JWT_REFRESH_SECRET: test-refresh-secret-suficientemente-largo-32chars-ci
          JWT_EXPIRES_IN: 1h
          JWT_REFRESH_EXPIRES_IN: 30d
          SESSION_SECRET: test-session-secret-suficientemente-largo-ci
          FRONTEND_BASE_URL: https://tudominio.com
          BCRYPT_ROUNDS: 10
          CLOUDINARY_CLOUD_NAME: test-cloud
          CLOUDINARY_API_KEY: test-api-key
          CLOUDINARY_API_SECRET: test-api-secret
          MP_ACCESS_TOKEN: test-mp-token-for-ci
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: test_razoconnect
          DB_USER: test_user
          DB_PASSWORD: test_password

      - name: Run tests with coverage
        run: npm run test:coverage
        env:
          NODE_ENV: test
          JWT_SECRET: test-secret-suficientemente-largo-32chars-ci
          JWT_REFRESH_SECRET: test-refresh-secret-suficientemente-largo-32chars-ci
          JWT_EXPIRES_IN: 1h
          JWT_REFRESH_EXPIRES_IN: 30d
          SESSION_SECRET: test-session-secret-suficientemente-largo-ci
          FRONTEND_BASE_URL: https://tudominio.com
          BCRYPT_ROUNDS: 10
          CLOUDINARY_CLOUD_NAME: test-cloud
          CLOUDINARY_API_KEY: test-api-key
          CLOUDINARY_API_SECRET: test-api-secret
          MP_ACCESS_TOKEN: test-mp-token-for-ci
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: test_razoconnect
          DB_USER: test_user
          DB_PASSWORD: test_password

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  lint-commits:
    name: Lint Commit Messages
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint commit messages
        run: npx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose
