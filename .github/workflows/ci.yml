name: CI — Tests & Quality

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install ALL dependencies (including devDependencies)
        run: npm ci

      - name: Run tests
        run: npm test
        env:
          NODE_ENV: test
          JWT_SECRET: test-secret-suficientemente-largo-32chars-ci
          JWT_REFRESH_SECRET: test-refresh-secret-suficientemente-largo-32chars-ci
          JWT_EXPIRES_IN: 1h
          JWT_REFRESH_EXPIRES_IN: 30d
          SESSION_SECRET: test-session-secret-suficientemente-largo-ci
          FRONTEND_BASE_URL: https://tudominio.com
          BCRYPT_ROUNDS: 10
          CLOUDINARY_CLOUD_NAME: test-cloud
          CLOUDINARY_API_KEY: test-api-key
          CLOUDINARY_API_SECRET: test-api-secret

      - name: Run tests with coverage
        run: npm run test:coverage
        env:
          NODE_ENV: test
          JWT_SECRET: test-secret-suficientemente-largo-32chars-ci
          JWT_REFRESH_SECRET: test-refresh-secret-suficientemente-largo-32chars-ci
          JWT_EXPIRES_IN: 1h
          JWT_REFRESH_EXPIRES_IN: 30d
          SESSION_SECRET: test-session-secret-suficientemente-largo-ci
          FRONTEND_BASE_URL: https://tudominio.com
          BCRYPT_ROUNDS: 10
          CLOUDINARY_CLOUD_NAME: test-cloud
          CLOUDINARY_API_KEY: test-api-key
          CLOUDINARY_API_SECRET: test-api-secret

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  lint-commits:
    name: Lint Commit Messages
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint commit messages
        run: npx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose
