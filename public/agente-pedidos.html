<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pedidos de mis clientes - RazoConnect</title>
    <link rel="icon" type="image/png" href="/icon/Logo_Razo.png" />

    <!-- Protección de autenticación -->
    <script src="js/auth-guard-agent.js"></script>
    <script src="js/token-refresh.js"></script>

    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/admin.css" />
  </head>
  <body data-sidebar="agent">
    <div class="admin-layout">
      <div id="sidebar-container"></div>

      <main class="admin-main">
        <header class="admin-header">
          <div>
            <h1 class="admin-header-title">Pedidos de mis clientes</h1>
          </div>
          <div class="admin-header-actions">
            <button
              type="button"
              class="btn btn-secondary btn-sm"
              id="btnRefrescarPedidos"
              style="margin-right: 1rem"
            >
              Refrescar
            </button>
            <div class="admin-user-info">
              <div class="admin-user-avatar" id="userAvatar">A</div>
              <div class="admin-user-details">
                <div class="admin-user-name" id="userName">Agente</div>
                <div class="admin-user-role" id="userRole">Agente</div>
              </div>
            </div>
          </div>
        </header>

        <div class="admin-content">
          <div class="admin-card">
            <div class="admin-card-header">
              <h2 class="admin-card-title">Listado de pedidos</h2>
              <p class="admin-card-subtitle">
                Mantente al tanto de la actividad reciente y da seguimiento a
                los pedidos de tus clientes.
              </p>
            </div>
            <div class="admin-card-body">
              <div
                class="admin-card-toolbar admin-card-toolbar--align-right"
                role="tablist"
                aria-label="Filtros de pedidos"
              >
                <div class="admin-filter-tabs">
                  <button
                    type="button"
                    class="admin-filter-btn active"
                    data-estatus=""
                    role="tab"
                    aria-selected="true"
                  >
                    Todos
                  </button>
                  <button
                    type="button"
                    class="admin-filter-btn"
                    data-estatus="Pendiente"
                    role="tab"
                    aria-selected="false"
                  >
                    Pendientes
                  </button>
                  <button
                    type="button"
                    class="admin-filter-btn"
                    data-estatus="Confirmado,En Ruta"
                    role="tab"
                    aria-selected="false"
                  >
                    Por entregar
                  </button>
                </div>
              </div>
              <div class="admin-table-container">
                <table class="admin-table">
                  <thead>
                    <tr>
                      <th>ID Pedido</th>
                      <th>Cliente</th>
                      <th>Fecha</th>
                      <th>Total</th>
                      <th>Estatus</th>
                      <th></th>
                    </tr>
                  </thead>
                  <tbody id="tablaPedidosBody">
                    <tr id="tablaPedidosEmpty">
                      <td colspan="6" class="table-empty-state">
                        Cargando pedidos...
                      </td>
                    </tr>
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>

    <script src="js/layout.js" defer></script>
    <script src="js/api.js"></script>
    <script src="js/components/user-profile.js"></script>
    <script src="js/agente-header-dropdown.js"></script>
    <script src="js/agente-pedidos.js"></script>
  </body>
</html>
