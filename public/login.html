<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión - RazoConnect</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <nav class="navbar">
    <div class="container navbar-content">
      <a href="/" class="navbar-brand">🌹 RazoConnect</a>
      <ul class="navbar-menu">
        <li><a href="/registro.html" class="navbar-link">Registro</a></li>
      </ul>
    </div>
  </nav>

  <div class="container">
    <div class="form-container">
      <h1 class="form-title">Iniciar Sesión</h1>
      <p class="form-subtitle">Accede a tu cuenta de RazoConnect</p>

      <div id="alert" style="display: none;"></div>

      <form id="loginForm">
        <div class="form-group">
          <label class="form-label" for="email">Correo Electrónico</label>
          <input 
            type="email" 
            id="email" 
            name="email" 
            class="form-input" 
            placeholder="tu@email.com"
            required
          >
          <div class="form-error" id="emailError"></div>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Contraseña</label>
          <input 
            type="password" 
            id="password" 
            name="password" 
            class="form-input" 
            placeholder="••••••••"
            required
          >
          <div class="form-error" id="passwordError"></div>
        </div>

        <button type="submit" class="btn btn-primary btn-block" id="submitBtn">
          <span id="btnText">Iniciar Sesión</span>
          <div class="spinner" id="btnSpinner" style="display: none; width: 20px; height: 20px; border-width: 2px;"></div>
        </button>
      </form>

      <p class="text-center mt-3" style="color: var(--text-secondary);">
        ¿No tienes cuenta? <a href="/registro.html" style="color: var(--primary-color); text-decoration: none;">Regístrate aquí</a>
      </p>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script>
    const loginForm = document.getElementById('loginForm');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const submitBtn = document.getElementById('submitBtn');
    const btnText = document.getElementById('btnText');
    const btnSpinner = document.getElementById('btnSpinner');
    const alertDiv = document.getElementById('alert');

    // Check if user is already logged in
    if (isAuthenticated()) {
      window.location.href = '/dashboard.html';
    }

    // Show alert message
    function showAlert(message, type = 'error') {
      alertDiv.className = `alert alert-${type}`;
      alertDiv.textContent = message;
      alertDiv.style.display = 'block';
      
      setTimeout(() => {
        alertDiv.style.display = 'none';
      }, 5000);
    }

    // Validate email format
    function validateEmail(email) {
      const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      return re.test(email);
    }

    // Handle form submission
    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();

      // Clear previous errors
      document.querySelectorAll('.form-error').forEach(el => el.classList.remove('show'));
      document.querySelectorAll('.form-input').forEach(el => el.classList.remove('error'));

      const email = emailInput.value.trim();
      const password = passwordInput.value.trim();

      // Validation
      let hasError = false;

      if (!email) {
        document.getElementById('emailError').textContent = 'El correo es requerido';
        document.getElementById('emailError').classList.add('show');
        emailInput.classList.add('error');
        hasError = true;
      } else if (!validateEmail(email)) {
        document.getElementById('emailError').textContent = 'Formato de correo inválido';
        document.getElementById('emailError').classList.add('show');
        emailInput.classList.add('error');
        hasError = true;
      }

      if (!password) {
        document.getElementById('passwordError').textContent = 'La contraseña es requerida';
        document.getElementById('passwordError').classList.add('show');
        passwordInput.classList.add('error');
        hasError = true;
      }

      if (hasError) return;

      // Show loading state
      submitBtn.disabled = true;
      btnText.style.display = 'none';
      btnSpinner.style.display = 'block';

      try {
        const response = await API.login(email, password);

        if (response.ok && response.data.success) {
          // Save auth data
          saveAuthData(response.data.data.token, response.data.data.usuario);
          
          // Show success message
          showToast('¡Inicio de sesión exitoso!', 'success');
          
          // Redirect to dashboard
          setTimeout(() => {
            window.location.href = '/dashboard.html';
          }, 500);
        } else {
          // Show error message
          showAlert(response.data.message || 'Error al iniciar sesión', 'error');
        }
      } catch (error) {
        console.error('Login error:', error);
        showAlert('Error al conectar con el servidor. Intenta nuevamente.', 'error');
      } finally {
        // Reset button state
        submitBtn.disabled = false;
        btnText.style.display = 'inline';
        btnSpinner.style.display = 'none';
      }
    });

    // Real-time validation
    emailInput.addEventListener('blur', () => {
      const email = emailInput.value.trim();
      if (email && !validateEmail(email)) {
        document.getElementById('emailError').textContent = 'Formato de correo inválido';
        document.getElementById('emailError').classList.add('show');
        emailInput.classList.add('error');
      } else {
        document.getElementById('emailError').classList.remove('show');
        emailInput.classList.remove('error');
      }
    });
  </script>
</body>
</html>
