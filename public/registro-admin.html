<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registro de Administrador - RazoConnect</title>
    <link rel="icon" type="image/png" href="/icon/Logo_Razo.png" />
    <link rel="stylesheet" href="css/styles.css" />
    <style>
      .admin-form-container {
        max-width: 480px;
        margin: 2rem auto;
        padding: 2rem;
        background: #fff;
        border-radius: 12px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
      }
      .admin-badge {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        background: linear-gradient(135deg, #dc2626, #991b1b);
        color: white;
        padding: 0.5rem 1rem;
        border-radius: 20px;
        font-size: 0.875rem;
        font-weight: 600;
        margin-bottom: 1rem;
      }
      .security-notice {
        background: #fef3c7;
        border: 1px solid #f59e0b;
        border-radius: 8px;
        padding: 1rem;
        margin-bottom: 1.5rem;
        font-size: 0.875rem;
        color: #92400e;
      }
      .security-notice strong {
        display: block;
        margin-bottom: 0.25rem;
      }
    </style>
  </head>
  <body>
    <nav class="navbar">
      <div class="container navbar-content">
        <a href="/" class="navbar-brand"><img src="/icon/Logo_Razo.png" class="titulo-emoji-reemplazo" alt="Razo">RazoConnect</a>
        <ul class="navbar-menu">
          <li>
            <a href="/admin-login.html" class="navbar-link"
              >Iniciar Sesión Admin</a
            >
          </li>
        </ul>
      </div>
    </nav>

    <div class="container">
      <div class="admin-form-container">
        <div class="text-center">
          <span class="admin-badge">🔐 Área Restringida</span>
          <h1 class="form-title">Registro de Administrador</h1>
          <p class="form-subtitle">Crear nueva cuenta de administrador</p>
        </div>

        <div class="security-notice">
          <strong>⚠️ Aviso de Seguridad</strong>
          Este formulario requiere una clave de autorización. Solo personal
          autorizado puede crear cuentas de administrador.
        </div>

        <div id="alert" style="display: none"></div>

        <form id="registroAdminForm">
          <div class="form-group">
            <label class="form-label" for="adminKey"
              >Clave de Autorización *</label
            >
            <input
              type="password"
              id="adminKey"
              name="adminKey"
              class="form-input"
              placeholder="Ingresa la clave maestra"
              required
              autocomplete="off"
            />
            <div class="form-error" id="adminKeyError"></div>
          </div>

          <hr
            style="
              margin: 1.5rem 0;
              border: none;
              border-top: 1px solid #e5e7eb;
            "
          />

          <div class="form-group">
            <label class="form-label" for="nombre">Nombre *</label>
            <input
              type="text"
              id="nombre"
              name="nombre"
              class="form-input"
              placeholder="Juan"
              required
            />
            <div class="form-error" id="nombreError"></div>
          </div>

          <div class="form-group">
            <label class="form-label" for="apellido">Apellido *</label>
            <input
              type="text"
              id="apellido"
              name="apellido"
              class="form-input"
              placeholder="Pérez"
              required
            />
            <div class="form-error" id="apellidoError"></div>
          </div>

          <div class="form-group">
            <label class="form-label" for="email">Correo Electrónico *</label>
            <input
              type="email"
              id="email"
              name="email"
              class="form-input"
              placeholder="admin@empresa.com"
              required
            />
            <div class="form-error" id="emailError"></div>
          </div>

          <div class="form-group">
            <label class="form-label" for="password">Contraseña *</label>
            <input
              type="password"
              id="password"
              name="password"
              class="form-input"
              placeholder="Mínimo 6 caracteres"
              required
            />
            <div class="form-error" id="passwordError"></div>
          </div>

          <div class="form-group">
            <label class="form-label" for="confirmPassword"
              >Confirmar Contraseña *</label
            >
            <input
              type="password"
              id="confirmPassword"
              name="confirmPassword"
              class="form-input"
              placeholder="Repite tu contraseña"
              required
            />
            <div class="form-error" id="confirmPasswordError"></div>
          </div>

          <div class="form-group">
            <label class="form-label" for="rol">Rol</label>
            <select id="rol" name="rol" class="form-input">
              <option value="admin">Administrador</option>
              <option value="superadmin">Super Admin</option>
            </select>
          </div>

          <button
            type="submit"
            class="btn btn-primary btn-block"
            id="submitBtn"
          >
            <span id="btnText">Crear Administrador</span>
            <div
              class="spinner"
              id="btnSpinner"
              style="
                display: none;
                width: 20px;
                height: 20px;
                border-width: 2px;
              "
            ></div>
          </button>
        </form>

        <p class="text-center mt-3" style="color: var(--text-secondary)">
          <a
            href="/admin-login.html"
            style="
              color: var(--primary-color);
              text-decoration: none;
              font-weight: 600;
            "
            >← Volver al login de admin</a
          >
        </p>
      </div>
    </div>

    <script src="js/api.js"></script>
    <script>
      const registroForm = document.getElementById("registroAdminForm");
      const adminKeyInput = document.getElementById("adminKey");
      const nombreInput = document.getElementById("nombre");
      const apellidoInput = document.getElementById("apellido");
      const emailInput = document.getElementById("email");
      const passwordInput = document.getElementById("password");
      const confirmPasswordInput = document.getElementById("confirmPassword");
      const rolSelect = document.getElementById("rol");
      const submitBtn = document.getElementById("submitBtn");
      const btnText = document.getElementById("btnText");
      const btnSpinner = document.getElementById("btnSpinner");
      const alertDiv = document.getElementById("alert");

      // Show alert message
      function showAlert(message, type = "error") {
        alertDiv.className = `alert alert-${type}`;
        alertDiv.textContent = message;
        alertDiv.style.display = "block";

        if (type === "error") {
          setTimeout(() => {
            alertDiv.style.display = "none";
          }, 5000);
        }
      }

      // Validate email format
      function validateEmail(email) {
        const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        return re.test(email);
      }

      // Handle form submission
      registroForm.addEventListener("submit", async (e) => {
        e.preventDefault();

        // Clear previous errors
        document
          .querySelectorAll(".form-error")
          .forEach((el) => el.classList.remove("show"));
        document
          .querySelectorAll(".form-input")
          .forEach((el) => el.classList.remove("error"));

        const adminKey = adminKeyInput.value.trim();
        const nombre = nombreInput.value.trim();
        const apellido = apellidoInput.value.trim();
        const email = emailInput.value.trim();
        const password = passwordInput.value;
        const confirmPassword = confirmPasswordInput.value;
        const rol = rolSelect.value;

        // Validation
        let hasError = false;

        if (!adminKey) {
          document.getElementById("adminKeyError").textContent =
            "La clave de autorización es requerida";
          document.getElementById("adminKeyError").classList.add("show");
          adminKeyInput.classList.add("error");
          hasError = true;
        }

        if (!nombre) {
          document.getElementById("nombreError").textContent =
            "El nombre es requerido";
          document.getElementById("nombreError").classList.add("show");
          nombreInput.classList.add("error");
          hasError = true;
        }

        if (!apellido) {
          document.getElementById("apellidoError").textContent =
            "El apellido es requerido";
          document.getElementById("apellidoError").classList.add("show");
          apellidoInput.classList.add("error");
          hasError = true;
        }

        if (!email) {
          document.getElementById("emailError").textContent =
            "El correo es requerido";
          document.getElementById("emailError").classList.add("show");
          emailInput.classList.add("error");
          hasError = true;
        } else if (!validateEmail(email)) {
          document.getElementById("emailError").textContent =
            "Formato de correo inválido";
          document.getElementById("emailError").classList.add("show");
          emailInput.classList.add("error");
          hasError = true;
        }

        if (!password) {
          document.getElementById("passwordError").textContent =
            "La contraseña es requerida";
          document.getElementById("passwordError").classList.add("show");
          passwordInput.classList.add("error");
          hasError = true;
        } else if (password.length < 6) {
          document.getElementById("passwordError").textContent =
            "La contraseña debe tener al menos 6 caracteres";
          document.getElementById("passwordError").classList.add("show");
          passwordInput.classList.add("error");
          hasError = true;
        }

        if (!confirmPassword) {
          document.getElementById("confirmPasswordError").textContent =
            "Confirma tu contraseña";
          document.getElementById("confirmPasswordError").classList.add("show");
          confirmPasswordInput.classList.add("error");
          hasError = true;
        } else if (password !== confirmPassword) {
          document.getElementById("confirmPasswordError").textContent =
            "Las contraseñas no coinciden";
          document.getElementById("confirmPasswordError").classList.add("show");
          confirmPasswordInput.classList.add("error");
          hasError = true;
        }

        if (hasError) return;

        // Show loading state
        submitBtn.disabled = true;
        btnText.style.display = "none";
        btnSpinner.style.display = "block";

        try {
          const response = await fetch("/api/auth/registro-admin", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              Nombre: nombre,
              Apellido: apellido,
              Email: email,
              Password: password,
              Rol: rol,
              adminKey: adminKey,
            }),
          });

          const data = await response.json();

          if (response.ok && data.success) {
            showAlert(
              "¡Administrador registrado exitosamente! Redirigiendo...",
              "success"
            );

            // Redirect to admin login
            setTimeout(() => {
              window.location.href = "/admin-login.html";
            }, 2000);
          } else {
            if (response.status === 403) {
              document.getElementById("adminKeyError").textContent =
                "Clave de autorización inválida";
              document.getElementById("adminKeyError").classList.add("show");
              adminKeyInput.classList.add("error");
              adminKeyInput.focus();
            }

            const errorMessage =
              data.message || "Error al registrar el administrador";

            if (data.errors && Array.isArray(data.errors)) {
              showAlert(data.errors.join("\n"), "error");
            } else {
              showAlert(errorMessage, "error");
            }
          }
        } catch (error) {
          console.error("Registro error:", error);
          showAlert(
            "Error al conectar con el servidor. Intenta nuevamente.",
            "error"
          );
        } finally {
          submitBtn.disabled = false;
          btnText.style.display = "inline";
          btnSpinner.style.display = "none";
        }
      });

      // Real-time validation
      emailInput.addEventListener("blur", () => {
        const email = emailInput.value.trim();
        if (email && !validateEmail(email)) {
          document.getElementById("emailError").textContent =
            "Formato de correo inválido";
          document.getElementById("emailError").classList.add("show");
          emailInput.classList.add("error");
        } else {
          document.getElementById("emailError").classList.remove("show");
          emailInput.classList.remove("error");
        }
      });

      passwordInput.addEventListener("input", () => {
        const password = passwordInput.value;
        if (password.length > 0 && password.length < 6) {
          document.getElementById("passwordError").textContent =
            "Mínimo 6 caracteres";
          document.getElementById("passwordError").classList.add("show");
          passwordInput.classList.add("error");
        } else {
          document.getElementById("passwordError").classList.remove("show");
          passwordInput.classList.remove("error");
        }
      });

      confirmPasswordInput.addEventListener("input", () => {
        const password = passwordInput.value;
        const confirmPassword = confirmPasswordInput.value;
        if (confirmPassword.length > 0 && password !== confirmPassword) {
          document.getElementById("confirmPasswordError").textContent =
            "Las contraseñas no coinciden";
          document.getElementById("confirmPasswordError").classList.add("show");
          confirmPasswordInput.classList.add("error");
        } else {
          document
            .getElementById("confirmPasswordError")
            .classList.remove("show");
          confirmPasswordInput.classList.remove("error");
        }
      });
    </script>
  </body>
</html>
