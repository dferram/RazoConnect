<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Cupones - RazoConnect Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/css/admin.css">
    <link rel="stylesheet" href="/css/components/admin-header.css">
    <link rel="stylesheet" href="/css/components/admin-sidebar.css">
</head>
<body>
    <div id="admin-header-container"></div>
    
    <div class="admin-layout">
        <div id="admin-sidebar-container"></div>
        
        <main class="admin-main">
            <div class="admin-content">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div>
                        <h1 class="admin-title">Gestión de Cupones</h1>
                        <p class="text-muted">Administra códigos promocionales y descuentos</p>
                    </div>
                    <button type="button" class="btn btn-primary" id="btn-nuevo-cupon">
                        <i class="bi bi-plus-circle"></i>
                        <span class="ms-1">Nuevo Cupón</span>
                    </button>
                </div>

                <div class="admin-stat-card">
                    <div class="table-responsive">
                        <table class="admin-table" id="tabla-cupones">
                            <thead>
                                <tr>
                                    <th>Código</th>
                                    <th>Descripción</th>
                                    <th>Tipo</th>
                                    <th>Valor</th>
                                    <th>Usos</th>
                                    <th>Vigencia</th>
                                    <th>Estado</th>
                                    <th>Acciones</th>
                                </tr>
                            </thead>
                            <tbody id="cupones-tbody">
                                <tr>
                                    <td colspan="8" class="text-center py-5">
                                        <div class="spinner-border text-primary" role="status">
                                            <span class="visually-hidden">Cargando...</span>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div class="modal fade" id="modalCupon" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered" style="max-width: 1200px; width: 95%;">
            <div class="modal-content" style="border-radius: 1rem; box-shadow: 0 10px 40px rgba(0,0,0,0.15);">
                <div class="modal-header" style="border-bottom: 1px solid rgba(0,0,0,0.1); padding: 1.5rem;">
                    <h5 class="modal-title" id="modalCuponLabel">Nuevo Cupón</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
                </div>
                <div class="modal-body" style="padding: 2rem;">
                    <form id="form-cupon">
                        <input type="hidden" id="cupon-id">
                        
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label for="cupon-codigo" class="form-label">Código del Cupón <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="cupon-codigo" required 
                                    placeholder="Ej: NIKE20, VERANO2025" style="text-transform: uppercase;">
                                <small class="text-muted">El código se convertirá automáticamente a mayúsculas</small>
                            </div>
                            
                            <div class="col-md-6">
                                <label for="cupon-descripcion" class="form-label">Descripción</label>
                                <input type="text" class="form-control" id="cupon-descripcion" 
                                    placeholder="Ej: Descuento de verano">
                            </div>
                            
                            <div class="col-md-4">
                                <label for="cupon-tipo" class="form-label">Tipo de Descuento <span class="text-danger">*</span></label>
                                <select class="form-select" id="cupon-tipo" required>
                                    <option value="PORCENTAJE">Porcentaje (%)</option>
                                    <option value="FIJO">Monto Fijo ($)</option>
                                </select>
                            </div>
                            
                            <div class="col-md-4">
                                <label for="cupon-valor" class="form-label">Valor <span class="text-danger">*</span></label>
                                <input type="number" class="form-control" id="cupon-valor" required 
                                    min="0" step="0.01" placeholder="Ej: 20">
                                <small class="text-muted" id="valor-hint">Ingresa el porcentaje (0-100)</small>
                            </div>
                            
                            <div class="col-md-4">
                                <label for="cupon-monto-minimo" class="form-label">Compra Mínima ($)</label>
                                <input type="number" class="form-control" id="cupon-monto-minimo" 
                                    min="0" step="0.01" value="0" placeholder="0.00">
                                <small class="text-muted">Deja en 0 para sin mínimo</small>
                            </div>
                            
                            <div class="col-md-4">
                                <label for="cupon-fecha-inicio" class="form-label">Fecha Inicio</label>
                                <input type="datetime-local" class="form-control" id="cupon-fecha-inicio">
                            </div>
                            
                            <div class="col-md-4">
                                <label for="cupon-fecha-fin" class="form-label">Fecha Fin</label>
                                <input type="datetime-local" class="form-control" id="cupon-fecha-fin">
                            </div>
                            
                            <div class="col-md-4">
                                <label for="cupon-uso-maximo" class="form-label">Usos Máximos</label>
                                <input type="number" class="form-control" id="cupon-uso-maximo" 
                                    min="1" step="1" placeholder="Ilimitado">
                                <small class="text-muted">Deja vacío para ilimitado</small>
                            </div>
                        </div>
                        
                        <div class="d-flex justify-content-end gap-2" style="margin-top: 1.5rem; margin-bottom: 1rem;">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                            <button type="submit" class="btn btn-primary" id="btn-guardar-cupon">
                                <i class="bi bi-save"></i>
                                <span class="ms-1">Guardar Cupón</span>
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="/js/components/admin-header-loader.js"></script>
    <script src="/js/components/admin-sidebar-loader.js"></script>
    <script src="/js/admin-cupones.js"></script>
</body>
</html>
