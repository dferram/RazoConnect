<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Productos - RazoConnect</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <nav class="navbar">
      <div class="container navbar-content">
        <a href="/catalogo.html" class="navbar-brand">📦 RazoConnect</a>
        <ul class="navbar-menu">
          <li>
            <a
              href="/catalogo.html"
              class="navbar-link"
              style="color: var(--primary-color); font-weight: 600"
              >Productos</a
            >
          </li>
          <li><a href="/carrito.html" class="navbar-link">Carrito</a></li>
          <li>
            <a
              href="/dashboard.html"
              id="userGreeting"
              style="
                color: var(--text-secondary);
                font-size: 0.875rem;
                text-decoration: none;
              "
              title="Mi cuenta"
            ></a>
          </li>
          <li>
            <a href="#" class="navbar-link" id="logoutBtn">Cerrar sesión</a>
          </li>
        </ul>
      </div>
    </nav>

    <div class="container" style="padding-top: 2rem; padding-bottom: 3rem">
      <!-- Header -->
      <div
        style="
          display: flex;
          justify-content: space-between;
          align-items: center;
          margin-bottom: 2rem;
        "
      >
        <div>
          <h1
            style="font-size: 2.5rem; font-weight: bold; margin-bottom: 1.5rem"
          >
            Catálogo de productos
          </h1>
          <p style="color: var(--text-secondary)">
            Explora nuestro catálogo de cajas de fashion al mayoreo
          </p>
        </div>
        <div
          style="
            display: flex;
            flex-direction: column;
            gap: 1rem;
            align-items: flex-end;
          "
        >
          <a href="/carrito.html" class="cart-icon-button" title="Ver carrito">
            🛒
            <span class="sr-only">Ver carrito</span>
          </a>

          <form
            id="searchForm"
            style="width: 100%; max-width: 520px"
            onsubmit="return false;"
          >
            <label for="search-bar" style="display: none"
              >Buscar producto</label
            >
            <div
              style="
                display: flex;
                align-items: center;
                width: 100%;
                border: 2px solid rgba(255, 136, 84, 0.65);
                border-radius: 2.5rem;
                overflow: hidden;
                background: #fff;
                box-shadow: 0 12px 26px rgba(255, 116, 60, 0.18);
              "
            >
              <input
                type="search"
                id="search-bar"
                placeholder="Buscar por nombre/SKU"
                style="
                  flex: 1;
                  padding: 1rem 1.5rem 1rem 1.5rem;
                  border: none;
                  background: transparent;
                  font-size: 1.05rem;
                  color: var(--text-primary);
                  outline: none;
                "
              />
              <button
                type="button"
                id="btnBuscarHeader"
                style="
                  min-width: 70px;
                  align-self: stretch;
                  border: none;
                  background: linear-gradient(135deg, #ff7a3a 0%, #ff974d 100%);
                  display: flex;
                  align-items: center;
                  justify-content: center;
                  cursor: pointer;
                  transition: transform 0.2s ease;
                  padding: 0 1.35rem;
                  border-radius: 0 0.5rem 0.5rem 0;
                "
                title="Buscar"
              >
                <svg
                  width="22"
                  height="22"
                  viewBox="0 0 24 24"
                  fill="none"
                  xmlns="http://www.w3.org/2000/svg"
                >
                  <circle
                    cx="11"
                    cy="11"
                    r="7"
                    stroke="white"
                    stroke-width="2"
                  />
                  <path
                    d="M16.5 16.5L21 21"
                    stroke="white"
                    stroke-width="2"
                    stroke-linecap="round"
                  />
                </svg>
              </button>
            </div>
          </form>
        </div>
      </div>

      <!-- Layout con Sidebar y Contenido -->
      <div style="display: grid; grid-template-columns: 200px 1fr; gap: 3rem">
        <!-- Sidebar de Categorías estilo Nike -->
        <aside class="catalog-sidebar">
          <!-- Loading categorías -->
          <div id="loadingCategorias" style="text-align: center; padding: 1rem">
            <div class="spinner" style="width: 30px; height: 30px"></div>
          </div>

          <!-- Lista de categorías -->
          <ul
            id="categoriasList"
            style="list-style: none; padding: 0; margin: 0; display: none"
          >
            <!-- Las categorías se cargarán aquí dinámicamente -->
          </ul>

          <!-- Controles de filtros adicionales -->
          <div id="filtrosAdicionales" style="margin-top: 2rem; display: none">
            <div
              style="
                display: flex;
                flex-direction: column;
                gap: 1.5rem;
                font-size: 0.92rem;
                color: var(--text-secondary);
              "
            >
              <!-- Precio -->
              <div>
                <p
                  style="
                    font-weight: 600;
                    margin-bottom: 0.75rem;
                    color: var(--text-primary);
                    letter-spacing: 0.02em;
                  "
                >
                  Precio
                </p>
                <div
                  style="
                    display: grid;
                    grid-template-columns: repeat(2, 1fr);
                    gap: 0.75rem;
                  "
                >
                  <div>
                    <label
                      for="precio-min"
                      style="
                        display: block;
                        font-size: 0.75rem;
                        color: var(--text-secondary);
                        margin-bottom: 0.25rem;
                      "
                      >Min</label
                    >
                    <input
                      type="number"
                      id="precio-min"
                      placeholder="Min"
                      min="0"
                      style="
                        width: 100%;
                        padding: 0.35rem 0;
                        border: none;
                        border-bottom: 1px solid #e5e5e5;
                        background: transparent;
                        font-size: 0.92rem;
                        color: var(--text-primary);
                        outline: none;
                      "
                    />
                  </div>
                  <div>
                    <label
                      for="precio-max"
                      style="
                        display: block;
                        font-size: 0.75rem;
                        color: var(--text-secondary);
                        margin-bottom: 0.25rem;
                      "
                      >Max</label
                    >
                    <input
                      type="number"
                      id="precio-max"
                      placeholder="Max"
                      min="0"
                      style="
                        width: 100%;
                        padding: 0.35rem 0;
                        border: none;
                        border-bottom: 1px solid #e5e5e5;
                        background: transparent;
                        font-size: 0.92rem;
                        color: var(--text-primary);
                        outline: none;
                      "
                    />
                  </div>
                </div>
              </div>

              <!-- Dimensiones -->
              <div>
                <label
                  for="filtro-dimensiones"
                  style="
                    display: block;
                    font-weight: 600;
                    margin-bottom: 0.5rem;
                    color: var(--text-secondary);
                  "
                >
                  Dimensiones
                </label>
                <select
                  id="filtro-dimensiones"
                  style="
                    width: 100%;
                    padding: 0.5rem 0;
                    border: none;
                    border-bottom: 1px solid #e5e5e5;
                    background: transparent;
                    font-size: 0.92rem;
                    color: var(--text-primary);
                    outline: none;
                  "
                >
                  <option value="">Todas</option>
                </select>
              </div>

              <!-- Disponibilidad -->
              <div>
                <label for="filtro-stock" class="stock-filter">
                  <input
                    type="checkbox"
                    id="filtro-stock"
                    class="stock-filter__checkbox"
                  />
                  <span class="check-box" aria-hidden="true"></span>
                  <span class="stock-filter__text">Solo en stock</span>
                </label>
              </div>

              <!-- Botón aplicar -->
              <button
                id="btn-aplicar-filtros"
                class="btn btn-primary"
                style="
                  width: 100%;
                  justify-content: center;
                  padding: 0.85rem 1.5rem;
                  border-radius: 0.5rem;
                  border: none;
                  box-shadow: 0 12px 26px rgba(255, 116, 60, 0.24);
                  font-size: 0.95rem;
                  font-weight: 600;
                  letter-spacing: 0.01em;
                "
              >
                Aplicar filtros
              </button>
            </div>
          </div>
        </aside>

        <!-- Contenido Principal -->
        <main>
          <!-- Filtro activo -->
          <div id="filtroActivo" style="margin-bottom: 1.5rem; display: none">
            <div
              style="
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding-bottom: 1rem;
                border-bottom: 1px solid #e5e5e5;
              "
            >
              <span
                style="
                  font-weight: 600;
                  font-size: 1.125rem;
                  color: var(--text-primary);
                "
              >
                <span id="categoriaActiva"></span>
                <span style="color: var(--text-secondary); font-weight: 400"
                  >(<span id="productCount">0</span>)</span
                >
              </span>
              <button
                id="btnLimpiarFiltros"
                style="
                  background: none;
                  border: none;
                  color: var(--text-secondary);
                  cursor: pointer;
                  font-size: 0.875rem;
                  text-decoration: underline;
                "
              >
                Limpiar filtros
              </button>
            </div>
            <div
              id="filtroResumen"
              style="
                display: none;
                gap: 0.5rem;
                flex-wrap: wrap;
                padding-top: 0.85rem;
              "
            ></div>
          </div>

          <!-- Loading State -->
          <div id="loadingState" class="loading">
            <div class="spinner"></div>
          </div>

          <!-- Product Grid -->
          <div
            id="productGrid"
            class="product-grid"
            style="display: none"
          ></div>

          <!-- Empty State -->
          <div id="emptyState" class="empty-state" style="display: none">
            <div class="empty-state-icon">📦</div>
            <h2 class="empty-state-title">No hay productos disponibles</h2>
            <p class="empty-state-text">
              Vuelve pronto para ver nuestros nuevos productos
            </p>
          </div>
        </main>
      </div>
    </div>

    <script src="js/api.js"></script>
    <script>
      // Check authentication
      if (!requireAuth()) {
        // User is not authenticated, redirected to login
      }

      const loadingState = document.getElementById("loadingState");
      const productGrid = document.getElementById("productGrid");
      const emptyState = document.getElementById("emptyState");
      const userGreeting = document.getElementById("userGreeting");
      const logoutBtn = document.getElementById("logoutBtn");
      const loadingCategorias = document.getElementById("loadingCategorias");
      const categoriasList = document.getElementById("categoriasList");
      const filtroActivo = document.getElementById("filtroActivo");
      const categoriaActiva = document.getElementById("categoriaActiva");
      const filtrosAdicionales = document.getElementById("filtrosAdicionales");
      const filtroResumen = document.getElementById("filtroResumen");
      const btnLimpiarFiltros = document.getElementById("btnLimpiarFiltros");
      const productCount = document.getElementById("productCount");
      const searchForm = document.getElementById("searchForm");
      const searchBar = document.getElementById("search-bar");
      const btnBuscarHeader = document.getElementById("btnBuscarHeader");
      const precioMinInput = document.getElementById("precio-min");
      const precioMaxInput = document.getElementById("precio-max");
      const dimensionesSelect = document.getElementById("filtro-dimensiones");
      const stockCheckbox = document.getElementById("filtro-stock");
      const btnAplicarFiltros = document.getElementById("btn-aplicar-filtros");

      let todosLosProductos = [];
      let categoriaSeleccionada = null;
      let filtrosQueryActual = "";
      let nombreCategoriaSeleccionada = null;

      function obtenerFiltrosSeleccionados() {
        return {
          search: searchBar ? searchBar.value.trim() : "",
          precioMin: precioMinInput ? precioMinInput.value : "",
          precioMax: precioMaxInput ? precioMaxInput.value : "",
          dimension: dimensionesSelect ? dimensionesSelect.value : "",
          stock: stockCheckbox ? stockCheckbox.checked : false,
        };
      }

      function construirQueryString() {
        const params = new URLSearchParams();
        const filtros = obtenerFiltrosSeleccionados();

        if (filtros.search) {
          params.append("search", filtros.search);
        }

        if (filtros.precioMin) {
          params.append("precioMin", filtros.precioMin);
        }

        if (filtros.precioMax) {
          params.append("precioMax", filtros.precioMax);
        }

        if (filtros.dimension) {
          params.append("dimension", filtros.dimension);
        }

        if (filtros.stock) {
          params.append("stock", "true");
        }

        const queryString = params.toString();
        return queryString ? `?${queryString}` : "";
      }

      function crearChip(texto, onRemove) {
        const chip = document.createElement("button");
        chip.type = "button";
        chip.textContent = texto;
        chip.style.background = "rgba(255, 136, 84, 0.12)";
        chip.style.color = "var(--text-secondary)";
        chip.style.border = "1px solid rgba(255, 136, 84, 0.25)";
        chip.style.borderRadius = "999px";
        chip.style.padding = "0.35rem 0.85rem";
        chip.style.fontSize = "0.8rem";
        chip.style.cursor = "pointer";
        chip.style.display = "inline-flex";
        chip.style.alignItems = "center";
        chip.style.gap = "0.35rem";

        const close = document.createElement("span");
        close.textContent = "✕";
        close.style.fontSize = "0.75rem";
        chip.appendChild(close);

        chip.addEventListener("click", (event) => {
          event.preventDefault();
          if (typeof onRemove === "function") {
            onRemove();
          }
        });

        return chip;
      }

      function actualizarFiltroActivo() {
        const filtros = obtenerFiltrosSeleccionados();
        const hayCategoria = categoriaSeleccionada !== null;
        const hayOtrosFiltros =
          filtros.search ||
          filtros.precioMin ||
          filtros.precioMax ||
          filtros.dimension ||
          filtros.stock;

        if (!hayCategoria && !hayOtrosFiltros) {
          filtroActivo.style.display = "none";
          if (filtroResumen) {
            filtroResumen.innerHTML = "";
            filtroResumen.style.display = "none";
          }
          return;
        }

        filtroActivo.style.display = "block";

        if (categoriaActiva) {
          categoriaActiva.textContent = nombreCategoriaSeleccionada || "Todos";
        }

        if (!filtroResumen) return;
        filtroResumen.innerHTML = "";

        if (hayCategoria && nombreCategoriaSeleccionada) {
          filtroResumen.appendChild(
            crearChip(`Categoría: ${nombreCategoriaSeleccionada}`, () => {
              filtrarPorCategoria(null);
            })
          );
        }

        if (filtros.search) {
          filtroResumen.appendChild(
            crearChip(`Buscar: "${filtros.search}"`, () => {
              searchBar.value = "";
              aplicarFiltrosDesdeUI();
            })
          );
        }

        if (filtros.precioMin || filtros.precioMax) {
          const minLabel = filtros.precioMin ? `$${filtros.precioMin}` : "-";
          const maxLabel = filtros.precioMax ? `$${filtros.precioMax}` : "-";
          filtroResumen.appendChild(
            crearChip(`Precio: ${minLabel} – ${maxLabel}`, () => {
              if (precioMinInput) precioMinInput.value = "";
              if (precioMaxInput) precioMaxInput.value = "";
              aplicarFiltrosDesdeUI();
            })
          );
        }

        if (filtros.dimension) {
          filtroResumen.appendChild(
            crearChip(`Dimensión: ${filtros.dimension}`, () => {
              if (dimensionesSelect) dimensionesSelect.value = "";
              aplicarFiltrosDesdeUI();
            })
          );
        }

        if (filtros.stock) {
          filtroResumen.appendChild(
            crearChip("Solo en stock", () => {
              if (stockCheckbox) stockCheckbox.checked = false;
              aplicarFiltrosDesdeUI();
            })
          );
        }

        filtroResumen.style.display =
          filtroResumen.childElementCount > 0 ? "flex" : "none";
      }

      async function loadDimensiones() {
        if (!dimensionesSelect) return;

        try {
          const response = await API.getDimensiones();

          if (response.ok && response.data.success) {
            const dimensiones = response.data.data.dimensiones || [];
            dimensionesSelect.innerHTML = '<option value="">Todas</option>';

            dimensiones.forEach((dimension) => {
              const option = document.createElement("option");
              option.value = dimension;
              option.textContent = dimension;
              dimensionesSelect.appendChild(option);
            });
          }
        } catch (error) {
          console.error("Error loading dimensiones:", error);
          showToast("No se pudieron cargar las dimensiones", "warning");
        } finally {
          if (filtrosAdicionales) {
            filtrosAdicionales.style.display = "block";
          }
        }
      }

      // Display user greeting
      const userData = getUserData();
      if (userData) {
        const nombre = userData.nombre || userData.Nombre || "usuario";
        userGreeting.textContent = `Hola, ${nombre}`;
      }

      // Format currency
      function formatCurrency(amount) {
        return new Intl.NumberFormat("es-MX", {
          style: "currency",
          currency: "MXN",
        }).format(amount);
      }

      // Render product card
      function renderProductCard(producto) {
        const categoriaEmojis = {
          "ropa dama": "👗",
          "ropa caballero": "👔",
          accesorios: "👜",
          calzado: "👟",
          infantil: "👶",
        };

        const categoriaNombre = producto.categoria?.nombre
          ? producto.categoria.nombre.toLowerCase()
          : "";
        const emoji = categoriaEmojis[categoriaNombre] || "📦";
        const imagenUrl = producto.imagenUrl;
        const imagenAlt = producto.imagenAlt || producto.nombreProducto;

        const mediaContent = imagenUrl
          ? `<img src="${imagenUrl}" alt="${imagenAlt}" class="product-media" />`
          : `<div class="product-media product-media--fallback">${emoji}</div>`;

        const precioPaqueteMin = Number.isFinite(producto.precioPaqueteMin)
          ? producto.precioPaqueteMin
          : null;
        const precioPaqueteMax = Number.isFinite(producto.precioPaqueteMax)
          ? producto.precioPaqueteMax
          : null;

        const mostrarRango =
          precioPaqueteMin !== null && precioPaqueteMax !== null;

        const precioLabel = (() => {
          if (mostrarRango) {
            if (Math.abs(precioPaqueteMin - precioPaqueteMax) < 0.005) {
              return formatCurrency(precioPaqueteMin);
            }
            return `${formatCurrency(precioPaqueteMin)} – ${formatCurrency(
              precioPaqueteMax
            )}`;
          }

          const precioBase = Number.isFinite(producto.precioDesde)
            ? producto.precioDesde
            : Number.isFinite(producto.varianteDestacada?.precioUnitario)
            ? producto.varianteDestacada.precioUnitario
            : null;

          return precioBase !== null
            ? formatCurrency(precioBase)
            : "Precio no disponible";
        })();

        return `
        <a href="/producto-detalle.html?id=${
          producto.productoId
        }" class="product-card">
          <div class="product-image">
            ${mediaContent}
          </div>
          <div class="product-info">
            <div>
              <div style="margin-bottom: 0.5rem;">
                <span style="font-size: 0.75rem; color: var(--text-secondary); text-transform: uppercase;">
                  ${producto.categoria?.nombre || "Sin categoría"}
                </span>
              </div>
              <h3 class="product-title">${producto.nombreProducto}</h3>
              <p style="font-size: 0.75rem; color: var(--text-secondary); margin-bottom: 0.5rem;">
                ${mostrarRango ? "Precio por paquete" : "Precio desde"}:
              </p>
              <div class="product-price">${precioLabel}</div>
            </div>
            <div style="margin-top: auto; padding-top: 1rem;">
              <span class="btn btn-primary btn-block" style="display: block; text-align: center;">
                Ver Detalles
              </span>
            </div>
          </div>
        </a>
      `;
      }

      // Navigate to product details
      function goToProduct(id) {
        window.location.href = `/producto-detalle.html?id=${id}`;
      }

      // Cargar categorías
      async function loadCategorias() {
        try {
          loadingCategorias.style.display = "block";
          categoriasList.style.display = "none";

          const response = await fetch(`${API_BASE_URL}/categorias`);
          const data = await response.json();

          if (response.ok && data.success) {
            const categorias = data.data.categorias;

            // Agregar cada categoría con estilo (minimalista)
            let categoriasHTML = "";
            categorias.forEach((categoria) => {
              const isActive = categoriaSeleccionada === categoria.categoriaId;
              categoriasHTML += `
              <li style="margin-bottom: 0.5rem;">
                <a href="#" 
                   data-categoriaid="${categoria.categoriaId}" 
                   onclick="filtrarPorCategoria(${categoria.categoriaId}, '${
                categoria.nombre
              }'); return false;"
                   class="categoria-link ${isActive ? "active" : ""}"
                   style="display: block; padding: 0.5rem 0; text-decoration: none; color: ${
                     isActive ? "var(--text-primary)" : "var(--text-secondary)"
                   }; font-size: 0.9375rem; font-weight: ${
                isActive ? "600" : "400"
              }; transition: all 0.2s; border-left: ${
                isActive
                  ? "3px solid var(--razo-orange)"
                  : "3px solid transparent"
              }; padding-left: ${isActive ? "0.75rem" : "0"};">
                  ${categoria.nombre}
                </a>
              </li>
            `;
            });

            categoriasList.innerHTML = categoriasHTML;
            loadingCategorias.style.display = "none";
            categoriasList.style.display = "block";

            // Agregar hover effects dinámicamente
            document
              .querySelectorAll(".categoria-link:not(.active)")
              .forEach((link) => {
                link.addEventListener("mouseenter", function () {
                  this.style.color = "var(--text-primary)";
                  this.style.paddingLeft = "0.75rem";
                  this.style.borderLeft = "3px solid #e5e5e5";
                });
                link.addEventListener("mouseleave", function () {
                  this.style.color = "var(--text-secondary)";
                  this.style.paddingLeft = "0";
                  this.style.borderLeft = "3px solid transparent";
                });
              });
          }
        } catch (error) {
          console.error("Error loading categorias:", error);
          loadingCategorias.innerHTML =
            '<p style="color: var(--danger-color); font-size: 0.875rem;">Error al cargar categorías</p>';
        }
      }

      // Filtrar productos por categoría
      function filtrarPorCategoria(categoriaId, nombreCategoria = null) {
        categoriaSeleccionada = categoriaId;
        nombreCategoriaSeleccionada = categoriaId ? nombreCategoria : null;

        // Recargar categorías para actualizar el estilo activo
        loadCategorias();

        // Filtrar y mostrar productos
        mostrarProductos();
      }

      // Mostrar productos filtrados
      function mostrarProductos() {
        let productosFiltrados = todosLosProductos;

        // Filtrar por categoría si hay una seleccionada
        if (categoriaSeleccionada !== null) {
          productosFiltrados = todosLosProductos.filter(
            (p) =>
              p.categoria && p.categoria.categoriaId === categoriaSeleccionada
          );
        }

        // Actualizar contador de productos
        if (productCount) {
          productCount.textContent = productosFiltrados.length;
        }

        if (productosFiltrados.length === 0) {
          productGrid.style.display = "none";
          emptyState.style.display = "block";
        } else {
          productGrid.innerHTML = productosFiltrados
            .map((producto) => renderProductCard(producto))
            .join("");
          productGrid.style.display = "grid";
          emptyState.style.display = "none";
        }

        actualizarFiltroActivo();
      }

      // Handle apply filters
      async function aplicarFiltrosDesdeUI() {
        filtrosQueryActual = construirQueryString();
        await loadProductos(filtrosQueryActual);
      }

      if (btnAplicarFiltros) {
        btnAplicarFiltros.addEventListener("click", async (event) => {
          event.preventDefault();
          aplicarFiltrosDesdeUI();
        });
      }

      if (btnBuscarHeader) {
        btnBuscarHeader.addEventListener("click", () => {
          aplicarFiltrosDesdeUI();
        });
      }

      if (searchForm) {
        searchForm.addEventListener("submit", (event) => {
          event.preventDefault();
          aplicarFiltrosDesdeUI();
        });
      }

      if (btnLimpiarFiltros) {
        btnLimpiarFiltros.addEventListener("click", async (event) => {
          event.preventDefault();
          if (searchBar) searchBar.value = "";
          if (precioMinInput) precioMinInput.value = "";
          if (precioMaxInput) precioMaxInput.value = "";
          if (dimensionesSelect) dimensionesSelect.value = "";
          if (stockCheckbox) stockCheckbox.checked = false;
          filtrosQueryActual = "";
          categoriaSeleccionada = null;
          nombreCategoriaSeleccionada = null;
          await loadCategorias();
          await loadProductos();
        });
      }

      // Load products
      async function loadProductos(queryString = "") {
        try {
          loadingState.style.display = "flex";
          productGrid.style.display = "none";
          emptyState.style.display = "none";

          const response = await API.getProductos(queryString);

          if (response.ok && response.data.success) {
            todosLosProductos = response.data.data.productos;
            loadingState.style.display = "none";
            mostrarProductos();
          } else {
            throw new Error(
              response.data.message || "Error al cargar productos"
            );
          }
        } catch (error) {
          console.error("Error loading products:", error);
          loadingState.style.display = "none";
          showToast(
            "Error al cargar los productos. Intenta recargar la página.",
            "error"
          );
        }
      }

      // Handle logout
      logoutBtn.addEventListener("click", (e) => {
        e.preventDefault();
        clearAuthData();
        showToast("Sesión cerrada exitosamente", "success");
        setTimeout(() => {
          window.location.href = "/login.html";
        }, 500);
      });

      // Load categorias, dimensiones and products on page load
      loadDimensiones();
      loadCategorias();
      loadProductos();
    </script>

    <style>
      .stock-filter {
        display: inline-flex;
        align-items: center;
        gap: 0.65rem;
        font-weight: 600;
        color: var(--text-secondary);
        cursor: pointer;
        -webkit-user-select: none;
        user-select: none;
      }

      .stock-filter__text {
        line-height: 1;
      }

      .stock-filter__checkbox {
        position: absolute;
        opacity: 0;
        width: 0;
        height: 0;
      }

      .check-box {
        --box-size: 24px;
        --check-color: #ff7a3a;
        width: var(--box-size);
        height: var(--box-size);
        border: calc(var(--box-size) * 0.1) solid rgba(255, 136, 84, 0.6);
        border-radius: 6px;
        background: linear-gradient(135deg, #ffffff, #fff0e8);
        position: relative;
        display: inline-block;
        box-sizing: border-box;
        transition: border-color 0.2s ease, box-shadow 0.2s ease;
      }

      .stock-filter:hover .check-box {
        border-color: rgba(255, 136, 84, 0.9);
      }

      .stock-filter__checkbox:focus-visible + .check-box {
        box-shadow: 0 0 0 3px rgba(255, 136, 84, 0.35);
      }

      .check-box::before,
      .check-box::after {
        content: "";
        position: absolute;
        width: calc(var(--box-size) * 0.15);
        height: 0;
        background-color: var(--check-color);
        border-radius: calc(var(--box-size) * 0.05);
        display: inline-block;
        transform-origin: left top;
        opacity: 0;
      }

      .check-box::before {
        top: calc(var(--box-size) * 0.66);
        left: calc(var(--box-size) * 0.45);
        transform: rotate(-135deg);
        box-shadow: 0 0 0 calc(var(--box-size) * 0.05) var(--razo-cream);
      }

      .check-box::after {
        top: calc(var(--box-size) * 0.42);
        left: calc(var(--box-size) * 0.08);
        transform: rotate(-45deg);
      }

      @keyframes stockCheckBottom {
        0% {
          height: 0;
        }
        100% {
          height: calc(var(--box-size) * 0.42);
        }
      }

      @keyframes stockCheckTop {
        0% {
          height: 0;
        }
        50% {
          height: 0;
        }
        100% {
          height: calc(var(--box-size) * 0.95);
        }
      }

      .stock-filter__checkbox:checked + .check-box {
        border-color: var(--check-color);
      }

      .stock-filter__checkbox:checked + .check-box::after,
      .stock-filter__checkbox:checked + .check-box::before {
        opacity: 1;
      }

      .stock-filter__checkbox:checked + .check-box::after {
        animation: stockCheckBottom 0.2s ease forwards;
      }

      .stock-filter__checkbox:checked + .check-box::before {
        animation: stockCheckTop 0.4s ease forwards;
      }

      /* Responsive layout para móviles */
      @media (max-width: 768px) {
        .container > div {
          grid-template-columns: 1fr !important;
        }

        aside {
          position: static !important;
          margin-bottom: 1.5rem;
        }
      }
    </style>
  </body>
</html>
