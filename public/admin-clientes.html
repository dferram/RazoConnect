<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clientes - Admin RazoConnect</title>
    <link rel="icon" type="image/png" href="/icon/Logo_Razo.png" />

    <!-- PROTECCIÓN DE AUTENTICACIÓN ADMIN -->
    <script src="js/auth-guard-admin.js"></script>

    <!-- SISTEMA DE RENOVACIÓN DE TOKENS -->
    <script src="js/token-refresh.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/admin.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
    />
      <link rel="stylesheet" href="css/mobile-responsive.css" />
  </head>
  <body data-page-title="Clientes">
    <div class="admin-layout">
      <!-- Sidebar -->
      <div id="sidebar-container"></div>

      <!-- Main Content -->
      <main class="admin-main">
        <div id="admin-header-container"></div>

        <div class="admin-content">
          <div
            class="admin-table-container"
            style="margin-bottom: 1.5rem; padding: 1.5rem"
          >
            <h2
              style="
                margin: 0;
                font-size: 1.25rem;
                color: var(--razo-orange, #ff6b35);
              "
            >
              👥 Lista de clientes
            </h2>
          </div>

          <div class="admin-table-container">
            <div id="loadingClientes" class="loading">
              <div class="spinner"></div>
            </div>

            <div style="overflow-x: auto">
              <table
                class="admin-table"
                id="clientesTable"
                style="display: none"
              >
                <thead>
                  <tr>
                    <th>Cliente</th>
                    <th>Email</th>
                    <th>Teléfono</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                  </tr>
                </thead>
                <tbody id="clientesTableBody"></tbody>
              </table>
            </div>

            <div id="emptyClientes" class="empty-state" style="display: none">
              <div class="empty-state-icon">👥</div>
              <h3 class="empty-state-title">No hay clientes registrados</h3>
              <p class="empty-state-text">
                Los clientes aparecerán aquí cuando se registren o realicen
                pedidos.
              </p>
            </div>
          </div>
        </div>
      </main>
    </div>

    <script src="js/layout.js" defer></script>
    <script src="js/api.js"></script>
    <script src="js/admin-header-dropdown.js"></script>
    <script src="js/components/admin-header-loader.js"></script>
    <script src="js/components/user-profile.js"></script>
    <script>
      const adminToken = localStorage.getItem("razoconnect_admin_token");
      if (!adminToken) {
        window.location.href = "/login.html";
      }

      let clientes = [];

      async function verifyAndLoadAdmin() {
        try {
          const response = await fetch(`${API_BASE_URL}/admin/verify`, {
            method: "GET",
            headers: {
              Authorization: `Bearer ${adminToken}`,
              "Content-Type": "application/json",
            },
          });

          if (!response.ok) throw new Error("Invalid token");

          const data = await response.json();
          if (data.success) {
            const admin = data.data.admin;
            const userNameEl = document.getElementById("userName");
            const userRoleEl = document.getElementById("userRole");
            const userAvatarEl = document.getElementById("userAvatar");
            if (userNameEl) userNameEl.textContent = admin.nombre;
            if (userRoleEl) {
              userRoleEl.textContent =
                admin.rol === "superadmin" ? "Super Admin" : "Admin";
            }
            const words = admin.nombre.split(" ");
            const initials =
              words.length >= 2
                ? `${words[0].charAt(0)}${words[1].charAt(0)}`
                : admin.nombre.substring(0, 2);
            if (userAvatarEl) userAvatarEl.textContent = initials.toUpperCase();
          }
        } catch (error) {
          console.error("Error verifying admin:", error);
          localStorage.removeItem("razoconnect_admin_token");
          localStorage.removeItem("razoconnect_admin");
          window.location.href = "/login.html";
        }
      }

      async function loadClientes() {
        const loadingClientes = document.getElementById("loadingClientes");
        const clientesTable = document.getElementById("clientesTable");
        const emptyClientes = document.getElementById("emptyClientes");
        const clientesTableBody = document.getElementById("clientesTableBody");

        try {
          loadingClientes.style.display = "flex";
          clientesTable.style.display = "none";
          emptyClientes.style.display = "none";

          const response = await fetch(`${API_BASE_URL}/admin/clientes`, {
            method: "GET",
            headers: {
              Authorization: `Bearer ${adminToken}`,
              "Content-Type": "application/json",
            },
          });

          if (!response.ok) throw new Error("Error al cargar clientes");

          const data = await response.json();
          if (data.success) {
            clientes = data.data.clientes || [];

            if (clientes.length === 0) {
              emptyClientes.style.display = "block";
            } else {
              clientesTableBody.innerHTML = clientes
                .map((cliente) => renderClienteRow(cliente))
                .join("");
              clientesTable.style.display = "table";
            }
          }
        } catch (error) {
          console.error("Error loading clientes:", error);
          showToast("Error al cargar clientes", "error");
          emptyClientes.style.display = "block";
        } finally {
          loadingClientes.style.display = "none";
        }
      }

      function renderClienteRow(cliente) {
        const nombreCompleto = `${cliente.nombre} ${cliente.apellido}`.trim();
        const estadoBadge = cliente.activo
          ? '<span class="admin-badge success">Activo</span>'
          : '<span class="admin-badge danger">Inactivo</span>';

        const toggleLabel = cliente.activo ? "Desactivar" : "Activar";
        const toggleIcon = cliente.activo ? "🚫" : "✅";

        return `
        <tr>
          <td>
            <div style="font-weight: 600; color: var(--razo-gray-dark);">${
              nombreCompleto || "Sin nombre"
            }</div>
            <div style="font-size: 0.75rem; color: var(--razo-gray-warm);">ID: #${
              cliente.clienteId
            }</div>
          </td>
          <td>${cliente.email || "-"}</td>
          <td>${cliente.telefono || "-"}</td>
          <td>${estadoBadge}</td>
          <td style="display: flex; gap: 0.5rem;">
            <a class="btn btn-secondary" style="padding: 0.5rem 1rem; font-size: 0.85rem;" href="/admin-cliente-detalle.html?id=${
              cliente.clienteId
            }">
              Ver detalles
            </a>
            <button class="btn ${
              cliente.activo ? "btn-danger" : "btn-success"
            }" style="padding: 0.5rem 1rem; font-size: 0.85rem;" onclick="toggleEstadoCliente(${
          cliente.clienteId
        }, ${cliente.activo})">
              ${toggleIcon} ${toggleLabel}
            </button>
          </td>
        </tr>
      `;
      }

      async function toggleEstadoCliente(clienteId, activoActual) {
        const mensaje = `¿Seguro que deseas ${
          activoActual ? "desactivar" : "activar"
        } este cliente?`;

        let confirmado = false;

        if (
          typeof Swal !== "undefined" &&
          Swal &&
          typeof Swal.fire === "function"
        ) {
          const result = await Swal.fire({
            icon: activoActual ? "warning" : "question",
            title: activoActual ? "Desactivar cliente" : "Activar cliente",
            text: mensaje,
            showCancelButton: true,
            confirmButtonText: activoActual ? "Sí, desactivar" : "Sí, activar",
            cancelButtonText: "Cancelar",
            confirmButtonColor: activoActual ? "#dc3545" : "#16a34a",
            cancelButtonColor: "#6b7280",
          });
          confirmado = !!result.isConfirmed;
        } else {
          confirmado = window.confirm(mensaje);
        }

        if (!confirmado) return;

        const btn = event.currentTarget;
        const btnOriginal = btn.innerHTML;
        btn.disabled = true;
        btn.innerHTML =
          '<div class="spinner" style="width: 16px; height: 16px;"></div>';

        try {
          const response = await fetch(
            `${API_BASE_URL}/admin/clientes/${clienteId}/estado`,
            {
              method: "PUT",
              headers: {
                Authorization: `Bearer ${adminToken}`,
                "Content-Type": "application/json",
              },
              body: JSON.stringify({ activo: !activoActual }),
            }
          );

          const data = await response.json();
          if (!response.ok || !data.success) {
            throw new Error(
              data.message || "Error al actualizar estado del cliente"
            );
          }

          showToast("Estado del cliente actualizado", "success");
          await loadClientes();
        } catch (error) {
          console.error("Error toggling cliente:", error);
          showToast(
            error.message || "No se pudo actualizar el cliente",
            "error"
          );
        } finally {
          btn.disabled = false;
          btn.innerHTML = btnOriginal;
        }
      }

      // Inicializar página
      verifyAndLoadAdmin();
      loadClientes();
    </script>
  </body>
</html>
