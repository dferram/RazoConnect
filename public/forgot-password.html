<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recuperar contraseña - RazoConnect</title>
  <link rel="icon" type="image/png" href="/icon/Logo_Razo.png" />
  <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/mobile-responsive.css" />
  </head>
<body>
  <div class="auth-wrapper">
    <div class="form-container">
      <h1 class="form-title">Recuperar contraseña</h1>
      <p class="form-subtitle">Ingresa tu correo electrónico y te enviaremos instrucciones.</p>

      <div id="feedback" class="alert" style="display: none;"></div>

      <form id="forgotForm">
        <div class="form-group">
          <label class="form-label" for="email">Correo electrónico</label>
          <input type="email" id="email" class="form-input" placeholder="tu@email.com" required>
        </div>
        <button type="submit" class="btn btn-primary btn-block" id="submitBtn">
          <span id="btnText">Enviar enlace de recuperación</span>
          <div class="spinner" id="btnSpinner" style="display: none; width: 20px; height: 20px; border-width: 2px;"></div>
        </button>
      </form>

      <div id="successMessage" style="display: none;">
        <p class="text-center">Si tu correo está registrado, recibirás un enlace para restablecer tu contraseña en breve.</p>
      </div>

      <p class="text-center mt-3"><a href="/login.html" class="link-underline">Volver al inicio de sesión</a></p>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script>
    const form = document.getElementById('forgotForm');
    const emailInput = document.getElementById('email');
    const submitBtn = document.getElementById('submitBtn');
    const btnText = document.getElementById('btnText');
    const btnSpinner = document.getElementById('btnSpinner');
    const successMessage = document.getElementById('successMessage');
    const feedback = document.getElementById('feedback');

    form.addEventListener('submit', async (event) => {
      event.preventDefault();

      feedback.style.display = 'none';
      feedback.textContent = '';
      successMessage.style.display = 'none';

      submitBtn.disabled = true;
      btnText.style.display = 'none';
      btnSpinner.style.display = 'block';

      try {
        const response = await fetch(`${API_BASE_URL}/auth/forgot-password`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: emailInput.value.trim() })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.message || 'No se pudo procesar la solicitud');
        }

        form.style.display = 'none';
        successMessage.style.display = 'block';

      } catch (error) {
        feedback.className = 'alert alert-error';
        feedback.textContent = error.message || 'Ocurrió un error. Intenta nuevamente.';
        feedback.style.display = 'block';
      } finally {
        submitBtn.disabled = false;
        btnText.style.display = 'inline';
        btnSpinner.style.display = 'none';
      }
    });
  </script>
</body>
</html>
