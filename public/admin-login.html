<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - RazoConnect</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>
  <div class="admin-login-container">
    <div class="admin-login-box">
      <div class="admin-login-header">
        <div class="admin-login-icon">🔐</div>
        <h1>Panel de Administración</h1>
        <p>RazoConnect</p>
      </div>

      <div class="admin-login-body">
        <!-- Alert for errors -->
        <div id="alert" class="alert alert-error" style="display: none;"></div>

        <form id="adminLoginForm">
          <div class="form-group">
            <label for="email" class="form-label">Email</label>
            <input 
              type="email" 
              id="email" 
              class="form-input" 
              placeholder="admin@razoconnect.com"
              required
              autocomplete="email"
            >
          </div>

          <div class="form-group">
            <label for="password" class="form-label">Contraseña</label>
            <input 
              type="password" 
              id="password" 
              class="form-input" 
              placeholder="••••••••"
              required
              autocomplete="current-password"
            >
          </div>

          <button type="submit" class="btn btn-primary btn-block" id="submitBtn">
            <span id="btnText">Iniciar Sesión</span>
            <div class="spinner" id="btnSpinner" style="display: none;"></div>
          </button>
        </form>

        <div style="margin-top: 1.5rem; text-align: center; padding-top: 1.5rem; border-top: 1px solid var(--razo-gray-light);">
          <p style="color: var(--razo-gray-warm); font-size: 0.875rem;">
            ¿No eres administrador?<br>
            <a href="/login.html" style="color: var(--razo-turquoise); text-decoration: none; font-weight: 600;">
              Ir al login de clientes →
            </a>
          </p>
        </div>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script>
    const adminLoginForm = document.getElementById('adminLoginForm');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const submitBtn = document.getElementById('submitBtn');
    const btnText = document.getElementById('btnText');
    const btnSpinner = document.getElementById('btnSpinner');
    const alertDiv = document.getElementById('alert');

    // Check if admin is already logged in
    const adminToken = localStorage.getItem('razoconnect_admin_token');
    if (adminToken) {
      // Verify token is still valid
      verifyAdminToken(adminToken);
    }

    // Show alert message
    function showAlert(message, type = 'error') {
      alertDiv.className = `alert alert-${type}`;
      alertDiv.textContent = message;
      alertDiv.style.display = 'block';
      
      setTimeout(() => {
        alertDiv.style.display = 'none';
      }, 5000);
    }

    // Verify admin token
    async function verifyAdminToken(token) {
      try {
        const response = await fetch(`${API_BASE_URL}/admin/verify`, {
          method: 'GET',
          headers: {
            'Authorization': `Bearer ${token}`,
            'Content-Type': 'application/json'
          }
        });

        if (response.ok) {
          window.location.href = '/admin-dashboard.html';
        } else {
          // Token invalid, remove it
          localStorage.removeItem('razoconnect_admin_token');
          localStorage.removeItem('razoconnect_admin');
        }
      } catch (error) {
        console.error('Error verifying token:', error);
      }
    }

    // Handle form submission
    adminLoginForm.addEventListener('submit', async (e) => {
      e.preventDefault();

      const email = emailInput.value.trim();
      const password = passwordInput.value;

      // Validation
      if (!email || !password) {
        showAlert('Por favor completa todos los campos', 'error');
        return;
      }

      // Disable button
      submitBtn.disabled = true;
      btnText.style.display = 'none';
      btnSpinner.style.display = 'block';

      try {
        const response = await fetch(`${API_BASE_URL}/admin/login`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ email, password })
        });

        const data = await response.json();

        if (response.ok && data.success) {
          // Save admin data
          localStorage.setItem('razoconnect_admin_token', data.data.token);
          localStorage.setItem('razoconnect_admin', JSON.stringify(data.data.admin));
          
          // Show success message
          showToast('¡Login exitoso! Redirigiendo...', 'success');
          
          // Redirect to admin dashboard
          setTimeout(() => {
            window.location.href = '/admin-dashboard.html';
          }, 500);
        } else {
          // Show error message
          showAlert(data.message || 'Error al iniciar sesión', 'error');
        }
      } catch (error) {
        console.error('Login error:', error);
        showAlert('Error al conectar con el servidor. Intenta nuevamente.', 'error');
      } finally {
        // Reset button state
        submitBtn.disabled = false;
        btnText.style.display = 'inline';
        btnSpinner.style.display = 'none';
      }
    });

    // Enter key handler
    [emailInput, passwordInput].forEach(input => {
      input.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
          adminLoginForm.dispatchEvent(new Event('submit'));
        }
      });
    });
  </script>
</body>
</html>
