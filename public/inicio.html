<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RazoConnect - Inicio</title>
    <link rel="icon" type="image/png" href="/icon/Logo_Razo.png" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/inicio-new.css" />
    <link rel="stylesheet" href="css/mobile-responsive.css" />
  </head>
  <body>
    <div id="header-container"></div>

    <!-- Mensaje de Bienvenida Dinámico -->
    <section class="welcome-banner" id="welcomeBanner">
      <div class="container">
        <div class="welcome-content">
          <div class="welcome-icon" id="welcomeIcon"></div>
          <div class="welcome-text">
            <h2 class="welcome-title" id="welcomeTitle">
              Hola <span id="userName"></span>
            </h2>
            <p class="welcome-subtitle" id="welcomeSubtitle"></p>
          </div>
        </div>
      </div>
    </section>

    <!-- Widget de Cuenta Regresiva Estacional -->
    <section
      class="countdown-widget"
      id="countdownWidget"
      style="display: none"
    >
      <div class="container">
        <div class="countdown-container">
          <div class="countdown-info">
            <div class="countdown-event-icon" id="eventIcon"></div>
            <div>
              <h3 class="countdown-event-title" id="eventTitle"></h3>
              <p class="countdown-event-subtitle" id="eventSubtitle"></p>
            </div>
          </div>

          <div class="countdown-display">
            <div class="countdown-box">
              <span class="countdown-number" id="daysCount">0</span>
              <span class="countdown-text">Días</span>
            </div>
            <div class="countdown-separator">:</div>
            <div class="countdown-box">
              <span class="countdown-number" id="hoursCount">0</span>
              <span class="countdown-text">Horas</span>
            </div>
            <div class="countdown-separator">:</div>
            <div class="countdown-box">
              <span class="countdown-number" id="minutesCount">0</span>
              <span class="countdown-text">Min</span>
            </div>
          </div>

          <a href="/catalogo.html" class="countdown-cta" id="countdownCTA"></a>
        </div>
      </div>
    </section>

    <section class="hero-slider" id="hero-banner">
      <div
        class="hero-slide active"
        style="
          background-image: url('https://images.unsplash.com/photo-1513885535751-8b9238bd345a?w=1600&h=900&fit=crop');
        "
      >
        <div class="hero-content">
          <p class="hero-eyebrow"></p>
          <h1 class="hero-title"></h1>
          <p class="hero-description"></p>
          <a href="/catalogo.html?oferta=true" class="hero-cta" aria-label="Ver ofertas"></a>
        </div>
      </div>

      <div
        class="hero-slide"
        style="
          background-image: url('https://images.unsplash.com/photo-1549465220-1a8b9238cd48?w=1600&h=900&fit=crop');
        "
      >
        <div class="hero-content">
          <p class="hero-eyebrow"></p>
          <h1 class="hero-title"></h1>
          <p class="hero-description"></p>
          <a href="/catalogo.html?sort=newest" class="hero-cta" aria-label="Ver novedades"></a>
        </div>
      </div>

      <!-- Controles del Slider -->
      <div class="slider-controls">
        <button
          class="slider-dot active"
          data-slide="0"
          aria-label="Ir a slide 1"
        ></button>
        <button
          class="slider-dot"
          data-slide="1"
          aria-label="Ir a slide 2"
        ></button>
        <button
          class="slider-dot"
          data-slide="2"
          aria-label="Ir a slide 3"
        ></button>
      </div>
    </section>

    <!-- Categorías Visuales -->
    <section class="categories-section">
      <div class="container">
        <div class="section-header">
          <h2 class="section-title">Explora por categoría</h2>
          <p class="section-subtitle">Encuentra lo que necesitas rápidamente</p>
        </div>

        <div class="categories-grid" id="categoriesGrid">
          <!-- Loading -->
          <div class="loading-skeleton" style="height: 180px"></div>
          <div class="loading-skeleton" style="height: 180px"></div>
          <div class="loading-skeleton" style="height: 180px"></div>
          <div class="loading-skeleton" style="height: 180px"></div>
        </div>
      </div>
    </section>

    <!-- Ofertas Relámpago -->
    <section class="flash-sales-section seasonal-tint" id="flashSalesSection">
      <div class="container">
        <div class="flash-header">
          <h2 class="flash-title">⚡ Ofertas relámpago</h2>
          <p class="flash-subtitle">
            Descuentos increíbles seleccionados para tu negocio
          </p>
        </div>

        <div class="carousel-container">
          <button
            class="carousel-btn prev"
            type="button"
            onclick="scrollOfertas(-1)"
            aria-label="Ver ofertas anteriores"
          >
            ❮
          </button>

          <div class="flash-grid" id="ofertasTrack">
            <!-- Loading -->
            <div class="loading-skeleton" style="height: 450px"></div>
            <div class="loading-skeleton" style="height: 450px"></div>
            <div class="loading-skeleton" style="height: 450px"></div>
            <div class="loading-skeleton" style="height: 450px"></div>
          </div>

          <button
            class="carousel-btn next"
            type="button"
            onclick="scrollOfertas(1)"
            aria-label="Ver más ofertas"
          >
            ❯
          </button>
        </div>
      </div>
    </section>

    <!-- Nuevos Arribos (Scroll Horizontal) -->
    <section class="new-arrivals-section">
      <div class="container">
        <div class="section-header">
          <h2 class="section-title">Nuevos productos</h2>
          <p class="section-subtitle">
            ¡Lo más reciente de nuestro catálogo!
          </p>
        </div>

        <div class="arrivals-scroll-container">
          <div class="arrivals-grid" id="arrivalsGrid">
            <!-- Loading -->
            <div
              class="loading-skeleton"
              style="width: 300px; height: 480px"
            ></div>
            <div
              class="loading-skeleton"
              style="width: 300px; height: 480px"
            ></div>
            <div
              class="loading-skeleton"
              style="width: 300px; height: 480px"
            ></div>
            <div
              class="loading-skeleton"
              style="width: 300px; height: 480px"
            ></div>
            <div
              class="loading-skeleton"
              style="width: 300px; height: 480px"
            ></div>
            <div
              class="loading-skeleton"
              style="width: 300px; height: 480px"
            ></div>
            <div
              class="loading-skeleton"
              style="width: 300px; height: 480px"
            ></div>
            <div
              class="loading-skeleton"
              style="width: 300px; height: 480px"
            ></div>
          </div>
        </div>
      </div>
    </section>

    <!-- Footer Dinámico -->
    <div id="footer-container"></div>

    <!-- Scripts -->
    <script src="js/auth-guard.js"></script>
    <script src="js/api.js"></script>
    <script src="js/inicio-new.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/components/header-loader.js"></script>
    <script src="/js/components/footer-loader.js"></script>

    <!-- Sistema de Temas Estacionales -->
    <script src="/js/theme-manager.js"></script>

    <!-- Lógica de Contenido Dinámico -->
    <script src="/js/inicio-seasonal.js"></script>
  </body>
</html>
